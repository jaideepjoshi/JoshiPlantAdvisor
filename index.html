<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Joshi Plant Advisor">
<title>Joshi Plant Advisor</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--green:#1a4731;--green-mid:#2d6a4f;--green-light:#40916c;--green-accent:#95d5b2;--green-bg:#f0fdf4;--gold:#b8860b;--gold-light:#daa520;--cream:#fdfaf5;--text:#1a1a2e;--text-mid:#3d3d5c;--text-light:#6b7280;--bg:#f5f3ef;--card:#fff;--border:#e8e4dd;--radius:14px;--shadow:0 2px 12px rgba(0,0,0,.08);--shadow-lg:0 8px 30px rgba(0,0,0,.12)}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-text-size-adjust:100%;min-height:100vh;padding-bottom:84px;-webkit-font-smoothing:antialiased}
.header{background:linear-gradient(160deg,#0d1f17 0%,#1a4731 40%,#2d6a4f 100%);color:#fff;padding:20px 20px 16px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.header h1{font-family:'Playfair Display',Georgia,serif;font-size:24px;font-weight:700;margin-bottom:4px;letter-spacing:-.3px}
.header p{font-size:12px;opacity:.65;letter-spacing:.8px;text-transform:uppercase;font-weight:500}
.search-bar{margin:12px 0 0;position:relative}
.search-bar input{width:100%;padding:12px 14px 12px 40px;border:1px solid rgba(255,255,255,.15);border-radius:10px;font-size:15px;background:rgba(255,255,255,.1);color:#fff;outline:none;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transition:border-color .2s,background .2s;font-family:'Inter',system-ui,sans-serif}
.search-bar input:focus{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.3)}
.search-bar input::placeholder{color:rgba(255,255,255,.5)}
.search-bar svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:18px;height:18px;stroke:rgba(255,255,255,.5);fill:none}
.filters{padding:10px 16px;overflow-x:auto;white-space:nowrap;display:flex;gap:8px;background:var(--cream);border-bottom:1px solid var(--border)}
.chip{display:inline-block;padding:7px 16px;border-radius:24px;font-size:12px;font-weight:600;background:#fff;color:var(--text-light);cursor:pointer;border:1px solid var(--border);transition:all .25s ease;letter-spacing:.2px}
.chip:hover{border-color:#b8b4ad}
.chip.active{background:var(--green);color:#fff;border-color:var(--green);box-shadow:0 2px 8px rgba(26,71,49,.25)}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding:16px}
@media(min-width:640px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:1024px){.grid{grid-template-columns:repeat(4,1fr);max-width:1100px;margin:0 auto}}
.card{background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:transform .2s ease,box-shadow .2s ease;border:1px solid rgba(0,0,0,.04)}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.card:active{transform:scale(.97)}
.card img{width:100%;height:160px;object-fit:cover;background:#e8e4dd}
.card .placeholder{width:100%;height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:32px;background:linear-gradient(135deg,#f0fdf4,#dbeafe)}
.card-body{padding:10px 12px 12px}
.card-body h3{font-family:'Playfair Display',Georgia,serif;font-size:14px;font-weight:600;line-height:1.35;margin-bottom:2px;color:var(--text)}
.card-body .meta{font-size:11px;color:var(--text-light);font-style:italic}
.badges{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.badge{font-size:10px;padding:3px 8px;border-radius:12px;font-weight:600;letter-spacing:.2px}
.badge-sun{background:linear-gradient(135deg,#fef9c3,#fef3c7);color:#854d0e;border:1px solid #fde68a}
.badge-shade{background:linear-gradient(135deg,#eff6ff,#dbeafe);color:#1e40af;border:1px solid #bfdbfe}
.badge-deer{background:linear-gradient(135deg,#f0fdf4,#dcfce7);color:#166534;border:1px solid #bbf7d0}
.badge-bloom{background:linear-gradient(135deg,#fdf2f8,#fce7f3);color:#9d174d;border:1px solid #fbcfe8}
.detail{position:fixed;inset:0;background:var(--bg);z-index:200;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none}
.detail.open{display:block;animation:slideUp .35s cubic-bezier(.16,1,.3,1)}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeInUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.detail-hero{position:relative;width:100%;min-height:320px;overflow:hidden}
.detail-hero img{width:100%;height:320px;object-fit:cover;display:block}
.detail-hero .hero-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(13,31,23,.3) 0%,rgba(13,31,23,.55) 40%,rgba(13,31,23,.92) 100%);display:flex;flex-direction:column;justify-content:flex-end;padding:0 20px 20px}
.detail-hero .hero-back{position:absolute;top:14px;left:14px;width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,.35);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:5;transition:background .2s;border:1px solid rgba(255,255,255,.15)}
.detail-hero .hero-back:hover{background:rgba(0,0,0,.5)}
.detail-hero .hero-back svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2.5}
.detail-hero h2{font-family:'Playfair Display',Georgia,serif;font-size:28px;font-weight:700;color:#fff;margin-bottom:4px;text-shadow:0 2px 12px rgba(0,0,0,.3);letter-spacing:-.3px;line-height:1.2}
.detail-hero .hero-sub{font-size:13px;color:rgba(255,255,255,.7);font-style:italic;margin-bottom:14px}
.hero-stats{display:flex;gap:8px;flex-wrap:wrap}
.hero-stat{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.2px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.hero-stat svg{width:14px;height:14px;flex-shrink:0}
.detail-body{padding:14px;display:flex;flex-direction:column;gap:12px}
.ds{background:var(--card);border-radius:16px;box-shadow:0 1px 6px rgba(0,0,0,.05);border:1px solid rgba(0,0,0,.04);overflow:hidden;animation:fadeInUp .4s ease both}
.ds:nth-child(2){animation-delay:.05s}.ds:nth-child(3){animation-delay:.1s}.ds:nth-child(4){animation-delay:.15s}.ds:nth-child(5){animation-delay:.2s}.ds:nth-child(6){animation-delay:.25s}
.ds-head{display:flex;align-items:center;gap:12px;padding:16px 18px;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;transition:background .15s}
.ds-head:hover{background:rgba(0,0,0,.015)}
.ds-head:active{background:rgba(0,0,0,.03)}
.ds-accent{width:4px;align-self:stretch;border-radius:4px;flex-shrink:0}
.ds-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ds-icon svg{width:18px;height:18px;stroke-width:2}
.ds-head h3{font-family:'Playfair Display',Georgia,serif;font-size:15px;font-weight:700;color:var(--text);margin:0;flex:1;letter-spacing:-.1px}
.ds-head .ds-chevron{width:20px;height:20px;transition:transform .3s cubic-bezier(.16,1,.3,1);color:var(--text-light);flex-shrink:0}
.ds-head .ds-chevron.open{transform:rotate(180deg)}
.ds-content{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.16,1,.3,1),padding .3s ease}
.ds-content.open{max-height:2000px}
.ds-inner{padding:0 18px 18px}
.ds p,.ds li{font-size:14px;line-height:1.7;color:var(--text-mid)}
.ds ul{padding-left:20px;margin:0}
.ds li{margin-bottom:5px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.info-item{background:linear-gradient(135deg,#fafaf8,var(--cream));padding:11px 13px;border-radius:10px;border:1px solid var(--border);transition:transform .15s}
.info-item:active{transform:scale(.97)}
.info-item .label{font-size:10px;color:var(--text-light);text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.info-item .value{font-size:13px;font-weight:700;margin-top:3px;color:var(--text)}
.bloom-bar{display:flex;gap:3px;margin-top:4px}
.bloom-cell{flex:1;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;letter-spacing:.3px;transition:transform .15s}
.bloom-on{background:linear-gradient(135deg,#ec4899,#db2777);color:#fff;box-shadow:0 2px 6px rgba(236,72,153,.3)}
.bloom-off{background:#f1f0ec;color:#a8a29e}
.care-month{padding:11px 14px;margin-bottom:6px;border-radius:10px;background:linear-gradient(135deg,#fafaf8,var(--cream));font-size:13px;display:flex;gap:10px;align-items:flex-start;border:1px solid var(--border);line-height:1.55}
.care-month .mo{font-weight:700;color:var(--green);min-width:34px;font-size:12px;letter-spacing:.5px}
.tag-list{display:flex;flex-wrap:wrap;gap:6px}
.tag-pill{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;letter-spacing:.1px;transition:transform .12s}
.tag-pill:active{transform:scale(.95)}
.cultivar-item{padding:10px 14px;border-radius:10px;background:linear-gradient(135deg,#fafaf8,var(--cream));border:1px solid var(--border);font-size:13px;color:var(--text-mid);line-height:1.5;margin-bottom:6px}
.calendar-view{padding:16px}
.cal-month{background:#fff;border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:var(--shadow);border:1px solid rgba(0,0,0,.04)}
.cal-month h3{font-family:'Playfair Display',Georgia,serif;font-size:18px;font-weight:600;color:var(--green);margin-bottom:12px}
.cal-task{padding:8px 0;border-bottom:1px solid #f1f0ec;font-size:13px;display:flex;gap:10px}
.cal-task:last-child{border:none}
.cal-plant{font-weight:600;color:var(--text);min-width:110px}
.cal-action{color:var(--text-light);flex:1;line-height:1.4}
.task-view{padding:16px}
.task-card{background:#fff;border-radius:var(--radius);padding:16px;margin-bottom:10px;box-shadow:var(--shadow)}
.task-card h4{font-size:14px;font-weight:600;margin-bottom:4px}
.task-card p{font-size:12px;color:var(--text-light)}
.task-check{width:24px;height:24px;border:2px solid #d1cdc7;border-radius:7px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s ease}
.task-check:hover{border-color:var(--green-light)}
.task-check.done{background:linear-gradient(135deg,#2d6a4f,#40916c);border-color:transparent;color:#fff;box-shadow:0 2px 6px rgba(45,106,79,.3)}
.task-row{display:flex;gap:12px;align-items:center;padding:12px 0;border-bottom:1px solid #f1f0ec}
.empty-state{text-align:center;padding:60px 24px;color:var(--text-light);font-size:15px;font-style:italic}
.video-link{display:inline-flex;align-items:center;gap:8px;color:#dc2626;font-weight:600;font-size:13px;text-decoration:none;padding:10px 18px;background:linear-gradient(135deg,#fef2f2,#fee2e2);border-radius:10px;margin-top:8px;border:1px solid #fecaca;transition:transform .15s}
.video-link:hover{transform:translateY(-1px)}
.planted-badge{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,#dcfce7,#bbf7d0);color:#166534;padding:6px 14px;border-radius:14px;font-size:12px;font-weight:700;border:1px solid #86efac}
.nav-bottom{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(0,0,0,.06);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-item{flex:1;padding:10px 4px 8px;text-align:center;cursor:pointer;color:#a8a29e;transition:color .2s}
.nav-item.active{color:var(--green)}
.nav-item svg{width:24px;height:24px;margin:0 auto 3px;display:block}
.nav-item span{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.count-badge{background:var(--green);color:#fff;font-size:11px;padding:2px 8px;border-radius:10px;margin-left:4px}
</style>
</head>

let state = {

  search: "",
  filter: "all",
  detailId: null,

  garden: JSON.parse(localStorage.getItem("pt_garden")||"{}"),
  currentMonth: new Date().getMonth() + 1
};

function saveTasks() {
  localStorage.setItem("pt_tasks", JSON.stringify(state.tasks));
}

function saveGarden() {
  localStorage.setItem("pt_garden", JSON.stringify(state.garden));
}

// Initialize garden entries from pre-existing planted data
(function initGarden() {
  PLANTS.forEach(p => {
    if (p.planted && p.planted.length > 0 && !state.garden[p.id]) {
      state.garden[p.id] = { planted: true, name: p.planted.join(", "), where: "" };
    }
  });
  saveGarden();
})();

function toggleGardenPlanted(id) {
  if (!state.garden[id]) state.garden[id] = { planted: false, name: "", where: "" };
  state.garden[id].planted = !state.garden[id].planted;
  if (!state.garden[id].planted) { state.garden[id].name = ""; state.garden[id].where = ""; }
  saveGarden();
  render();
}

function updateGardenField(id, field, value) {
  if (!state.garden[id]) state.garden[id] = { planted: true, name: "", where: "" };
  state.garden[id][field] = value;
  saveGarden();
}

function toggleTask(key) {
  state.tasks[key] = !state.tasks[key];
  saveTasks();
  render();
}

function isPlanted(id) {
  const g = state.garden[id];
  return g && g.planted;
}

function getFiltered() {
  let list = PLANTS;
  if (state.search) {
    const s = state.search.toLowerCase();
    list = list.filter(p => p.name.toLowerCase().includes(s) || (p.botanical||"").toLowerCase().includes(s) || (p.type||"").toLowerCase().includes(s));
  }
  if (state.filter === "sun") list = list.filter(p => p.sun === "Part Sun to Full Sun");
  else if (state.filter === "shade") list = list.filter(p => p.sun === "Part Shade to Part Sun");
  else if (state.filter === "deepshade") list = list.filter(p => p.sun === "Shade to Part Shade");
  else if (state.filter === "deer") list = list.filter(p => p.deerResistant);
  else if (state.filter === "rabbit") list = list.filter(p => p.rabbitResistant);
  else if (state.filter === "drought") list = list.filter(p => p.droughtTolerant);
  else if (state.filter === "native") list = list.filter(p => p.nativeOhio);
  else if (state.filter === "blooming") list = list.filter(p => (p.bloomMonths||[]).includes(state.currentMonth));
  else if (state.filter === "planted") list = list.filter(p => isPlanted(p.id));
  else if (state.filter === "rebloom") list = list.filter(p => p.reblooming);
  return list;
}

function plantImage(p) {
  const cached = localStorage.getItem('pimg_' + p.id);
  if (cached) return `<img src="${cached}" alt="${p.name}" loading="lazy">`;
  const colors = ["#d1fae5","#fce7f3","#dbeafe","#fef3c7","#ede9fe","#ccfbf1","#ffedd5","#ecfccb"];
  const c = colors[p.id % colors.length];
  const init = p.name.split(/[\s(]+/).filter(w=>w.length>1).slice(0,2).map(w=>w[0]).join("");
  fetchPixabayImage(p);
  return `<div class="placeholder" id="img-${p.id}" style="background:${c}"><span>🌱</span><span style="font-size:12px;color:#64748b">${init}</span></div>`;
}

const _pixQ = new Set();
async function fetchPixabayImage(p) {
  if (_pixQ.has(p.id)) return;
  _pixQ.add(p.id);
  try {
    const bot = (p.botanical || '').split(' spp.')[0].split("'")[0].trim();
    const q = encodeURIComponent(bot ? bot + ' flower' : p.name + ' flower');
    const res = await fetch(`https://pixabay.com/api/?key=${PIXABAY_KEY}&q=${q}&image_type=photo&orientation=horizontal&per_page=3&safesearch=true`);
    const data = await res.json();
    if (data.hits && data.hits.length > 0) {
      const url = data.hits[0].webformatURL;
      localStorage.setItem('pimg_' + p.id, url);
      // Update card image if visible
      const el = document.getElementById('img-' + p.id);
      if (el) el.outerHTML = `<img src="${url}" alt="${p.name}" loading="lazy" style="width:100%;height:160px;object-fit:cover">`;
      // Update detail hero if visible
      const hero = document.querySelector('.detail-hero img');
      if (hero && state.detailId === p.id) hero.src = url;
    }
  } catch(e) { console.log('Pixabay fetch failed for', p.name, e); }
}

// Batch fetch all visible plant images on load
function fetchAllImages() {
  const visible = getFiltered().slice(0, 20);
  visible.forEach((p, i) => setTimeout(() => fetchPixabayImage(p), i * 200));
  // Fetch rest in background
  PLANTS.forEach((p, i) => setTimeout(() => fetchPixabayImage(p), 4000 + i * 300));
}
setTimeout(fetchAllImages, 500);

function sunBadge(p) {
  if (p.sun === "Part Sun to Full Sun") return '<span class="badge badge-sun">☀️ Part Sun–Full Sun</span>';
  if (p.sun === "Part Shade to Part Sun") return '<span class="badge badge-shade">⛅ Part Shade–Part Sun</span>';
  if (p.sun === "Shade to Part Shade") return '<span class="badge" style="background:#e0e7ff;color:#3730a3">🌥️ Shade to Part Shade</span>';
  return '<span class="badge badge-shade">'+p.sun+'</span>';
}

  const filters = [
    ["all","All"],["blooming","Blooming Now"],["sun","Part Sun to Full Sun"],["shade","Part Shade to Part Sun"],["deepshade","Shade to Part Shade"],
    ["deer","Deer Resist"],["rabbit","Rabbit Resist"],["drought","Drought"],
    ["native","Native OH"],["planted","In My Garden"],["rebloom","Reblooming"]
  ];
  return `
    <div class="filters">${filters.map(([k,l])=>`<div class="chip ${state.filter===k?'active':''}" onclick="state.filter='${k}';render()">${l}</div>`).join("")}</div>

      <div class="card" onclick="state.detailId=${p.id};render()">

          <h3>${p.name}</h3>
          <div class="meta">${p.botanical||""}</div>
          <div class="badges">

            ${isPlanted(p.id)?'<span class="badge" style="background:#dcfce7;color:#166534">✓ Mine</span>':''}

        </div>
      </div>
    `).join("")}</div>
  `;
}

function findPlantByName(name) {
  const n = name.toLowerCase().trim();
  return PLANTS.find(p => p.name.toLowerCase() === n) ||
    PLANTS.find(p => p.name.toLowerCase().includes(n) || n.includes(p.name.toLowerCase()));
}

function parseHeight(h) {
  if (!h) return { min: 0, max: 0 };
  const m = h.match(/(\d+)\s*-\s*(\d+)/);
  return m ? { min: parseInt(m[1]), max: parseInt(m[2]) } : { min: 0, max: 0 };
}

function companionLink(name) {
  const found = findPlantByName(name);
  if (found) return `<a href="#" onclick="event.preventDefault();state.detailId=${found.id};render();window.scrollTo(0,0)" style="color:var(--green);font-weight:600;text-decoration:none;border-bottom:1px dotted var(--green-accent)">${name}</a>`;
  return `<span style="color:var(--text-mid)">${name}</span>`;
}

function renderCompanionBloom(mainPlant) {
  const companions = (mainPlant.companions || []).slice(0, 5);
  if (!companions.length) return '';
  const rows = [];
  const mainBlooms = new Set(mainPlant.bloomMonths || []);

  // Gather companion data
  const compData = companions.map(name => {
    const found = findPlantByName(name);
    return {
      name,
      plant: found,
      blooms: new Set(found ? (found.bloomMonths || []) : [])
    };
  }).filter(c => c.blooms.size > 0);

  // Split companions: put some above, some below the main plant
  const above = compData.slice(0, Math.ceil(compData.length / 2));
  const below = compData.slice(Math.ceil(compData.length / 2));

  function bloomRow(name, blooms, isMain, plantObj) {
    const label = isMain ? `<strong style="color:var(--green)">${name}</strong>` : companionLink(name);
    const cells = Array.from({length:12}, (_, i) => {
      const m = i + 1;
      const on = blooms.has(m);
      const bg = isMain
        ? (on ? 'background:linear-gradient(135deg,#2d6a4f,#40916c)' : 'background:#f1f0ec')
        : (on ? 'background:linear-gradient(135deg,#ec4899,#db2777)' : 'background:#f1f0ec');
      const color = on ? 'color:#fff' : 'color:#a8a29e';
      return `<div style="flex:1;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;${bg};${color}">${MONTHS[i]}</div>`;
    }).join('');
    return `<div style="margin-bottom:6px">
      <div style="font-size:12px;margin-bottom:3px;line-height:1.3">${label}</div>
      <div style="display:flex;gap:2px">${cells}</div>
    </div>`;
  }

  let html = '';
  above.forEach(c => html += bloomRow(c.name, c.blooms, false, c.plant));
  html += bloomRow(mainPlant.name + ' (this plant)', mainBlooms, true, mainPlant);
  below.forEach(c => html += bloomRow(c.name, c.blooms, false, c.plant));

  return `<div style="margin-top:8px">${html}</div>`;
}

function renderCompanionHeight(mainPlant) {
  const companions = (mainPlant.companions || []).slice(0, 5);
  if (!companions.length) return '';
  const mainH = parseHeight(mainPlant.height);
  if (mainH.max === 0) return '';

  const compData = companions.map(name => {
    const found = findPlantByName(name);
    const h = found ? parseHeight(found.height) : { min: 0, max: 0 };
    return { name, plant: found, ...h };
  }).filter(c => c.max > 0);

  if (!compData.length) return '';

  // Split: left side, main in center, right side
  const left = compData.slice(0, Math.ceil(compData.length / 2));
  const right = compData.slice(Math.ceil(compData.length / 2));
  const allItems = [...left, { name: mainPlant.name, max: mainH.max, min: mainH.min, isMain: true }, ...right];
  const globalMax = Math.max(...allItems.map(c => c.max));

  const bars = allItems.map(c => {
    const pctMax = Math.round((c.max / globalMax) * 100);
    const pctMin = Math.round((c.min / globalMax) * 100);
    const isMain = c.isMain;
    const barGrad = isMain
      ? 'background:linear-gradient(180deg,#2d6a4f,#40916c)'
      : 'background:linear-gradient(180deg,#ec4899,#f472b6)';
    const rangeGrad = isMain
      ? 'background:rgba(45,106,79,.15)'
      : 'background:rgba(236,72,153,.1)';
    const label = isMain ? `<strong style="color:var(--green);font-size:10px">${c.name}</strong>` : `<span style="font-size:10px">${companionLink(c.name)}</span>`;
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;min-width:0">
      <div style="position:relative;width:100%;height:120px;display:flex;align-items:flex-end;justify-content:center">
        <div style="position:absolute;bottom:0;width:80%;height:${pctMax}%;${rangeGrad};border-radius:6px 6px 0 0"></div>
        <div style="position:relative;width:50%;height:${pctMin}%;min-height:4px;${barGrad};border-radius:4px 4px 0 0;z-index:1"></div>
      </div>
      <div style="font-size:9px;color:var(--text-light);font-weight:600;white-space:nowrap">${c.min}-${c.max}"</div>
      <div style="text-align:center;line-height:1.2;overflow:hidden;width:100%">${label}</div>
    </div>`;
  }).join('');

  return `<div style="display:flex;gap:6px;align-items:flex-end;margin-top:10px;padding:12px 4px 0;border-top:1px solid var(--border)">${bars}</div>`;
}

function renderDetail() {
  const p = PLANTS.find(x=>x.id===state.detailId);
  if (!p) return '';
  const img = IMAGES[String(p.id)];
  const bloomBar = Array.from({length:12},(_,i)=>{
    const on = (p.bloomMonths||[]).includes(i+1);
    return `<div class="bloom-cell ${on?'bloom-on':'bloom-off'}">${MONTHS[i]}</div>`;
  }).join("");
  
  const careHtml = Object.entries(p.care||{}).sort((a,b)=>Number(a[0])-Number(b[0])).map(([m,t])=>
    `<div class="care-month"><span class="mo">${MONTHS[Number(m)-1]}</span><span>${t}</span></div>`
  ).join("");

  const g = state.garden[p.id] || { planted: false, name: "", where: "" };

  // Helper to build a collapsible section
  function S(icon, iconBg, iconColor, accentColor, title, content, startOpen) {
    const o = startOpen ? 'open' : '';
    return `<div class="ds">
      <div class="ds-head" onclick="toggleSection(this)">
        <div class="ds-accent" style="background:${accentColor}"></div>
        <div class="ds-icon" style="background:${iconBg};color:${iconColor}">${icon}</div>
        <h3>${title}</h3>
        <div class="ds-chevron ${o}">${IC.chevron}</div>
      </div>
      <div class="ds-content ${o}"><div class="ds-inner">${content}</div></div>
    </div>`;
  }

  // HERO stats
  const bloomRange = (p.bloomMonths||[]).length ? MONTHS[(p.bloomMonths[0]||1)-1]+' - '+MONTHS[(p.bloomMonths[p.bloomMonths.length-1]||12)-1] : '';
  const heroStats = [
    p.sun ? `<div class="hero-stat" style="background:rgba(254,243,199,.85);color:#854d0e"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg>${p.sun}</div>` : '',
    p.height ? `<div class="hero-stat" style="background:rgba(220,252,231,.85);color:#166534"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V4M5 11l7-7 7 7"/></svg>${p.height}</div>` : '',
    bloomRange ? `<div class="hero-stat" style="background:rgba(252,231,243,.85);color:#9d174d"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a5 5 0 0 0-2.7 9.2A5 5 0 0 0 5 16a5 5 0 0 0 4.3 5A5 5 0 0 0 12 22a5 5 0 0 0 2.7-1A5 5 0 0 0 19 16a5 5 0 0 0-4.3-4.8A5 5 0 0 0 12 2z"/></svg>${bloomRange}</div>` : '',
    p.deerResistant ? `<div class="hero-stat" style="background:rgba(187,247,208,.85);color:#166534"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/></svg>Deer Safe</div>` : '',
    p.nativeOhio ? `<div class="hero-stat" style="background:rgba(191,219,254,.85);color:#1e40af"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18M5 21V7l7-4 7 4v14"/></svg>Native OH</div>` : ''
  ].filter(Boolean).join('');

  // GARDEN section (always open, not collapsible)
  const gardenCard = `<div class="ds" style="background:linear-gradient(135deg,#f0fdf4,#ecfdf5);border:1px solid #bbf7d0">
    <div style="padding:16px 18px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
        <div class="ds-icon" style="background:linear-gradient(135deg,#2d6a4f,#40916c);color:#fff">${IC.garden}</div>
        <h3 style="font-family:'Playfair Display',Georgia,serif;font-size:15px;font-weight:700;color:var(--green);margin:0">My Garden</h3>
      </div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:${g.planted?'14px':'0'}">
        <div class="task-check ${g.planted?'done':''}" onclick="toggleGardenPlanted(${p.id})" style="width:26px;height:26px;border-radius:8px">${g.planted?'✓':''}</div>
        <span style="font-size:14px;font-weight:600;color:var(--green)">Planted in my garden</span>
      </div>
      ${g.planted?`<div style="display:flex;flex-direction:column;gap:10px;margin-top:4px">
        <div><label style="font-size:11px;color:var(--green-mid);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px;font-weight:600">Name / Cultivar</label>
        <input type="text" value="${(g.name||'').replace(/"/g,'&quot;')}" placeholder="e.g. Magnus, PowWow Wild Berry" oninput="updateGardenField(${p.id},'name',this.value)" style="width:100%;padding:10px 12px;border:1px solid #86efac;border-radius:10px;font-size:14px;background:#fff;outline:none;font-family:'Inter',system-ui,sans-serif"></div>
        <div><label style="font-size:11px;color:var(--green-mid);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px;font-weight:600">Where</label>
        <input type="text" value="${(g.where||'').replace(/"/g,'&quot;')}" placeholder="e.g. Front bed, Side garden" oninput="updateGardenField(${p.id},'where',this.value)" style="width:100%;padding:10px 12px;border:1px solid #86efac;border-radius:10px;font-size:14px;background:#fff;outline:none;font-family:'Inter',system-ui,sans-serif"></div>
      </div>`:''}
    </div>
  </div>`;

  // Build sections
  const sections = [];

  // About — always open
  sections.push(S(IC.about, 'linear-gradient(135deg,#ecfdf5,#d1fae5)', '#065f46', '#2d6a4f', 'About', `<p>${p.description||""}</p>`, true));

  // Plant Info — always open
  sections.push(S(IC.info, 'linear-gradient(135deg,#f0fdf4,#dcfce7)', '#166534', '#40916c', 'Plant Info', `
    <div class="info-grid">
      <div class="info-item"><div class="label">Botanical</div><div class="value">${p.botanical||"—"}</div></div>
      <div class="info-item"><div class="label">Type</div><div class="value">${p.type||"—"}</div></div>
      <div class="info-item"><div class="label">Height</div><div class="value">${p.height||"—"}</div></div>
      <div class="info-item"><div class="label">Width</div><div class="value">${p.width||"—"}</div></div>
      <div class="info-item"><div class="label">Light</div><div class="value">${p.sun||"—"}</div></div>
      <div class="info-item"><div class="label">Water</div><div class="value">${p.waterReq||"—"}</div></div>
      <div class="info-item"><div class="label">Soil pH</div><div class="value">${p.ph||"—"}</div></div>
      <div class="info-item"><div class="label">Drought</div><div class="value">${p.droughtTolerant?"Yes":"No"}</div></div>
      <div class="info-item"><div class="label">Deer Resist</div><div class="value">${p.deerResistant?"Yes":"No"}</div></div>
      <div class="info-item"><div class="label">Rabbit Resist</div><div class="value">${p.rabbitResistant?"Yes":"No"}</div></div>
      <div class="info-item"><div class="label">Reblooming</div><div class="value">${p.reblooming?(p.rebloomNote||"Yes"):"No"}</div></div>
      <div class="info-item"><div class="label">Native OH</div><div class="value">${p.nativeOhio?"Yes":"No"}</div></div>
    </div>`, true));

  // Bloom Calendar — open
  sections.push(S(IC.bloom, 'linear-gradient(135deg,#fdf2f8,#fce7f3)', '#9d174d', '#ec4899', 'Bloom Calendar', `<div class="bloom-bar">${bloomBar}</div>`, true));

  // Attracts
  if (p.attracts&&p.attracts.length) sections.push(S(IC.attract, 'linear-gradient(135deg,#fef3c7,#fde68a)', '#92400e', '#f59e0b', 'Attracts', `<div class="tag-list">${p.attracts.map(a=>`<span class="tag-pill" style="background:linear-gradient(135deg,#fffbeb,#fef3c7);color:#92400e;border:1px solid #fde68a">${a}</span>`).join("")}</div>`, true));

  // Foliage Interest
  if (p.foliageInterest) sections.push(S(IC.foliage, 'linear-gradient(135deg,#ecfdf5,#d1fae5)', '#065f46', '#10b981', 'Foliage Interest', `<p>${p.foliageInterest}</p>`, false));

  // Year-Round Interest
  if (p.yearRound) sections.push(S(IC.year, 'linear-gradient(135deg,#f0f9ff,#e0f2fe)', '#0369a1', '#0ea5e9', 'Year-Round Interest', `<p>${p.yearRound}</p>`, false));

  // Companions (big section, open)
  if (p.companions&&p.companions.length) {
    const compPills = p.companions.map(c=>{
      const found = findPlantByName(c);
      return found
        ? `<a href="#" onclick="event.preventDefault();state.detailId=${found.id};render();window.scrollTo(0,0)" class="tag-pill" style="background:linear-gradient(135deg,#eff6ff,#dbeafe);color:#1e40af;border:1px solid #bfdbfe;text-decoration:none;cursor:pointer">${c}</a>`
        : `<span class="tag-pill" style="background:linear-gradient(135deg,#f5f5f4,#e7e5e4);color:var(--text-mid);border:1px solid #d6d3d1">${c}</span>`;
    }).join("");
    const compContent = `<div class="tag-list" style="margin-bottom:14px">${compPills}</div>
      <div style="font-size:11px;font-weight:700;color:var(--green-light);text-transform:uppercase;letter-spacing:1px;margin:16px 0 6px">Bloom Timeline</div>
      ${renderCompanionBloom(p)}
      ${renderCompanionHeight(p) ? `<div style="font-size:11px;font-weight:700;color:var(--green-light);text-transform:uppercase;letter-spacing:1px;margin:18px 0 6px">Height Comparison</div>${renderCompanionHeight(p)}` : ''}`;
    sections.push(S(IC.companion, 'linear-gradient(135deg,#dbeafe,#bfdbfe)', '#1e40af', '#3b82f6', 'Companions', compContent, true));
  }

  // Garden Styles
  if (p.gardenStyles&&p.gardenStyles.length) sections.push(S(IC.style, 'linear-gradient(135deg,#f3e8ff,#e9d5ff)', '#7c3aed', '#8b5cf6', 'Garden Styles', `<div class="tag-list">${p.gardenStyles.map(s=>`<span class="tag-pill" style="background:linear-gradient(135deg,#faf5ff,#f3e8ff);color:#7c3aed;border:1px solid #e9d5ff">${s}</span>`).join("")}</div>`, false));

  // Cleveland-Proven Cultivars
  if (p.clevelandCultivars&&p.clevelandCultivars.length) sections.push(S(IC.cultivar, 'linear-gradient(135deg,#fce7f3,#fbcfe8)', '#9d174d', '#ec4899', 'Cleveland-Proven Cultivars', p.clevelandCultivars.map(c=>`<div class="cultivar-item">${c}</div>`).join(""), false));

  // Cultivars
  if (p.cultivars&&p.cultivars.length) sections.push(S(IC.seedling, 'linear-gradient(135deg,#e0e7ff,#c7d2fe)', '#4338ca', '#6366f1', 'Cultivars', p.cultivars.map(c=>`<div class="cultivar-item">${c}</div>`).join(""), false));

  // Fertilizer
  sections.push(S(IC.fert, 'linear-gradient(135deg,#fefce8,#fef9c3)', '#854d0e', '#eab308', 'Fertilizer', `<p>${p.fertilizer||"—"}</p>${p.fertMonth&&p.fertMonth.length?`<p style="margin-top:6px;font-size:12px;color:var(--text-light);font-weight:500">Apply: ${p.fertMonth.map(m=>MONTHS[m-1]).join(", ")}</p>`:''}`, false));

  // Monthly Care
  if (careHtml) sections.push(S(IC.care, 'linear-gradient(135deg,#fff7ed,#ffedd5)', '#c2410c', '#f97316', 'Monthly Care', careHtml, false));

  // Cleveland Light Notes
  if (p.clevelandLightNote) sections.push(S(IC.light, 'linear-gradient(135deg,#fffbeb,#fef3c7)', '#b45309', '#f59e0b', 'Cleveland Light Notes', `<p>${p.clevelandLightNote}</p>`, false));

  // Where to Buy
  if (p.whereToBuy) sections.push(S(IC.buy, 'linear-gradient(135deg,#f0fdf4,#dcfce7)', '#15803d', '#22c55e', 'Where to Buy', `<p>${p.whereToBuy}</p>`, false));

  // When Available
  if (p.whenAvailable) sections.push(S(IC.calendar, 'linear-gradient(135deg,#eff6ff,#dbeafe)', '#1d4ed8', '#3b82f6', 'When Available', `<p>${p.whenAvailable}</p>`, false));

  // Video
  if (p.video) sections.push(S(IC.video, 'linear-gradient(135deg,#fef2f2,#fee2e2)', '#dc2626', '#ef4444', 'Learn More', `<a class="video-link" href="${p.video.startsWith('http')?p.video:'https://www.youtube.com/results?search_query='+encodeURIComponent(p.video)}" target="_blank" rel="noopener">Watch Care Videos</a>`, false));

  // Fallback hero for plants without images
  const heroPlaceholder = `<div style="width:100%;height:320px;background:linear-gradient(135deg,#0d1f17,#1a4731,#2d6a4f);display:flex;align-items:center;justify-content:center"><div style="font-size:64px;opacity:.3">${IC.seedling}</div></div>`;

  return `
    <div class="detail open">
      <div class="detail-hero">
        ${(localStorage.getItem("pimg_" + p.id) || img) ? `<img src="${localStorage.getItem("pimg_" + p.id) || img}" alt="${p.name}">` : heroPlaceholder}
        <div class="hero-overlay">
          <div class="hero-back" onclick="state.detailId=null;render()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          </div>
          <h2>${p.name}</h2>
          <div class="hero-sub">${p.botanical||p.type||''}</div>
          <div class="hero-stats">${heroStats}</div>
        </div>
      </div>
      <div class="detail-body">
        ${gardenCard}
        ${sections.join('')}
      </div>
      <div style="height:80px"></div>
    </div>
  `;
}

function renderCalendar() {
  const m = state.currentMonth;
  const monthPicker = MONTH_FULL.map((name,i)=>
    `<div class="chip ${m===i+1?'active':''}" onclick="state.currentMonth=${i+1};render()">${MONTHS[i]}</div>`
  ).join("");
  
  // Get tasks for this month
  const tasks = [];
  PLANTS.forEach(p => {
    const care = p.care||{};
    const task = care[String(m)];
    if (task) tasks.push({plant:p.name, task:task, id:p.id});
    // Also show fertilizer months
    if ((p.fertMonth||[]).includes(m)) {
      tasks.push({plant:p.name, task:`Fertilize: ${p.fertilizer||'as needed'}`, id:p.id});
    }
  });
  
  // Blooming this month
  const blooming = PLANTS.filter(p=>(p.bloomMonths||[]).includes(m));
  
  return `
    <div class="filters">${monthPicker}</div>
    <div class="calendar-view">
      <div class="cal-month">
        <h3>🌸 Blooming in ${MONTH_FULL[m-1]} (${blooming.length})</h3>
        ${blooming.map(p=>`
          <div class="cal-task" onclick="state.detailId=${p.id};render()" style="cursor:pointer">
            <span class="cal-plant">${p.name}</span>
            <span class="cal-action">${p.sun} · ${p.height||""}</span>
          </div>
        `).join("")}
        ${blooming.length===0?'<div class="empty-state">No plants blooming this month</div>':''}
      </div>
      <div class="cal-month">
        <h3>📋 Care Tasks (${tasks.length})</h3>
        ${tasks.map(t=>`
          <div class="cal-task">
            <span class="cal-plant">${t.plant}</span>
            <span class="cal-action">${t.task}</span>
          </div>
        `).join("")}
        ${tasks.length===0?'<div class="empty-state">No tasks this month</div>':''}
      </div>
    </div>
  `;
}

function renderTasks() {
  const m = state.currentMonth;
  const monthPicker = MONTH_FULL.map((name,i)=>
    `<div class="chip ${m===i+1?'active':''}" onclick="state.currentMonth=${i+1};render()">${MONTHS[i]}</div>`
  ).join("");
  
  const tasks = [];
  PLANTS.forEach(p => {
    const care = p.care||{};
    const task = care[String(m)];
    if (task) tasks.push({plant:p.name, task:task, id:p.id, key:`${p.id}-${m}-care`});
    if ((p.fertMonth||[]).includes(m)) {
      tasks.push({plant:p.name, task:`Fertilize: ${p.fertilizer||''}`, id:p.id, key:`${p.id}-${m}-fert`});
    }
  });
  
  const done = tasks.filter(t=>state.tasks[t.key]).length;
  
  return `
    <div class="filters">${monthPicker}</div>
    <div class="task-view">
      <div style="padding:8px 0 12px;font-size:13px;color:var(--text-light)">
        ${done}/${tasks.length} completed for ${MONTH_FULL[m-1]}
        <div style="background:#e2e8f0;border-radius:4px;height:6px;margin-top:6px;overflow:hidden">
          <div style="background:var(--green);height:100%;width:${tasks.length?Math.round(done/tasks.length*100):0}%;transition:.3s"></div>
        </div>
      </div>
      ${tasks.map(t=>`
        <div class="task-row">
          <div class="task-check ${state.tasks[t.key]?'done':''}" onclick="toggleTask('${t.key}')">
            ${state.tasks[t.key]?'✓':''}
          </div>
          <div style="flex:1;cursor:pointer" onclick="state.detailId=${t.id};render()">
            <div style="font-size:13px;font-weight:600;${state.tasks[t.key]?'text-decoration:line-through;opacity:.5':''}">${t.plant}</div>
            <div style="font-size:12px;color:var(--text-light)">${t.task}</div>
          </div>
        </div>
      `).join("")}
      ${tasks.length===0?'<div class="empty-state">No tasks for this month</div>':''}
    </div>
  `;
}

function render() {
  const app = document.getElementById("app");
  let content = '';
  
  // Header
  content += `
    <div class="header">
      <h1>Joshi Plant Advisor</h1>
      <p>Cleveland Zone 6a/6b &middot; 155 Perennials &middot; Year-Round Care</p>
      ${state.view==='plants'?`
        <div class="search-bar">
          <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="search" placeholder="Search plants..." value="${state.search}" oninput="state.search=this.value;render()">
        </div>
      `:''}
    </div>
  `;
  
  // Main content
  if (state.view === 'plants') content += renderPlants();
  else if (state.view === 'calendar') content += renderCalendar();
  else if (state.view === 'tasks') content += renderTasks();
  
  // Bottom nav
  content += `
    <div class="nav-bottom">
      <div class="nav-item ${state.view==='plants'?'active':''}" onclick="state.view='plants';render()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><circle cx="9" cy="9" r="1" fill="currentColor"/><circle cx="15" cy="9" r="1" fill="currentColor"/></svg>
        <span>Plants</span>
      </div>
      <div class="nav-item ${state.view==='calendar'?'active':''}" onclick="state.view='calendar';render()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Calendar</span>
      </div>
      <div class="nav-item ${state.view==='tasks'?'active':''}" onclick="state.view='tasks';render()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        <span>Tasks</span>
      </div>
    </div>
  `;
  
  // Detail overlay
  if (state.detailId) content += renderDetail();
  
  app.innerHTML = content;
}

// Initialize
render();
</script>
</body>
</html>
