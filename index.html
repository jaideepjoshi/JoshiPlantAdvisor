  }
  if (state.filter === "sun") list = list.filter(p => p.sun === "Part Sun to Full Sun");
  else if (state.filter === "shade") list = list.filter(p => p.sun === "Part Shade to Part Sun");
  else if (state.filter === "deepshade") list = list.filter(p => p.sun === "Shade to Part Shade");
  else if (state.filter === "deer") list = list.filter(p => p.deerResistant);
  else if (state.filter === "rabbit") list = list.filter(p => p.rabbitResistant);
  else if (state.filter === "drought") list = list.filter(p => p.droughtTolerant);
  else if (state.filter === "native") list = list.filter(p => p.nativeOhio);
  else if (state.filter === "blooming") list = list.filter(p => (p.bloomMonths||[]).includes(state.currentMonth));
  else if (state.filter === "planted") list = list.filter(p => isPlanted(p.id));
  else if (state.filter === "wishlist") list = list.filter(p => isWishlisted(p.id));
  else if (state.filter === "pw") list = list.filter(p => p.provenWinners);
  else if (state.filter === "monrovia") list = list.filter(p => p.monrovia);
  else if (state.filter === "fe") list = list.filter(p => p.firstEditions);
  else if (state.filter === "rebloom") list = list.filter(p => p.reblooming);
  else if (state.filter === "pollinator") list = list.filter(p => POLLINATOR_IDS.has(p.id));
  else if (state.filter === "hotdry") list = list.filter(p => HOTDRY_IDS.has(p.id));
  else if (state.filter === "moistsun") list = list.filter(p => MOIST_SUN_IDS.has(p.id));
  else if (state.filter === "moistshade") list = list.filter(p => MOIST_SHADE_IDS.has(p.id));
  else if (state.filter === "moistpart") list = list.filter(p => MOIST_PART_IDS.has(p.id));
  else if (state.filter === "raingarden") list = list.filter(p => RAINGARDEN_IDS.has(p.id));
  else if (state.filter === "woodland") list = list.filter(p => WOODLAND_IDS.has(p.id));
  else if (state.filter.startsWith("color:")) { const c = state.filter.split(":")[1]; list = list.filter(p => p.bloomColor === c); }
  const sunOrder = {"Part Sun to Full Sun":0, "Part Shade to Part Sun":1, "Shade to Part Shade":2};
  return list.sort((a,b) => {
    const sa = sunOrder[a.sun] ?? 3, sb = sunOrder[b.sun] ?? 3;
    return sa !== sb ? sa - sb : a.name.localeCompare(b.name);
  });
}

// ── Image Cache System ──
// Firebase stores permanent base64 thumbnails under /imageCache/{plantId}
// localStorage stores them too for offline/instant access
// Pixabay API only called when an image doesn't exist in either cache

let _imgCache = {}; // in-memory cache: { plantId: base64DataUrl }
let _imgCacheReady = false;

// imageCache init runs inside initFirebaseSync() after auth resolves

function getCachedImage(plantId) {
  const key = String(plantId);
  return _imgCache[key] || localStorage.getItem('pimg_' + key) || null;
}

function saveCachedImage(plantId, base64) {
  const key = String(plantId);
  _imgCache[key] = base64;
  localStorage.setItem('pimg_' + key, base64);
  // Write to Firebase individually (not the whole cache at once)
  if (_fbReady) {
    _fbDb.ref('imageCache/' + key).set(base64).catch(e => console.warn('Firebase img cache write failed:', e));
  }
}

function plantImage(p) {
  // Botanical plate — when present, this is the card art (no Pixabay fallback)
  if (p.plateImage) return `<img class="plate-img" src="${p.plateImage}" alt="${p.name}" loading="lazy">`;
  const photos = getPhotos(p.id);
  if (photos.length) return `<img src="${photos[0]}" alt="${p.name}" loading="lazy">`;
  const cached = getCachedImage(p.id);
  if (cached && cached.startsWith('data:')) return `<img src="${cached}" alt="${p.name}" loading="lazy">`;
  // Stale Pixabay URL in localStorage — clear it
  if (cached) localStorage.removeItem('pimg_' + p.id);
  const colors = ["#0f2b1d","#1a1525","#101d2e","#1f1a0f","#161225","#0f1f1c","#1f160f","#151f0f"];
  const c = colors[p.id % colors.length];
  const init = p.name.split(/[\s(]+/).filter(w=>w.length>1).slice(0,2).map(w=>w[0]).join("");
  return `<div class="placeholder" id="img-${p.id}" style="background:${c}"><span>🌱</span><span style="font-size:12px;color:#64748b">${init}</span></div>`;
}

// Convert an image URL to a compressed base64 data URL
function urlToBase64(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const MAX = 300;
      let w = img.width, h = img.height;
      if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
      else { w = Math.round(w * MAX / h); h = MAX; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', 0.6));
    };
    img.onerror = reject;
    img.src = url;
  });
}

const _pixQ = new Set();
let _pixThrottled = false;

async function fetchPixabayImage(p) {
  if (_pixQ.has(p.id) || _pixThrottled) return;
  _pixQ.add(p.id);
  if (getPhotos(p.id).length > 0) return;
  const existing = getCachedImage(p.id);
  if (existing && existing.startsWith('data:')) return;
  try {
    const bot = (p.botanical || '').split(' spp.')[0].split("'")[0].split('/')[0].replace(/\(.*?\)/g,'').trim();
    const q = encodeURIComponent(bot ? bot + ' flower' : p.name + ' flower');
    const res = await fetch(`https://pixabay.com/api/?key=${PIXABAY_KEY}&q=${q}&image_type=photo&orientation=horizontal&per_page=3&safesearch=true`);
    if (res.status === 429 || !res.ok) {
      _pixThrottled = true; _pixQ.delete(p.id);
      console.warn('Pixabay throttled, retrying in 60s');
      setTimeout(() => { _pixThrottled = false; fetchAllImages(); }, 60000);
      return;
    }
    const data = await res.json();
    if (data.detail && data.detail.includes('throttled')) {
      _pixThrottled = true; _pixQ.delete(p.id);
      setTimeout(() => { _pixThrottled = false; fetchAllImages(); }, 60000);
      return;
    }
    let url = (data.hits && data.hits.length > 0) ? data.hits[0].webformatURL : null;
    if (!url) {
      const q2 = encodeURIComponent(p.name.replace(/\s*[-–(].*$/, '') + ' flower plant');
      const res2 = await fetch(`https://pixabay.com/api/?key=${PIXABAY_KEY}&q=${q2}&image_type=photo&orientation=horizontal&per_page=3&safesearch=true`);
      if (res2.ok) {
        const d2 = await res2.json();
        if (d2.hits && d2.hits.length > 0) url = d2.hits[0].webformatURL;
      }
    }
    if (url) {
      try {
        // Convert to permanent base64 and store in Firebase + localStorage
        const base64 = await urlToBase64(url);
        saveCachedImage(p.id, base64);
        const el = document.getElementById('img-' + p.id);
        if (el) el.outerHTML = `<img src="${base64}" alt="${p.name}" loading="lazy">`;
        const hero = document.querySelector('.detail-hero img');
        if (hero && state.detailId === p.id) hero.src = base64;
      } catch(imgErr) {
        // CORS blocked — fall back to storing the URL directly
        saveCachedImage(p.id, url);
        const el = document.getElementById('img-' + p.id);
        if (el) el.outerHTML = `<img src="${url}" alt="${p.name}" loading="lazy">`;
      }
    }
  } catch(e) { console.log('Pixabay fetch failed for', p.name, e); }
}

// Wave-based loading: visible first, batches of 20 with pauses
let _waveRunning = false;
async function fetchAllImages() {
  if (_pixThrottled || _waveRunning) return;
  _waveRunning = true;
  const uncached = PLANTS.filter(p => {
    if (getPhotos(p.id).length > 0) return false;
    const c = getCachedImage(p.id);
    if (c && c.startsWith('data:')) return false;
    return !_pixQ.has(p.id);
  });
  if (!uncached.length) { _waveRunning = false; return; }
  const visibleIds = new Set(getFiltered().slice(0, 20).map(p => p.id));
  uncached.sort((a, b) => (visibleIds.has(b.id) ? 1 : 0) - (visibleIds.has(a.id) ? 1 : 0));
  const WAVE_SIZE = 20, DELAY = 1200, WAVE_PAUSE = 10000;
  for (let w = 0; w < uncached.length; w += WAVE_SIZE) {
    if (_pixThrottled) break;
    const wave = uncached.slice(w, w + WAVE_SIZE);
    for (let i = 0; i < wave.length; i++) {
      if (_pixThrottled) break;
      await new Promise(r => setTimeout(r, DELAY));
      await fetchPixabayImage(wave[i]);
    }
    if (w + WAVE_SIZE < uncached.length && !_pixThrottled) {
      await new Promise(r => setTimeout(r, WAVE_PAUSE));
    }
  }
  _waveRunning = false;
}
setTimeout(fetchAllImages, 1000);

async function bedScanAnalyze() {
  if (!state.bedScanImage) return;
  const key = state.claudeApiKey || _sharedClaudeKey;
  if (!key) { state.bedScanError = 'No API key — add one in Settings.'; render(); return; }
  state.bedScanLoading = true;
  state.bedScanError = '';
  state.bedScanResults = [];
  render();

  const [meta, b64] = state.bedScanImage.split(',');
  const mediaType = (meta.match(/:(.*?);/) || [])[1] || 'image/jpeg';

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'content-type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 2000,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: mediaType, data: b64 } },
            { type: 'text', text:
`You are an expert botanist and garden designer. Examine this garden bed photo carefully — it may be an elevation view (looking at the bed from the side) or a plan/overhead view.

Identify every distinct plant species you can see. For each plant, provide your best identification based on visible features: leaf shape, texture, color, growth habit, flowers, stems, or any other visible cues.

Return ONLY a JSON array — no prose, no markdown, no code fences:
[
  {
    "name": "Black-eyed Susan",
    "botanical": "Rudbeckia fulgida",
    "confidence": "high",
    "visual_cues": "Yellow daisy-like flowers with dark brown center cone, lance-shaped rough-textured leaves"
  },
  {
    "name": "Purple Coneflower",
    "botanical": "Echinacea purpurea",
    "confidence": "medium",
    "visual_cues": "Drooping pink-purple ray petals around a spiky orange-brown cone, coarse alternate leaves"
  }
]

Rules:
- confidence must be "high", "medium", or "low"
- Include every distinct plant you can identify, even partially visible ones
- If you cannot identify a plant but can see one, include it with name "Unknown plant", botanical "", confidence "low", and describe what you see in visual_cues
- If the image contains no identifiable plants, return []
- Be conservative: only include plants you can genuinely see, not ones you infer from context`
            }
          ]
        }]
      })
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error((err.error || {}).message || `HTTP ${resp.status}`);
    }
    const data = await resp.json();
    const text = ((data.content || [])[0] || {}).text || '';
    const match = text.match(/\[[\s\S]*\]/);
    if (!match) throw new Error('Unexpected response format');
    const identified = JSON.parse(match[0]);

    // Fuzzy-match each identified plant against the DB
    const results = identified.map(item => {
      const q = (item.name + ' ' + (item.botanical || '')).toLowerCase().trim();
      // Try exact botanical first, then common name, then fuzzy
      let matched = PLANTS.find(p => item.botanical && p.botanical && p.botanical.toLowerCase() === item.botanical.toLowerCase());
      if (!matched) matched = PLANTS.find(p => p.name.toLowerCase() === item.name.toLowerCase());
      if (!matched) {
        const words = q.split(/\s+/).filter(w => w.length > 2);
        const scored = PLANTS.map(p => {
          const nl = p.name.toLowerCase(), bl = (p.botanical || '').toLowerCase();
          let score = 0;
          if (nl === item.name.toLowerCase()) score = 100;
          else if (nl.includes(item.name.toLowerCase()) || item.name.toLowerCase().includes(nl)) score = 70;
          else {
            const hits = words.filter(w => nl.includes(w) || bl.includes(w));
            score = hits.length ? (hits.length / words.length) * 50 : 0;
          }
          return { p, score };
        }).filter(r => r.score >= 40).sort((a, b) => b.score - a.score);
        if (scored.length) matched = scored[0].p;
      }
      return { ...item, matchedId: matched ? matched.id : null };
    });

    state.bedScanResults = results;
  } catch(e) {
    state.bedScanError = e.message || 'Analysis failed';
  }
  state.bedScanLoading = false;
  render();
}

  state.apApiResults = [];
  state.apTagImages = [];
  state.apChosen = null;
  state.apForm = {};
  render();
}

function renderBedScanModal() {

  const matched = results.filter(r => r.matchedId !== null);
  const unmatched = results.filter(r => r.matchedId === null && r.name !== 'Unknown plant');
  const unknown = results.filter(r => r.name === 'Unknown plant');

  const confColor = c => c === 'high' ? '#4ade80' : c === 'medium' ? '#f5c842' : '#94a3b8';
  const confBg   = c => c === 'high' ? 'rgba(74,222,128,.1)' : c === 'medium' ? 'rgba(245,200,66,.1)' : 'rgba(148,163,184,.1)';

                }
                <button onclick="state.showBedScan=false;state.detailId=${r.matchedId};render()" style="font-size:11px;padding:5px 9px;border-radius:8px;background:rgba(255,255,255,.06);color:var(--text-light);border:1px solid rgba(255,255,255,.1);font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap">View →</button>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>` : ''}

      ${unmatched.length ? `

              <div style="flex:1;min-width:0">
                <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px;flex-wrap:wrap">

function renderGarden() {
  const myPlants = PLANTS.filter(p => isPlanted(p.id)).sort((a,b) => a.name.localeCompare(b.name));
  const bloomingNow = myPlants.filter(p => (p.bloomMonths||[]).includes(state.currentMonth));
  const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const activeTab = state.gardenTab || 'plants';

  const hasKey = !!(state.claudeApiKey || _sharedClaudeKey);
  const showScanBtn = hasKey && !isViewing();
  const tabBtn = (id, label) => `<div onclick="state.gardenTab='${id}';render()" style="padding:7px 18px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;${activeTab===id?'background:linear-gradient(135deg,#14532d,#166534);color:#4ade80;box-shadow:0 2px 8px rgba(0,0,0,.3)':'color:var(--text-light)'}">${label}</div>`;
  const subNav = `<div style="padding:10px 14px;background:var(--cream);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px">
    <div style="display:inline-flex;background:rgba(0,0,0,.25);border-radius:12px;padding:3px;gap:2px">
      ${tabBtn('plants','My Plants')}
      ${tabBtn('list','List')}
      ${tabBtn('calendar','Calendar')}
    </div>
    ${activeTab==='list' && myPlants.length ? `<button onclick="exportGardenCSV()" style="display:flex;align-items:center;gap:5px;padding:7px 13px;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.25);border-radius:20px;color:#4ade80;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export CSV
    </button>` : (showScanBtn && activeTab==='plants' ? `<button onclick="state.showBedScan=true;state.bedScanImage=null;state.bedScanResults=[];state.bedScanError='';state.bedScanLoading=false;render()" style="display:flex;align-items:center;gap:5px;padding:7px 13px;background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.25);border-radius:20px;color:#93c5fd;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      Scan Bed
    </button>` : '')}
  </div>`;

  if (activeTab === 'calendar') return subNav + renderCalendar();
  if (activeTab === 'list') return subNav + renderGardenList(myPlants, bloomingNow);

  if (!myPlants.length) return subNav + `<div style="padding:60px 24px;text-align:center"><div style="font-size:52px;margin-bottom:14px;opacity:.3">🌱</div><div style="color:var(--text-mid);font-size:15px;font-weight:500">Your garden is empty</div><div style="color:var(--text-light);font-size:13px;margin-top:8px;line-height:1.6">Browse plants and tap<br>"Planted in my garden" to add them here.</div></div>`;

  const statsRow = `<div style="display:flex;gap:8px;padding:10px 14px">
    <div style="flex:1;padding:12px;border-radius:12px;background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.15);text-align:center">
      <div style="font-size:26px;font-weight:700;color:#4ade80;line-height:1">${myPlants.length}</div>
      <div style="font-size:10px;color:var(--text-mid);text-transform:uppercase;letter-spacing:.5px;margin-top:3px">Plants</div>
    </div>
    <div style="flex:1;padding:12px;border-radius:12px;background:rgba(244,114,182,.08);border:1px solid rgba(244,114,182,.15);text-align:center">
      <div style="font-size:26px;font-weight:700;color:#f472b6;line-height:1">${bloomingNow.length}</div>
      <div style="font-size:10px;color:var(--text-mid);text-transform:uppercase;letter-spacing:.5px;margin-top:3px">Blooming</div>
    </div>
    <div onclick="state.gardenTab='calendar';render()" style="flex:1;padding:12px;border-radius:12px;background:rgba(212,160,23,.08);border:1px solid rgba(212,160,23,.15);text-align:center;cursor:pointer">
      <div style="font-size:16px;font-weight:700;color:#f5c842;line-height:1.4">${MONTH_NAMES[state.currentMonth-1]}</div>
      <div style="font-size:10px;color:var(--text-mid);text-transform:uppercase;letter-spacing:.5px;margin-top:3px">Calendar</div>
    </div>
  </div>`;

  const grid = `<div class="grid">${myPlants.map(p => `
    <div class="card ${p.plateImage ? 'has-plate' : ''}" onclick="state.detailId=${p.id};render()">
      ${plantImage(p)}

        <h3>${displayName(p)}</h3>

        </div>
      </div>
    </div>`).join("")}</div>`;

  return subNav + statsRow + grid;
}

// Export the user's planted plants as a CSV file. Downloads directly via a
// synthetic <a download>. Trigger from the Garden > List sub-tab.
function exportGardenCSV() {
  const myPlants = PLANTS.filter(p => isPlanted(p.id)).sort((a,b) => a.name.localeCompare(b.name));
  if (!myPlants.length) return;
  const headers = ['Name','Botanical','Type','Hardiness Zone','Height','Width','Sun','Water','Soil pH','Bloom Months','Garden Styles','Attracts'];
  const escape = v => {
    if (v == null) return '';
    const s = String(v);
    return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
  };
  const rows = myPlants.map(p => [
    p.name || '',
    p.botanical || '',
    p.type || '',
    p.hardiness ? 'Zone ' + p.hardiness : '',
    p.height || '',
    p.width || '',
    p.sun || '',
    p.waterReq || '',
    p.ph || '',
    (p.bloomMonths || []).map(m => MONTHS[m-1]).join(', '),
    (p.gardenStyles || []).join(', '),
    (p.attracts || []).join(', '),
  ].map(escape).join(','));
  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const stamp = new Date().toISOString().slice(0, 10);
  a.download = `my-garden-${stamp}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function findPlantByName(name) {
  const n = name.toLowerCase().trim();
  return PLANTS.find(p => p.name.toLowerCase() === n) ||
    PLANTS.find(p => p.name.toLowerCase().includes(n) || n.includes(p.name.toLowerCase()));
}

function parseHeight(h) {
  if (!h) return { min: 0, max: 0 };
  const m = h.match(/(\d+)\s*-\s*(\d+)/);
  return m ? { min: parseInt(m[1]), max: parseInt(m[2]) } : { min: 0, max: 0 };
}

function companionLink(name) {
  const found = findPlantByName(name);
  if (found) return `<a href="#" onclick="event.preventDefault();state.detailId=${found.id};render();window.scrollTo(0,0)" style="color:#facc15;font-weight:600;text-decoration:none">${name}</a>`;
  return `<span style="color:var(--text-mid)">${name}</span>`;
}

const COMP_COLORS = [
  { light:'#facc15', dark:'#eab308', bg:'rgba(234,179,8,.15)' },
  { light:'#f472b6', dark:'#ec4899', bg:'rgba(244,114,182,.15)' },
  { light:'#93c5fd', dark:'#60a5fa', bg:'rgba(96,165,250,.15)' },
  { light:'#fb923c', dark:'#f97316', bg:'rgba(251,146,60,.15)' },
  { light:'#c4b5fd', dark:'#a78bfa', bg:'rgba(167,139,250,.15)' }
];

function getCompanionColorMap(mainPlant) {
  const map = {};
  (mainPlant.companions || []).slice(0, 5).forEach((name, i) => {
    map[name] = COMP_COLORS[i % COMP_COLORS.length];
  });
  return map;
}

function renderCompanionBloom(mainPlant) {
  const companions = (mainPlant.companions || []).slice(0, 5);
  if (!companions.length) return '';
  const colorMap = getCompanionColorMap(mainPlant);
  const mainBlooms = new Set(mainPlant.bloomMonths || []);

  // Foliage season months for non-blooming plants (Apr-Oct in zone 6)
  const FOLIAGE_MONTHS = new Set([4,5,6,7,8,9,10]);

  const compData = companions.map(name => {
    const found = findPlantByName(name);
    const blooms = new Set(found ? (found.bloomMonths || []) : []);
    const isFoliageOnly = blooms.size === 0;
    return { name, plant: found, blooms, isFoliageOnly };
  });

  const above = compData.slice(0, Math.ceil(compData.length / 2));
  const below = compData.slice(Math.ceil(compData.length / 2));

  function bloomRow(name, blooms, isMain, isFoliageOnly) {
    const cc = colorMap[name];
    const label = isMain
      ? `<strong style="color:#4ade80">${name}</strong>`
      : (function(){ const f=findPlantByName(name); return f ? `<a href="#" onclick="event.preventDefault();state.detailId=${f.id};render();window.scrollTo(0,0)" style="color:${cc.light};font-weight:600;text-decoration:none">${name}</a>` : `<span style="color:${cc.light}">${name}</span>`; })();
    const suffix = isFoliageOnly ? ` <span style="font-size:9px;color:var(--text-light);font-weight:400">(foliage)</span>` : '';
    const activeMonths = isFoliageOnly ? FOLIAGE_MONTHS : blooms;
    const cells = Array.from({length:8}, (_, i) => {
      const m = i + 3, on = activeMonths.has(m);
      let bg;
      if (isMain) {
        bg = on ? 'background:linear-gradient(135deg,#22c55e,#4ade80)' : 'background:rgba(255,255,255,.05)';
      } else if (isFoliageOnly) {
        bg = on ? `background:linear-gradient(135deg,${cc.dark},${cc.light});opacity:.6` : 'background:rgba(255,255,255,.05)';
      } else {
        bg = on ? `background:linear-gradient(135deg,${cc.dark},${cc.light})` : 'background:rgba(255,255,255,.05)';
      }
      return `<div style="width:80px;height:24px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;${bg};${on?'color:#fff':'color:var(--text-light)'}">${MONTHS[i+2]}</div>`;
    }).join('');
    return { label: `${label}${suffix}`, cells };
  }

  const rows = [];
  above.forEach(c => rows.push(bloomRow(c.name, c.blooms, false, c.isFoliageOnly)));
  rows.push(bloomRow(mainPlant.name + ' (this plant)', mainBlooms, true, false));
  below.forEach(c => rows.push(bloomRow(c.name, c.blooms, false, c.isFoliageOnly)));

  const tableRows = rows.map(r => `<tr>
    <td style="font-size:10px;line-height:1.2;white-space:nowrap;padding:2px 8px 2px 0;vertical-align:middle">${r.label}</td>
    <td style="vertical-align:middle"><div style="display:flex;gap:2px">${r.cells}</div></td>
  </tr>`).join('');

  return `<div style="margin-top:8px;overflow-x:auto"><table style="border-collapse:collapse">${tableRows}</table></div>`;
}

function renderCompanionHeight(mainPlant) {
  const companions = (mainPlant.companions || []).slice(0, 5);
  if (!companions.length) return '';
  const mainH = parseHeight(mainPlant.height);
  if (mainH.max === 0) return '';

  const colorMap = getCompanionColorMap(mainPlant);

  const compData = companions.map(name => {
    const found = findPlantByName(name);
    const h = found ? parseHeight(found.height) : { min: 0, max: 0 };
    return { name, plant: found, ...h };
  }).filter(c => c.max > 0);

  if (!compData.length) return '';

  const left = compData.slice(0, Math.ceil(compData.length / 2));
  const right = compData.slice(Math.ceil(compData.length / 2));
  const allItems = [...left, { name: mainPlant.name, max: mainH.max, min: mainH.min, isMain: true }, ...right];
  const globalMax = Math.max(...allItems.map(c => c.max));
  const chartH = 140;

  const plants = allItems.map(c => {
    const h = Math.max(Math.round((c.max / globalMax) * chartH), 20);
    const isMain = c.isMain;
    const cc = colorMap[c.name];
    const stemColor = isMain ? '#22804a' : (cc ? cc.dark : '#d4a017');
    const leafColor = isMain ? '#4ade80' : (cc ? cc.light : '#f5c842');
    const leafBg = isMain ? 'rgba(74,222,128,.1)' : (cc ? cc.bg : 'rgba(212,160,23,.15)');
    const found = c.plant || findPlantByName(c.name);
    const label = isMain
      ? `<strong style="color:#4ade80;font-size:10px">${c.name}</strong>`
      : (found ? `<a href="#" onclick="event.preventDefault();state.detailId=${found.id};render();window.scrollTo(0,0)" style="color:${leafColor};font-weight:600;text-decoration:none;font-size:10px">${c.name}</a>` : `<span style="color:${leafColor};font-size:10px">${c.name}</span>`);
    const svg = `<svg width="50" height="${h}" viewBox="0 0 50 ${h}" fill="none">
      <rect x="23" y="${h*0.3}" width="4" height="${h*0.7}" rx="2" fill="${stemColor}" opacity="0.7"/>
      <ellipse cx="25" cy="${h*0.25}" rx="${Math.min(22, 10+h*0.1)}" ry="${Math.min(h*0.3, 30)}" fill="${leafBg}" stroke="${leafColor}" stroke-width="1.5"/>
      <ellipse cx="25" cy="${h*0.2}" rx="${Math.min(14, 6+h*0.06)}" ry="${Math.min(h*0.18, 18)}" fill="${leafBg}" stroke="${stemColor}" stroke-width="1" opacity="0.5"/>
    </svg>`;
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:0">
      <div style="height:${chartH}px;display:flex;align-items:flex-end;justify-content:center">${svg}</div>
      <div style="font-size:9px;color:${leafColor};font-weight:700;white-space:nowrap">${c.min}-${c.max}"</div>
      <div style="text-align:center;line-height:1.2;overflow:hidden;width:100%">${label}</div>
    </div>`;
  }).join('');

  return `<div style="display:flex;gap:4px;align-items:flex-end;margin-top:10px;padding:12px 4px 0;border-top:1px solid var(--border);background:linear-gradient(180deg,transparent 0%,rgba(74,222,128,.03) 100%);border-radius:0 0 12px 12px">${plants}</div>`;
}

function getPairingColorMap(names) {
  const map = {};
  names.forEach((name, i) => { map[name] = COMP_COLORS[i % COMP_COLORS.length]; });
  return map;
}

function renderPairingsBloom(mainPlant, names) {
  if (!names.length) return '';
  const colorMap = getPairingColorMap(names);
  const mainBlooms = new Set(mainPlant.bloomMonths || []);
  const FOLIAGE_MONTHS = new Set([4,5,6,7,8,9,10]);
  const compData = names.map(name => {
    const found = findPlantByName(name);
    const blooms = new Set(found ? (found.bloomMonths || []) : []);
    return { name, plant: found, blooms, isFoliageOnly: blooms.size === 0, isCustom: !found };
  });
  const above = compData.slice(0, Math.ceil(compData.length / 2));
  const below = compData.slice(Math.ceil(compData.length / 2));

  function bloomRow(name, blooms, isMain, isFoliageOnly, isCustom) {
    const cc = colorMap[name];
    const label = isMain
      ? `<strong style="color:#4ade80">${escHtml(name)}</strong>`
      : (function() {
          const f = findPlantByName(name);
          if (isCustom || !f) return `<span style="color:${cc.light}">${escHtml(name)}</span>`;
          return `<a href="#" onclick="event.preventDefault();state.detailId=${f.id};render();window.scrollTo(0,0)" style="color:${cc.light};font-weight:600;text-decoration:none">${escHtml(name)}</a>`;
        })();
    const suffix = isFoliageOnly && !isCustom ? ` <span style="font-size:9px;color:var(--text-light);font-weight:400">(foliage)</span>` : (isCustom ? ` <span style="font-size:9px;color:var(--text-light);font-weight:400">(custom)</span>` : '');
    const activeMonths = isFoliageOnly ? FOLIAGE_MONTHS : blooms;
    const cells = Array.from({length:8}, (_, i) => {
      const m = i + 3, on = activeMonths.has(m);
      let bg;
      if (isMain) bg = on ? 'background:linear-gradient(135deg,#22c55e,#4ade80)' : 'background:rgba(255,255,255,.05)';
      else if (isFoliageOnly) bg = on ? `background:linear-gradient(135deg,${cc.dark},${cc.light});opacity:.6` : 'background:rgba(255,255,255,.05)';
      else bg = on ? `background:linear-gradient(135deg,${cc.dark},${cc.light})` : 'background:rgba(255,255,255,.05)';
      return `<div style="width:80px;height:24px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;${bg};${on?'color:#fff':'color:var(--text-light)'}">${MONTHS[i+2]}</div>`;
    }).join('');
    return { label: `${label}${suffix}`, cells };
  }

  const rows = [];
  above.forEach(c => rows.push(bloomRow(c.name, c.blooms, false, c.isFoliageOnly, c.isCustom)));
  rows.push(bloomRow(mainPlant.name + ' (this plant)', mainBlooms, true, false, false));
  below.forEach(c => rows.push(bloomRow(c.name, c.blooms, false, c.isFoliageOnly, c.isCustom)));
  const tableRows = rows.map(r => `<tr>
    <td style="font-size:10px;line-height:1.2;white-space:nowrap;padding:2px 8px 2px 0;vertical-align:middle">${r.label}</td>
    <td style="vertical-align:middle"><div style="display:flex;gap:2px">${r.cells}</div></td>
  </tr>`).join('');
  return `<div style="margin-top:8px;overflow-x:auto"><table style="border-collapse:collapse">${tableRows}</table></div>`;
}

function renderPairingsHeight(mainPlant, names) {
  if (!names.length) return '';
  const mainH = parseHeight(mainPlant.height);
  if (mainH.max === 0) return '';
  const colorMap = getPairingColorMap(names);
  const compData = names.map(name => {
    const found = findPlantByName(name);
    const h = found ? parseHeight(found.height) : { min: 0, max: 0 };
    return { name, plant: found, ...h, isCustom: !found };
  }).filter(c => c.max > 0);
  if (!compData.length) return '';

  const left = compData.slice(0, Math.ceil(compData.length / 2));
  const right = compData.slice(Math.ceil(compData.length / 2));
  const allItems = [...left, { name: mainPlant.name, max: mainH.max, min: mainH.min, isMain: true }, ...right];
  const globalMax = Math.max(...allItems.map(c => c.max));
  const chartH = 140;

  const plants = allItems.map(c => {
    const h = Math.max(Math.round((c.max / globalMax) * chartH), 20);
    const isMain = c.isMain;
    const cc = colorMap[c.name];
    const stemColor = isMain ? '#22804a' : (cc ? cc.dark : '#d4a017');
    const leafColor = isMain ? '#4ade80' : (cc ? cc.light : '#f5c842');
    const leafBg = isMain ? 'rgba(74,222,128,.1)' : (cc ? cc.bg : 'rgba(212,160,23,.15)');
    const found = c.plant || (!isMain && findPlantByName(c.name));
    const label = isMain
      ? `<strong style="color:#4ade80;font-size:10px">${escHtml(c.name)}</strong>`
      : (found ? `<a href="#" onclick="event.preventDefault();state.detailId=${found.id};render();window.scrollTo(0,0)" style="color:${leafColor};font-weight:600;text-decoration:none;font-size:10px">${escHtml(c.name)}</a>`
               : `<span style="color:${leafColor};font-size:10px">${escHtml(c.name)}</span>`);
    const svg = `<svg width="50" height="${h}" viewBox="0 0 50 ${h}" fill="none">
      <rect x="23" y="${h*0.3}" width="4" height="${h*0.7}" rx="2" fill="${stemColor}" opacity="0.7"/>
      <ellipse cx="25" cy="${h*0.25}" rx="${Math.min(22,10+h*0.1)}" ry="${Math.min(h*0.3,30)}" fill="${leafBg}" stroke="${leafColor}" stroke-width="1.5"/>
      <ellipse cx="25" cy="${h*0.2}" rx="${Math.min(14,6+h*0.06)}" ry="${Math.min(h*0.18,18)}" fill="${leafBg}" stroke="${stemColor}" stroke-width="1" opacity="0.5"/>
    </svg>`;
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:0">
      <div style="height:${chartH}px;display:flex;align-items:flex-end;justify-content:center">${svg}</div>
      <div style="font-size:9px;color:${leafColor};font-weight:700;white-space:nowrap">${c.min}-${c.max}"</div>
      <div style="text-align:center;line-height:1.2;overflow:hidden;width:100%">${label}</div>
    </div>`;
  }).join('');
  return `<div style="display:flex;gap:4px;align-items:flex-end;margin-top:10px;padding:12px 4px 0;border-top:1px solid var(--border);background:linear-gradient(180deg,transparent 0%,rgba(74,222,128,.03) 100%);border-radius:0 0 12px 12px">${plants}</div>`;
}

function plateGlyph(name){ return PLATE_GLYPHS[name] || ''; }

let _lastEncycPlantId = null;
function renderEncyclopedia(p) {
  const plates = p.plates || [];
  // Reset to Plate I when opening a different plant
  if (_lastEncycPlantId !== p.id) {
    state.currentPlate = 0;
    _lastEncycPlantId = p.id;
  }
  // 4 plates: Habit / Particulars / Companions / Journal (Seasons was removed).
  const idx = Math.max(0, Math.min(state.currentPlate || 0, 3));
  const plateNo = p.plateNo || String(p.id).padStart(3,'0');
  const fmtBloom = () => {
    if (!p.bloomMonths || !p.bloomMonths.length) return '—';
    return MONTHS[p.bloomMonths[0]-1] + ' – ' + MONTHS[p.bloomMonths[p.bloomMonths.length-1]-1];
  };
  const monthsRow = () => {
    const set = new Set(p.bloomMonths || []);
    return MONTHS.map((m,i) =>
      `<div class="month${set.has(i+1)?' on':''}">${m}</div>`
    ).join('');
  };

  // ---------- Plate I — Habit ----------
  // Glyphs for what the plant attracts. Hummingbird gets its own row above
  // bee + butterfly (per data: only render hummingbird if the entry exists).
  // Generic "Birds" is intentionally ignored — only "Hummingbirds" wins.
  const attractsArr = (p.attracts||[]).map(a=>a.toLowerCase());
  const hasHummingbird = attractsArr.some(a => a.startsWith('hum'));
  const hasBees = attractsArr.some(a => a.startsWith('bee'));
  const hasButterflies = attractsArr.some(a => a.startsWith('but'));
  const habitHummingbirdIcon = hasHummingbird ? plateGlyph('hummingbird') : '';
  const habitBeeIcon = hasBees ? plateGlyph('bee') : '';
  const habitButterflyIcon = hasButterflies ? plateGlyph('butterfly') : '';
  const habitFlags = [
    p.deerResistant && 'Deer-safe',
    p.rabbitResistant && 'Rabbit-safe',
    p.droughtTolerant && 'Drought Resistant',
    p.reblooming && 'Reblooming'
  ].filter(Boolean).map(label => `<span class="flag">${label}</span>`).join('');
  // Older plates (e.g. Coneflower) had the plant name baked into the
  // background image. New plates leave the bottom clear so we typeset the
  // name here as real HTML — sharp letterforms + reliable spelling.
  const showNameOverlay = !p.plateHasBakedName;
  const plateHabit = `
    <div class="plate-page" data-idx="0" style="background-image:url('${p.plateImage}')">
      ${showNameOverlay ? `<div class="plate-habit-name">
        <div class="plate-name-common">${escHtml(commonName(p))}</div>
        ${p.botanical ? `<div class="plate-name-botanical">${escHtml(p.botanical)}</div>` : ''}
      </div>` : ''}
      ${(habitHummingbirdIcon || habitBeeIcon || habitButterflyIcon) ? `<div class="plate-habit-pollinators">
        ${habitHummingbirdIcon ? `<span class="hum">${habitHummingbirdIcon}</span>` : ''}
        ${habitBeeIcon ? `<span class="bee">${habitBeeIcon}</span>` : ''}
        ${habitButterflyIcon ? `<span class="butterfly">${habitButterflyIcon}</span>` : ''}
      </div>` : ''}
      <div class="plate-habit-stats">
        ${p.sun ? `<div class="stat"><span class="ico">☀</span><span>${escHtml(p.sun)}</span></div>` : ''}
        ${fmtBloom() && fmtBloom() !== '—' ? `<div class="stat"><span class="ico">✿</span><span>${escHtml(fmtBloom())}</span></div>` : ''}
      </div>
      ${habitFlags ? `<div class="plate-habit-flags">${habitFlags}</div>` : ''}
    </div>`;

  // ---------- Plate II — Particulars ----------
  // (Light/Bloom/Attracts + tolerance flags moved to Plate I.)
  // fertMonthStr used by both Plate II (Suggested Fertilization) and Plate III.
  const fertMonthStr = (p.fertMonth || []).length
    ? p.fertMonth.map(m => MONTHS[m-1]).join(', ')
    : '';
  // videoHref used by the "▶ Watch care videos" link at the bottom of Plate II.
  const videoHref = p.video ? (p.video.startsWith('http') ? p.video : 'https://www.youtube.com/results?search_query=' + encodeURIComponent(p.video)) : null;
  // careCards is shown at the bottom of Plate II (Care Tips).
  // data-month is used by initMonthlyCareCenter to scroll the current month
  // into view on open (one-month-at-a-time carousel).
  const MONTHS_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const careCards = Object.entries(p.care || {})
    .sort((a,b) => Number(a[0]) - Number(b[0]))
    .map(([m,t]) =>
      `<div class="plate-mo-card" data-month="${m}"><div class="mo">${MONTHS_FULL[Number(m)-1]}:</div><div class="task">${escHtml(t)}</div></div>`
    ).join('');
  const plateParticulars = `
    <div class="plate-page plate-particulars" data-idx="1" style="background-image:url('${p.plateBack}')">
      <div class="plate-ledger">
        ${p.hardiness ? `<div class="row"><span class="lbl">Hardiness</span><span class="val">Zone ${escHtml(p.hardiness)}</span></div>` : ''}
        <div class="row"><span class="lbl">Height</span><span class="val">${p.height||'—'}</span></div>
        <div class="row"><span class="lbl">Width</span><span class="val">${p.width||'—'}</span></div>
        <div class="row"><span class="lbl">Water</span><span class="val">${p.waterReq||'—'}</span></div>
        <div class="row"><span class="lbl">Soil pH</span><span class="val">${p.ph||'—'}</span></div>
      </div>
      <div class="plate-overlay">
        ${p.description ? `<div class="plate-desc">${escHtml(p.description)}</div>` : ''}
        ${(p.bloomMonths && p.bloomMonths.length) ? `<div class="plate-prose-block">
          <div class="heading">Bloom Calendar</div>
          <div class="plate-bloom-strip">${monthsRow()}</div>
        </div>` : ''}
        ${p.foliageInterest ? `<div class="plate-prose-block">
          <div class="heading">Foliage Highlight</div>
          <div class="body">${escHtml(p.foliageInterest)}</div>
        </div>` : ''}
        ${p.yearRound ? `<div class="plate-prose-block">
          <div class="heading">Year Round Interest</div>
          <div class="body">${escHtml(p.yearRound)}</div>
        </div>` : ''}
        ${p.sun ? `<div class="plate-prose-block">
          <div class="heading">Light Preference</div>
          <div class="body">${escHtml(p.sun)}${p.regionalLightNote ? ` — ${escHtml(p.regionalLightNote)}` : ''}</div>
        </div>` : ''}
        ${p.fertilizer ? `<div class="plate-prose-block">
          <div class="heading">Suggested Fertilization</div>
          <div class="body">${escHtml(p.fertilizer)}${fertMonthStr ? ` (apply: ${fertMonthStr})` : ''}</div>
        </div>` : ''}
        ${careCards ? `<div class="plate-prose-block">
          <div class="heading">Care Tips</div>
          <div class="plate-h-scroll">${careCards}</div>
        </div>` : ''}
      </div>
    </div>`;

  // (Plate III — Seasons & Care was removed: its content is on Plate II now.)

  // ---------- Plate III — Plants & Companions ----------
  const compList = (p.companions||[]).slice(0,8).map(name => {
    const cp = PLANTS.find(pp => pp.name.toLowerCase().includes(name.toLowerCase()) || (pp.botanical||'').toLowerCase().includes(name.toLowerCase()));
    const col = cp ? getBedPlantColor(cp) : '#8a6d4a';
    const linkOpen = cp ? `<a href="#" class="plate-link" onclick="event.preventDefault();state.prevPlantId=${p.id};state.detailId=${cp.id};render()">` : '<span>';
    const linkClose = cp ? '</a>' : '</span>';
    return `<div class="comp-row"><span class="comp-dot" style="background:${col}"></span>${linkOpen}${escHtml(name)}${linkClose}</div>`;
  }).join('');
  const cultivarsList = (p.cultivars||[]).map(c => {
    // Extract brand tag if present (e.g. "Magnus [PW]" -> name="Magnus", brand="PW")
    const m = c.match(/^(.*?)\s*\[(PW|Monrovia|First Ed\.)\]\s*$/);
    const name = m ? m[1].trim() : c.trim();
    const brand = m ? m[2] : '';
    return `<div class="plate-cv-card">
      <div class="name">${escHtml(name)}</div>
      ${brand ? `<span class="brand">${escHtml(brand)}</span>` : ''}
    </div>`;
  }).join('');
  const regionalItems = p.regionalCultivars || [];
  const regionalCount = regionalItems.length;
  // remainder = how many entries sit alone on the final grid row (0/1/2).
  // CSS uses data-remainder="1" to center a single trailing item under column 2.
  const regionalRemainder = regionalCount % 3;
  const regionalList = regionalItems.map(c =>
    `<div class="cv">${escHtml(c)}</div>`
  ).join('');
  const stylePills = (p.gardenStyles||[]).map(s =>
    `<span class="pill">${escHtml(s)}</span>`
  ).join('');
  const myP = (state.garden[String(p.id)] || {}).myPairings || [];
  const pairingChips = myP.map((name, idx) => {
    const found = PLANTS.find(pp => pp.name.toLowerCase() === name.toLowerCase());
    const planted = found && isPlanted(found.id);
    return `<span class="plate-pairing-chip">${planted ? '🌱 ' : ''}${escHtml(name)}<span class="remove" onclick="removeMyPairing(${p.id},${idx})">×</span></span>`;
  }).join('');
  const groupLabelsSvg = (p.plateGroup && p.plateGroupLabels && p.plateGroupLabels.length) ? `
    <svg class="plate-group-labels" viewBox="0 0 388 690" preserveAspectRatio="xMidYMid meet">
      ${p.plateGroupLabels.map(l => {
        // If cx/cy present → quadratic-Bezier curve (M sx sy Q cx cy px py).
        // Otherwise → straight line (M sx sy L px py). Endpoints target the
        // outer edge of each plant so the line stops AT the plant, not inside.
        const hasCurve = (l.cx !== undefined && l.cy !== undefined);
        const d = hasCurve
          ? `M ${l.sx} ${l.sy} Q ${l.cx} ${l.cy}, ${l.px} ${l.py}`
          : `M ${l.sx} ${l.sy} L ${l.px} ${l.py}`;
        // Look up the target plant in PLANTS — match by targetName (if the
        // display label is an alias like "Larkspur" → "Delphinium") or by
        // the label itself. Falls back to a plain text node if no match.
        const searchName = (l.targetName || l.label).toLowerCase();
        const cp = PLANTS.find(pp =>
          (pp.name || '').toLowerCase().includes(searchName) ||
          (pp.botanical || '').toLowerCase().includes(searchName)
        );
        const textCls = cp ? 'pgl-text pgl-link' : 'pgl-text';
        const onclickAttr = cp
          ? ` onclick="event.preventDefault();state.prevPlantId=${p.id};state.detailId=${cp.id};render()"`
          : '';
        return `
          <path d="${d}" class="pgl-line"/>
          <circle cx="${l.px}" cy="${l.py}" r="2" class="pgl-dot"/>
          <text x="${l.lx}" y="${l.ly}" text-anchor="${l.anchor||'start'}" class="${textCls}"${onclickAttr}>${escHtml(l.label)}</text>
        `;
      }).join('')}
    </svg>` : '';
  const plateCompanions = `
    <div class="plate-page plate-companions ${p.plateGroup ? '' : 'no-bg'}" data-idx="2"${p.plateGroup ? ` style="background-image:url('${p.plateGroup}')"` : ''}>
      ${groupLabelsSvg}
      <div class="plate-overlay">
        ${stylePills ? `<div class="plate-prose-block">
          <div class="heading">Garden Styles</div>
          <div class="plate-tag-list">${stylePills}</div>
        </div>` : ''}
      </div>

// Page-flip navigation. Pages before the current index are flipped to the
// left (rotateY(-180)); current + future pages sit at rotateY(0), with the
// current on top of the stack.
//
// Advance (0 → 1): the previously-current page (0) gets .plate-flipped and
//   animates rotating out to the left, revealing the destination underneath.
// Retreat (1 → 0): the destination page (0) drops .plate-flipped and
//   animates rotating IN from the left, covering the previously-current page.
// Both directions read as book-natural: forward = the page you were on
// flips away; back = the previous page swings back into view.
function refreshPlateStack(newIdx, oldIdx) {
  const pages = document.querySelectorAll('#platePages .plate-page');
  if (!pages.length) return;
  pages.forEach((page, i) => {
    if (i < newIdx) {
      // Already-flipped-past page — sits on the left stack.
      page.classList.add('plate-flipped');
      if (i === oldIdx) {
        // This page went from current → flipped this turn (we're advancing over
        // it). Keep it visually on TOP during the rotation so we can see it
        // turning — otherwise the destination underneath (higher z-index) would
        // cover the flip and you'd see no animation. Drop it back after the
        // transition ends.
        page.style.zIndex = 200;
        const onEnd = e => {
          if (e.propertyName !== 'transform') return;
          page.style.zIndex = 100 + i;
          page.removeEventListener('transitionend', onEnd);
        };
        page.addEventListener('transitionend', onEnd);
      } else {
        page.style.zIndex = 100 + i;
      }
    } else {
      // Current + future pages sit on the right; current is on top.
      page.classList.remove('plate-flipped');
      page.style.zIndex = 100 - i + (i === newIdx ? 50 : 0);
    }
  });
  document.querySelectorAll('.plate-dot').forEach((d,i) => d.classList.toggle('active', i === newIdx));
}

function goToPlate(idx) {
  const pages = document.querySelectorAll('#platePages .plate-page');
  const total = pages.length || 4;
  idx = Math.max(0, Math.min(idx, total - 1));
  if (idx === state.currentPlate) return;
  const oldIdx = state.currentPlate;
  state.currentPlate = idx;
  refreshPlateStack(idx, oldIdx);
}

// Attach swipe (left/right) + tap-zone (right half → next, left half → prev)
// navigation to the plate stack. Called from render() after DOM insertion.
function initPlateFlip() {
  const stack = document.getElementById('platePages');
  if (!stack) return;
  refreshPlateStack(state.currentPlate || 0, state.currentPlate || 0);
  let startX = 0, startY = 0, moved = false;
  stack.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX; startY = e.touches[0].clientY; moved = false;
  }, { passive: true });
  stack.addEventListener('touchmove', e => { moved = true; }, { passive: true });
  stack.addEventListener('touchend', e => {
    if (!moved) return;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
      goToPlate((state.currentPlate || 0) + (dx < 0 ? 1 : -1));
    }
  }, { passive: true });
  // Tap zones for mouse/desktop and single-tap navigation.
  stack.addEventListener('click', e => {
    // Don't intercept clicks on interactive elements inside the plate.
    if (e.target.closest('a, button, input, textarea, .plate-dot, .pgl-link, .plate-link, [onclick]')) return;
    const rect = stack.getBoundingClientRect();
    const relX = (e.clientX - rect.left) / rect.width;
    if (relX < 0.35) goToPlate((state.currentPlate || 0) - 1);
    else if (relX > 0.65) goToPlate((state.currentPlate || 0) + 1);
  });
}

        ${c.notes ? `<div style="font-size:11px;color:var(--text-light);line-height:1.4;padding:5px 7px;background:rgba(255,255,255,.03);border-radius:6px;border-left:2px solid rgba(96,165,250,.2);margin-bottom:8px">${escHtml(c.notes)}</div>` : ''}
        <div style="display:flex;flex-direction:column;gap:6px;padding-top:8px;border-top:1px solid rgba(255,255,255,.07)">
          <div style="display:flex;align-items:center;gap:8px">
            <div class="task-check ${c.planted?'done':''}" onclick="toggleCultivarPlanted(${p.id},${i})" style="width:22px;height:22px;border-radius:6px;flex-shrink:0">${c.planted?'✓':''}</div>
            <span style="font-size:13px;font-weight:600;color:var(--green)">Planted in my garden</span>
          </div>
          ${c.planted ? `
            <div style="padding-left:30px;display:flex;flex-direction:column;gap:6px">
              <input type="text" value="${(c.where||'').replace(/"/g,'&quot;')}" placeholder="Where (e.g. Front bed)" oninput="updateCultivarWhere(${p.id},${i},this.value)" style="width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;background:rgba(255,255,255,.06);color:var(--text);outline:none;font-family:'Inter',system-ui,sans-serif">
              <textarea placeholder="Notes about this cultivar..." oninput="updateCultivarNotes(${p.id},${i},this.value)" style="width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;background:rgba(255,255,255,.06);color:var(--text);outline:none;font-family:'Inter',system-ui,sans-serif;resize:vertical;min-height:60px;box-sizing:border-box">${escHtml(c.cultivarNotes||'')}</textarea>
            </div>` : ''}
          <div style="display:flex;align-items:center;gap:8px">
            <div class="task-check ${c.wishlist?'done':''}" onclick="toggleCultivarWishlist(${p.id},${i})" style="width:22px;height:22px;border-radius:6px;flex-shrink:0;border-color:rgba(251,146,60,.4)">${c.wishlist?'★':''}</div>
            <span style="font-size:13px;font-weight:600;color:#fb923c">On my wishlist</span>
          </div>
        </div>
      </div>`;
    }).join('');

    return `<div class="ds" style="background:rgba(96,165,250,.04);border:1px solid rgba(96,165,250,.12);margin-top:0">
      <div style="padding:16px 18px">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
          <div class="ds-icon" style="background:linear-gradient(135deg,#1e3a5f,#1d4ed8);color:#93c5fd"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 0 1 10 10c0 5.52-4.48 10-10 10S2 17.52 2 12c0-2.76 1.12-5.26 2.93-7.07"/><path d="M12 6v6l4 2"/></svg></div>
          <h3 style="font-family:'Playfair Display',Georgia,serif;font-size:15px;font-weight:700;color:#93c5fd;margin:0">Cultivars</h3>
        </div>
        ${cultivars.length ? `<div style="display:flex;flex-direction:column;gap:10px;margin-bottom:12px">${cards}</div>` : `<p style="font-size:13px;color:var(--text-light);margin-bottom:12px;text-align:center;padding:10px;background:rgba(255,255,255,.03);border-radius:8px">No cultivars yet — add one manually or scan a tag</p>`}
        ${viewing ? '' : `<div style="display:flex;gap:8px">
          <div onclick="addCultivar(${p.id})" style="flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:9px;border-radius:10px;border:1px dashed rgba(96,165,250,.3);cursor:pointer;color:#93c5fd;font-size:12px;font-weight:500;transition:background .2s" onmouseover="this.style.background='rgba(96,165,250,.06)'" onmouseout="this.style.background='transparent'">+ Add cultivar</div>
          ${hasKey ? `<div onclick="openCultivarScan(${p.id})" style="flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:9px;border-radius:10px;border:1px dashed rgba(96,165,250,.3);cursor:pointer;color:#93c5fd;font-size:12px;font-weight:500;transition:background .2s" onmouseover="this.style.background='rgba(96,165,250,.06)'" onmouseout="this.style.background='transparent'"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg> Scan tag</div>` : ''}
        </div>`}
      </div>
    </div>`;
  })();

  // Notes / Journal card
  const noteValRaw = state.notes[String(p.id)] || '';
  const noteVal = noteValRaw.replace(/"/g,'&quot;').replace(/</g,'&lt;');
  const notesCard = viewing
    ? (noteValRaw.trim()
      ? `<div class="ds" style="background:rgba(212,160,23,.06);border:1px solid rgba(212,160,23,.15)">
          <div style="padding:16px 18px">
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
              <div class="ds-icon" style="background:linear-gradient(135deg,#92400e,#b45309);color:#fff"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></div>
              <h3 style="font-family:'Playfair Display',Georgia,serif;font-size:15px;font-weight:700;color:#f5c842;margin:0">Notes</h3>
            </div>
            <div style="font-size:13px;color:var(--text);line-height:1.55;white-space:pre-wrap;padding:10px 12px;border:1px solid rgba(212,160,23,.2);border-radius:10px;background:rgba(212,160,23,.05)">${escHtml(noteValRaw)}</div>
          </div>
        </div>`
      : '')
    : `<div class="ds" style="background:rgba(212,160,23,.06);border:1px solid rgba(212,160,23,.15)">
    <div style="padding:16px 18px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
        <div class="ds-icon" style="background:linear-gradient(135deg,#92400e,#b45309);color:#fff"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></div>
        <h3 style="font-family:'Playfair Display',Georgia,serif;font-size:15px;font-weight:700;color:#f5c842;margin:0">My Notes</h3>
      </div>
      <textarea id="plantNotes" placeholder="Observations, pest issues, what worked, what didn't..." oninput="updatePlantNote(${p.id},this.value)" style="width:100%;min-height:80px;padding:10px 12px;border:1px solid rgba(212,160,23,.25);border-radius:10px;font-size:13px;background:rgba(212,160,23,.05);color:var(--text);outline:none;font-family:'Inter',system-ui,sans-serif;resize:vertical;line-height:1.5">${noteVal}</textarea>
    </div>
  </div>`;

  // Build sections
  const sections = [];

  // About — always open
  sections.push(S(IC.about, 'rgba(74,222,128,.1)', '#4ade80', '#22804a', 'About', `<p>${p.description||""}</p>`, true));

  // Plant Info — always open
  sections.push(S(IC.info, 'rgba(74,222,128,.1)', '#4ade80', '#22804a', 'Plant Info', `
    <div class="info-grid">
      <div class="info-item"><div class="label">Botanical</div><div class="value">${p.botanical||"—"}</div></div>
      <div class="info-item"><div class="label">Type</div><div class="value">${p.type||"—"}</div></div>
      <div class="info-item"><div class="label">Height</div><div class="value">${p.height||"—"}</div></div>
      <div class="info-item"><div class="label">Width</div><div class="value">${p.width||"—"}</div></div>
      <div class="info-item"><div class="label">Light</div><div class="value">${p.sun||"—"}</div></div>
      <div class="info-item"><div class="label">Water</div><div class="value">${p.waterReq||"—"}</div></div>
      <div class="info-item"><div class="label">Soil pH</div><div class="value">${p.ph||"—"}</div></div>
      <div class="info-item"><div class="label">Drought</div><div class="value">${p.droughtTolerant?"Yes":"No"}</div></div>
      <div class="info-item"><div class="label">Deer Resist</div><div class="value">${p.deerResistant?"Yes":"No"}</div></div>
      <div class="info-item"><div class="label">Rabbit Resist</div><div class="value">${p.rabbitResistant?"Yes":"No"}</div></div>
      <div class="info-item"><div class="label">Reblooming</div><div class="value">${p.reblooming?(p.rebloomNote||"Yes"):"No"}</div></div>
      <div class="info-item"><div class="label">Native OH</div><div class="value">${p.nativeOhio?"Yes":"No"}</div></div>
    </div>`, true));

  // Bloom Calendar — open
  sections.push(S(IC.bloom, 'rgba(244,114,182,.1)', '#f472b6', '#ec4899', 'Bloom Calendar', `<div class="bloom-bar">${bloomBar}</div>`, true));

  // Attracts
  if (p.attracts&&p.attracts.length) sections.push(S(IC.attract, 'rgba(212,160,23,.12)', '#f5c842', '#d4a017', 'Attracts', `<div class="tag-list">${p.attracts.map(a=>`<span class="tag-pill" style="background:rgba(212,160,23,.1);color:#f5c842;border:1px solid rgba(212,160,23,.25)">${a}</span>`).join("")}</div>`, true));

  // Foliage Interest
  if (p.foliageInterest) sections.push(S(IC.foliage, 'rgba(52,211,153,.1)', '#34d399', '#10b981', 'Foliage Interest', `<p>${p.foliageInterest}</p>`, false));

  // Year-Round Interest
  if (p.yearRound) sections.push(S(IC.year, 'rgba(96,165,250,.1)', '#93c5fd', '#60a5fa', 'Year-Round Interest', `<p>${p.yearRound}</p>`, false));

  // Companions (big section, open)
  if (p.companions&&p.companions.length) {
    const cardColorMap = getCompanionColorMap(p);
    const compCards = p.companions.map(c=>{
      const cc = cardColorMap[c] || COMP_COLORS[0];
      const found = findPlantByName(c);
      if (!found) return `<div style="display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid ${cc.light};font-size:12px;color:${cc.light}">${c}</div>`;
      const foundPhotos = getPhotos(found.id);
      const imgUrl = (foundPhotos.length ? foundPhotos[0] : null) || localStorage.getItem('pimg_' + found.id);
      const thumb = imgUrl
        ? `<img src="${imgUrl}" style="width:40px;height:40px;border-radius:8px;object-fit:cover;flex-shrink:0">`
        : `<div style="width:40px;height:40px;border-radius:8px;background:${cc.bg};display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px">🌱</div>`;
      return `<a href="#" onclick="event.preventDefault();state.prevPlantId=${p.id};state.detailId=${found.id};render();window.scrollTo(0,0)" style="display:inline-flex;align-items:center;gap:8px;padding:6px 10px 6px 6px;border-radius:12px;background:rgba(255,255,255,.04);border:1.5px solid ${cc.dark};text-decoration:none;color:var(--text);transition:background .2s;cursor:pointer" onmouseover="this.style.background='${cc.bg}'" onmouseout="this.style.background='rgba(255,255,255,.04)'">
        ${thumb}
        <div style="min-width:0">
          <div style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:${cc.light}">${found.name}</div>
          <div style="font-size:10px;color:var(--text-light);font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${found.botanical||''}</div>
        </div>
      </a>`;
    }).join("");
    const compContent = `<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px">${compCards}</div>
      <div style="font-size:11px;font-weight:700;color:var(--gold-light);text-transform:uppercase;letter-spacing:1px;margin:16px 0 6px">Bloom &amp; Foliage Timeline</div>
      ${renderCompanionBloom(p)}
      ${renderCompanionHeight(p) ? `<div style="font-size:11px;font-weight:700;color:var(--gold-light);text-transform:uppercase;letter-spacing:1px;margin:18px 0 6px">Height Comparison</div>${renderCompanionHeight(p)}` : ''}`;
    sections.push(S(IC.companion, 'rgba(96,165,250,.1)', '#93c5fd', '#60a5fa', 'Suggested Companions', compContent, true));
  }

  // My Pairings — always shown, user-editable (read-only when viewing)
  {
    const myP = (state.garden[String(p.id)] || {}).myPairings || [];
    if (!viewing || myP.length > 0) {
      const pairingIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>`;
      const chips = myP.map((name, idx) => {
        const found = findPlantByName(name);
        const planted = found && isPlanted(found.id);
        const namePart = found
          ? `<a href="#" onclick="event.preventDefault();state.prevPlantId=${p.id};state.detailId=${found.id};render();window.scrollTo(0,0)" style="color:#4ade80;text-decoration:none;font-weight:600">${escHtml(name)}</a>`
          : `<span style="color:#4ade80;font-weight:600">${escHtml(name)}</span>`;
        return `<span style="display:inline-flex;align-items:center;gap:5px;padding:5px 8px 5px 10px;border-radius:20px;border:1.5px solid rgba(74,222,128,.3);background:rgba(74,222,128,.06);font-size:12px">
          ${planted ? '<span style="font-size:9px">🌱</span>' : ''}${namePart}
          ${viewing ? '' : `<span onclick="removeMyPairing(${p.id},${idx})" title="Remove" style="cursor:pointer;color:var(--text-light);font-size:16px;line-height:1;padding:0 2px;opacity:.7">&times;</span>`}
        </span>`;
      }).join('');
      const bloomChart = myP.length ? renderPairingsBloom(p, myP) : '';
      const heightChart = myP.length ? renderPairingsHeight(p, myP) : '';
      const myPairingsContent = `
        ${myP.length ? `<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px">${chips}</div>` : ''}
        ${viewing ? '' : `<div style="position:relative">
          <input id="pairing-input" type="text" placeholder="Search any plant or type a name…" autocomplete="off"
            oninput="updatePairingInput(${p.id},this.value)"
            onkeydown="if(event.key==='Enter'&&this.value.trim())selectPairing(${p.id},this.value.trim())"
            onblur="setTimeout(()=>{const d=document.getElementById('pairing-dropdown');if(d)d.style.display='none'},200)"
            onfocus="if(this.value.trim())updatePairingInput(${p.id},this.value)"
            style="width:100%;padding:10px 12px;border:1px solid rgba(74,222,128,.25);border-radius:10px;font-size:14px;background:rgba(74,222,128,.05);color:var(--text);outline:none;font-family:'Inter',system-ui,sans-serif">
          <div id="pairing-dropdown" style="display:none;position:absolute;left:0;right:0;top:calc(100% + 2px);background:#111c16;border:1px solid rgba(74,222,128,.2);border-radius:10px;overflow:hidden;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.5)"></div>
        </div>
        <p style="font-size:11px;color:var(--text-light);margin-top:8px">${myP.length ? '🌱 = in your garden · tap name to open plant page' : 'Record combinations that work well together. Tap a saved name to open its page.'}</p>`}
        ${viewing && myP.length ? `<p style="font-size:11px;color:var(--text-light);margin-top:8px">🌱 = in your garden</p>` : ''}
        ${bloomChart ? `<div style="font-size:11px;font-weight:700;color:var(--gold-light);text-transform:uppercase;letter-spacing:1px;margin:16px 0 6px">Bloom &amp; Foliage Timeline</div>${bloomChart}` : ''}
        ${heightChart ? `<div style="font-size:11px;font-weight:700;color:var(--gold-light);text-transform:uppercase;letter-spacing:1px;margin:18px 0 6px">Height Comparison</div>${heightChart}` : ''}`;
      sections.push(S(pairingIcon, 'rgba(74,222,128,.1)', '#4ade80', '#22804a', viewing ? 'Pairings' : 'My Pairings', myPairingsContent, true));
    }
  }

  // Garden Styles
  if (p.gardenStyles&&p.gardenStyles.length) sections.push(S(IC.style, 'rgba(167,139,250,.1)', '#c4b5fd', '#a78bfa', 'Garden Styles', `<div class="tag-list">${p.gardenStyles.map(s=>`<span class="tag-pill" style="background:rgba(167,139,250,.08);color:#c4b5fd;border:1px solid rgba(167,139,250,.2)">${s}</span>`).join("")}</div>`, false));

  // Notable Cultivars
  if (p.regionalCultivars&&p.regionalCultivars.length) sections.push(S(IC.cultivar, 'rgba(244,114,182,.1)', '#f472b6', '#ec4899', 'Notable Cultivars', p.regionalCultivars.map(c=>`<div class="cultivar-item">${c}</div>`).join(""), false));

  // Cultivars — color-code brand tags
  if (p.cultivars&&p.cultivars.length) sections.push(S(IC.seedling, 'rgba(129,140,248,.1)', '#a5b4fc', '#818cf8', 'Cultivars', p.cultivars.map(c=>{
    let display = c.replace(/\[PW\]/g, '<span style="font-size:10px;padding:1px 6px;border-radius:8px;background:rgba(255,255,255,.1);color:#e2e8f0;margin-left:4px;font-weight:600">PW</span>')
      .replace(/\[Monrovia\]/g, '<span style="font-size:10px;padding:1px 6px;border-radius:8px;background:rgba(139,92,246,.15);color:#a78bfa;margin-left:4px;font-weight:600">Monrovia</span>')
      .replace(/\[First Ed\.\]/g, '<span style="font-size:10px;padding:1px 6px;border-radius:8px;background:rgba(244,114,182,.15);color:#f472b6;margin-left:4px;font-weight:600">First Ed.</span>');
    return `<div class="cultivar-item">${display}</div>`;
  }).join(""), false));

  // Fertilizer
  sections.push(S(IC.fert, 'rgba(212,160,23,.12)', '#f5c842', '#d4a017', 'Fertilizer', `<p>${p.fertilizer||"—"}</p>${p.fertMonth&&p.fertMonth.length?`<p style="margin-top:6px;font-size:12px;color:var(--text-light);font-weight:500">Apply: ${p.fertMonth.map(m=>MONTHS[m-1]).join(", ")}</p>`:''}`, false));

  // Monthly Care
  if (careHtml) sections.push(S(IC.care, 'rgba(251,146,60,.1)', '#fb923c', '#f97316', 'Monthly Care', careHtml, false));

  // Light Notes
  if (p.regionalLightNote) sections.push(S(IC.light, 'rgba(212,160,23,.12)', '#f5c842', '#d4a017', 'Light Notes', `<p>${p.regionalLightNote}</p>`, false));

  // Where to Buy
  if (p.whereToBuy) sections.push(S(IC.buy, 'rgba(74,222,128,.1)', '#4ade80', '#22c55e', 'Where to Buy', `<p>${p.whereToBuy}</p>`, false));

  // When Available
  if (p.whenAvailable) sections.push(S(IC.calendar, 'rgba(96,165,250,.1)', '#93c5fd', '#60a5fa', 'When Available', `<p>${p.whenAvailable}</p>`, false));

  // Video
  if (p.video) sections.push(S(IC.video, 'rgba(248,113,113,.1)', '#f87171', '#ef4444', 'Learn More', `<a class="video-link" href="${p.video.startsWith('http')?p.video:'https://www.youtube.com/results?search_query='+encodeURIComponent(p.video)}" target="_blank" rel="noopener">Watch Care Videos</a>`, false));

  // Build photo list: user photos first, then DB image as fallback
  // Use fingerprint-based dedup to avoid O(n²) comparison on large base64 strings
  const plantPhotos = getPhotos(p.id);
  const pixImg = localStorage.getItem("pimg_" + p.id);
  const dbImg = pixImg || img;
  const _seen = new Set();
  const allPhotos = [...plantPhotos, ...(dbImg ? [dbImg] : [])].filter(x => {
    if (!x) return false;
    const fp = x.length > 200 ? x.slice(0, 200) : x;
    if (_seen.has(fp)) return false;
    _seen.add(fp);
    return true;
  });
  _heroPhotos = allPhotos;
  _heroIdx = 0;
  const heroPlaceholder = `<div class="hero-placeholder"><div style="font-size:48px;opacity:.25">${IC.seedling}</div></div>`;

  const dots = allPhotos.length > 1
    ? `<div style="position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:3">
        ${allPhotos.map((_,i) => `<div class="hero-dot" style="opacity:${i===0?'1':'.35'};transform:scale(${i===0?'1.2':'1'})"></div>`).join('')}
      </div>` : '';

  const thumbStrip = allPhotos.length > 1 || plantPhotos.length < MAX_PHOTOS ? `
    <div style="display:flex;gap:6px;padding:8px 14px;overflow-x:auto;background:var(--cream);border-bottom:1px solid var(--border);-webkit-overflow-scrolling:touch">
      ${allPhotos.map((ph,i) => `<div style="position:relative;flex:0 0 54px">
        <img class="hero-thumb" src="${ph}" style="width:54px;height:54px;object-fit:cover;border-radius:9px;border:2px solid ${i===0?'#4ade80':'transparent'};cursor:pointer;display:block" onclick="setHeroPhoto(${i})">
        ${i < plantPhotos.length ? `<div onclick="event.stopPropagation();if(confirm('Delete this photo?'))deletePhoto(${p.id},${i})" style="position:absolute;top:-5px;right:-5px;width:18px;height:18px;background:#ef4444;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;color:#fff;line-height:1;z-index:2">×</div>` : ''}
      </div>`).join('')}
      ${plantPhotos.length < MAX_PHOTOS ? `<div onclick="triggerPhotoUpload(${p.id})" style="flex:0 0 54px;height:54px;border-radius:9px;border:2px dashed rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-mid);font-size:22px">+</div>` : ''}
    </div>` : '';

  return `
    <div class="detail open ${p.plateImage ? 'plate-detail' : ''}">
      <div class="detail-hero ${p.plateImage ? 'plate-hero' : ''}" id="hero-wrap">

function renderCalendar() {
  const m = state.currentMonth;
  const monthPicker = MONTH_FULL.map((name,i)=>
    `<div class="chip ${m===i+1?'active':''}" onclick="state.currentMonth=${i+1};render()">${MONTHS[i]}</div>`
  ).join("");
  
  // Only show plants in my garden
  const myPlants = PLANTS.filter(p => isPlanted(p.id));

  // Get tasks for this month
  const tasks = [];
  myPlants.forEach(p => {
    const care = p.care||{};
    const task = care[String(m)];
    if (task) tasks.push({plant:p.name, task:task, id:p.id, key:`care_${p.id}_${m}`});
    // Also show fertilizer months
    if ((p.fertMonth||[]).includes(m)) {
      tasks.push({plant:p.name, task:`Fertilize: ${p.fertilizer||'as needed'}`, id:p.id, key:`fert_${p.id}_${m}`});
    }
  });

  // Blooming this month (alphabetical)
  const blooming = myPlants.filter(p=>(p.bloomMonths||[]).includes(m)).sort((a,b)=>a.name.localeCompare(b.name));
  
  tasks.sort((a,b) => a.plant.localeCompare(b.plant));

  if (!myPlants.length) return `
    <div class="filters">${monthPicker}</div>
    <div class="calendar-view"><div class="empty-state" style="padding:40px 20px;text-align:center;color:var(--text-mid)">Mark plants as "Planted in my garden" to see your personalized calendar here.</div></div>`;

  return `
    <div class="filters">${monthPicker}</div>
    <div class="calendar-view">
      <div class="cal-month">
        <h3>🌸 Blooming in ${MONTH_FULL[m-1]} (${blooming.length})</h3>
        ${blooming.map(p=>`
          <div class="cal-task" onclick="state.detailId=${p.id};render()" style="cursor:pointer">
            <span class="cal-plant">${p.name}</span>
            <span class="cal-action">${p.sun} · ${p.height||""}</span>
          </div>
        `).join("")}
        ${blooming.length===0?'<div class="empty-state">No plants blooming this month</div>':''}
      </div>
      <div class="cal-month">
        <h3>📋 Care Tasks (${tasks.length})</h3>
        ${tasks.map(t=>{
          const done = state.tasks[t.key];
          return `<div class="cal-task" style="display:flex;align-items:center;gap:10px;${done?'opacity:.5':''}">
            <div class="task-check ${done?'done':''}" onclick="event.stopPropagation();toggleTask('${t.key}')" style="width:22px;height:22px;border-radius:6px;flex-shrink:0;cursor:pointer">${done?'✓':''}</div>
            <div style="flex:1;${done?'text-decoration:line-through':''}">
              <span class="cal-plant">${t.plant}</span>
              <span class="cal-action">${t.task}</span>
            </div>
          </div>`;
        }).join("")}
        ${tasks.length===0?'<div class="empty-state">No tasks this month</div>':''}
      </div>
    </div>
  `;
}

// Plate II Monthly Care carousel: scroll to the card whose data-month matches
// the current month (or, if the plant has no care entry for this month, the
// nearest scheduled month). Called after render inserts the detail overlay.
function initMonthlyCareCenter() {
  const scroller = document.querySelector('.plate-particulars .plate-h-scroll');
  if (!scroller) return;
  const cards = scroller.querySelectorAll('.plate-mo-card[data-month]');
  if (!cards.length) return;
  const currentMonth = new Date().getMonth() + 1;
  let target = null;
  let minDiff = Infinity;
  cards.forEach(c => {
    const m = Number(c.dataset.month);
    // circular distance so December ↔ January = 1
    const raw = Math.abs(m - currentMonth);
    const diff = Math.min(raw, 12 - raw);
    if (diff < minDiff) { minDiff = diff; target = c; }
  });
  if (target) scroller.scrollLeft = target.offsetLeft;
}

function initHeroSwipe() {
  const wrap = document.getElementById('hero-wrap');
  if (!wrap || _heroPhotos.length < 2) return;
  let startX = 0, startY = 0, moved = false;
  wrap.addEventListener('touchstart', e => { startX = e.touches[0].clientX; startY = e.touches[0].clientY; moved = false; }, { passive: true });
  wrap.addEventListener('touchmove', e => { moved = true; }, { passive: true });
  wrap.addEventListener('touchend', e => {
    if (!moved) return;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 38) {
      setHeroPhoto((_heroIdx + (dx < 0 ? 1 : -1) + _heroPhotos.length) % _heroPhotos.length);
    }
  }, { passive: true });
}

function closeDetail() {

  const finish = () => { if (done) return; done = true; state.detailId = null; state.prevPlantId = null; render(); };
  el.addEventListener('animationend', finish, { once: true });

function fuzzyMatchPlants(query) {
  const q = query.toLowerCase().trim();
  if (!q) return [];
  const words = q.split(/\s+/);
  const scored = PLANTS.slice(0, _builtinPlantCount).map(p => {
    const nameL = (p.name||'').toLowerCase();
    const botL = (p.botanical||'').toLowerCase();
    let score = 0;
    if (nameL === q || botL === q) score = 100;
    else if (nameL.startsWith(q) || botL.startsWith(q)) score = 80;
    else if (nameL.includes(q) || botL.includes(q)) score = 60;
    else {
      const matched = words.filter(w => w.length > 2 && (nameL.includes(w) || botL.includes(w)));
      score = matched.length ? (matched.length / words.length) * 45 : 0;
    }
    return { plant: p, score };
  }).filter(r => r.score >= 30).sort((a,b) => b.score - a.score).slice(0, 4);
  return scored.map(r => r.plant);
}

    let userContent;

async function apUpdatePlant() {

  const plantId = state.apEditId;

    const updated = {

      sun: (f.sun||'').trim(),

      nativeOhio: !!f.nativeOhio,
      bloomMonths: f.bloomMonths || [],
      bloomColor: f.bloomColors || [],
      attracts: f.attracts || [],
      gardenStyles: f.gardenStyles || [],
      companions: f.companions || [],
      foliageInterest: (f.foliageInterest||'').trim(),
      yearRound: (f.yearRound||'').trim(),
      cultivars: f.cultivars || [],
      regionalCultivars: f.regionalCultivars || [],
      description: (f.description||'').trim(),
      regionalLightNote: (f.regionalLightNote||'').trim(),
      fertilizer: (f.fertilizer||'').trim(),
      fertMonth: f.fertMonth || [],
      care: f.care || {},
      whereToBuy: (f.whereToBuy||'').trim(),
      whenAvailable: (f.whenAvailable||'').trim(),
      video: (f.video||'').trim(),
      provenWinners: !!f.provenWinners,
      monrovia: !!f.monrovia,
      firstEditions: !!f.firstEditions,
      _updatedBy: _fbUserId || 'anon',
      _updatedAt: Date.now()
    };

    if (_fbDb) {
      let fbKey = state.apEditFbKey;
      // If we don't have the key cached, look it up from Firebase
      if (!fbKey) {
        const snap = await _fbDb.ref('shared_plants').orderByChild('id').equalTo(plantId).once('value');
        snap.forEach(child => { fbKey = child.key; });
      }
      if (fbKey) {
        // Existing Firebase record — update in place
        await _fbDb.ref('shared_plants/' + fbKey).update(updated);
      } else {
        // Built-in plant with no Firebase record — push as a new shared_plants entry
        const ref = await _fbDb.ref('shared_plants').push(updated);
        fbKey = ref.key;
        state.apEditFbKey = fbKey;
      }
    }

    // Update local PLANTS array immediately
    const idx = PLANTS.findIndex(p => p.id === plantId);
    if (idx !== -1) PLANTS[idx] = { ...updated, _fbKey: state.apEditFbKey };

    state.apLoading = false;
    state.apStep = 5;
    state.apChosen = updated;
  } catch(e) {
    state.apLoading = false;
    state.apError = 'Update failed: ' + (e.message||'unknown error');
  }
  render();
}

async function apScanTagPhotos() {

  const key = state.claudeApiKey || _sharedClaudeKey;
  if (!key) { state.apError = 'No API key set — add one in Settings.'; render(); return; }
  state.apStep = 3;
  state.apLoading = true;
  state.apError = '';
  state.apApiResults = [];
  render();
  const result = await apCallClaude('', images);
  state.apLoading = false;
  if (!result) { state.apError = 'No response from Claude.'; render(); return; }
  if (result.error) { state.apError = result.error; render(); return; }
  if (result.found && result.common_name) state.apName = result.common_name;
  state.apApiResults = [result];
  if (result.found && result.cycle === 'Perennial' && result.zone_6a) {
    apUseClaudeResult(result);
    return;
  }
  render();
}

async function apDoSearch() {
  const name = state.apName.trim();
  if (!name) { state.apError = 'Please enter a plant name.'; render(); return; }
  state.apError = '';

  // Step 2: local match (skip in edit mode — we're refreshing an existing plant)
  if (!state.apIsEditing) {
    const local = fuzzyMatchPlants(name);
    if (local.length) {
      state.apLocalMatches = local;
      state.apStep = 2;
      render();
      return;
    }
  }

  // No local match — go straight to API
  state.apStep = 3;
  state.apLoading = true;
  state.apApiResults = [];
  render();
  await apFetchFromApi(name);
}

async function apFetchFromApi(name) {
  state.apLoading = true;
  state.apApiResults = [];
  state.apError = '';
  render();
  if (!state.claudeApiKey && !_sharedClaudeKey) {
    state.apLoading = false;
    render();
    return;
  }
  const result = await apCallClaude(name || state.apName);
  state.apLoading = false;
  if (!result) { state.apApiResults = []; render(); return; }
  if (result.error) { state.apError = result.error; render(); return; }
  state.apApiResults = [result];
  // Auto-advance if it's a clean perennial/zone6 hit
  if (result.found && result.cycle === 'Perennial' && result.zone_6a) {
    apUseClaudeResult(result);
    return;
  }
  render();
}

      fertilizer: (f.fertilizer||'').trim(),

      care: f.care || {},
      // Availability
      whereToBuy: (f.whereToBuy||'').trim(),
      whenAvailable: (f.whenAvailable||'').trim(),
      video: (f.video||'').trim(),
      // Brand
      provenWinners: !!f.provenWinners,
      monrovia: !!f.monrovia,
      firstEditions: !!f.firstEditions,
      // Meta
      _addedBy: _fbUserId || 'anon',
      _addedAt: Date.now()
    };
    if (_fbDb) {
      await _fbDb.ref('shared_plants').push(plant);
    }
    // Add to local PLANTS immediately so detail view works without waiting
    // for the Firebase listener to re-sync
    if (!PLANTS.find(p => p.id === plant.id)) PLANTS.push(plant);
    state.apLoading = false;
    state.apStep = 5;
    state.apChosen = plant;
  } catch(e) {
    state.apLoading = false;
    state.apError = 'Save failed: ' + (e.message||'unknown error') +
      '. Make sure your Firebase rules allow writes to shared_plants.';
  }
  render();
}
