*{margin:0;padding:0;box-sizing:border-box}

:root{--green:#0b3d2c;--green-mid:#14532d;--green-light:#22804a;--green-accent:#4ade80;--green-bg:#071a12;--gold:#d4a017;--gold-light:#f5c842;--cream:#1a1f1c;--text:#e8ece9;--text-mid:#b0bab3;--text-light:#7a8a80;--bg:#0c1410;--card:#141f19;--border:#1e3028;--radius:14px;--shadow:0 2px 12px rgba(0,0,0,.3);--shadow-lg:0 8px 30px rgba(0,0,0,.4)}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-text-size-adjust:100%;min-height:100vh;padding-bottom:84px;-webkit-font-smoothing:antialiased}
.header{background:linear-gradient(160deg,#061208 0%,#0b3d2c 40%,#145236 100%);color:#fff;padding:20px 20px 16px;position:sticky;top:0;z-index:100;box-shadow:0 4px 24px rgba(0,0,0,.5);border-bottom:1px solid rgba(212,160,23,.2)}
.header h1{font-family:'Playfair Display',Georgia,serif;font-size:24px;font-weight:700;margin-bottom:4px;letter-spacing:-.3px;background:linear-gradient(135deg,#f5c842,#4ade80);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header p{font-size:12px;opacity:.65;letter-spacing:.8px;text-transform:uppercase;font-weight:500}
.search-bar{margin:12px 0 0;position:relative}
.search-bar input{width:100%;padding:12px 14px 12px 40px;border:1px solid rgba(255,255,255,.15);border-radius:10px;font-size:15px;background:rgba(255,255,255,.1);color:#fff;outline:none;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transition:border-color .2s,background .2s;font-family:'Inter',system-ui,sans-serif}
.search-bar input:focus{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.3)}
.search-bar input::placeholder{color:rgba(255,255,255,.5)}
.search-bar svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:18px;height:18px;stroke:rgba(255,255,255,.5);fill:none}
.filters{padding:10px 16px;overflow-x:auto;white-space:nowrap;display:flex;gap:8px;background:var(--cream);border-bottom:1px solid var(--border)}
.chip{display:inline-block;padding:7px 16px;border-radius:24px;font-size:12px;font-weight:600;background:rgba(255,255,255,.06);color:var(--text-light);cursor:pointer;border:1px solid var(--border);transition:all .25s ease;letter-spacing:.2px}
.chip:hover{border-color:rgba(74,222,128,.3);color:var(--green-accent)}
.chip.active{background:linear-gradient(135deg,#14532d,#166534);color:#4ade80;border-color:#22804a;box-shadow:0 2px 12px rgba(74,222,128,.2)}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding:16px}
@media(min-width:640px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:1024px){.grid{grid-template-columns:repeat(4,1fr);max-width:1100px;margin:0 auto}}
.card{background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:transform .2s ease,box-shadow .2s ease,border-color .2s;border:1px solid var(--border)}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:rgba(74,222,128,.25)}
.card:active{transform:scale(.97)}
.card img{width:100%;height:160px;object-fit:cover;background:#0a1f14}
.card .placeholder{width:100%;height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:32px;background:linear-gradient(135deg,#0a1f14,#0f2b1d)}
.card-body{padding:10px 12px 12px}
.card-body h3{font-family:'Playfair Display',Georgia,serif;font-size:14px;font-weight:600;line-height:1.35;margin-bottom:2px;color:var(--text)}
.card-body .meta{font-size:11px;color:var(--text-light);font-style:italic}
.badges{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.badge{font-size:10px;padding:3px 8px;border-radius:12px;font-weight:600;letter-spacing:.2px}
.badge-sun{background:rgba(212,160,23,.15);color:#f5c842;border:1px solid rgba(212,160,23,.3)}
.badge-shade{background:rgba(96,165,250,.12);color:#93c5fd;border:1px solid rgba(96,165,250,.25)}
.badge-deer{background:rgba(74,222,128,.1);color:#4ade80;border:1px solid rgba(74,222,128,.2)}
.badge-bloom{background:rgba(244,114,182,.12);color:#f472b6;border:1px solid rgba(244,114,182,.25)}
.detail{position:fixed;inset:0;background:#0c1410;z-index:200;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none}
.detail.open{display:block;animation:slideUp .35s cubic-bezier(.16,1,.3,1)}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeInUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.detail-hero{position:relative;width:100%;background:linear-gradient(135deg,#061208,#0b3d2c,#145236);padding:18px;display:flex;flex-direction:row;align-items:center;gap:18px;overflow:hidden;border-bottom:1px solid rgba(212,160,23,.15)}
.detail-hero img{width:160px;height:160px;object-fit:cover;display:block;border-radius:14px;flex-shrink:0;border:2px solid rgba(255,255,255,.2);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.detail-hero .hero-placeholder{width:160px;height:160px;border-radius:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.1)}
.detail-hero .hero-overlay{position:relative;display:flex;flex-direction:column;justify-content:center;padding:0;flex:1;min-width:0}
.detail-hero .hero-back{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:5;transition:background .2s;border:1px solid rgba(255,255,255,.15);margin-bottom:6px;flex-shrink:0}
.detail-hero .hero-back:hover{background:rgba(255,255,255,.25)}
.detail-hero .hero-back svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2.5}
.detail-hero h2{font-family:'Playfair Display',Georgia,serif;font-size:22px;font-weight:700;color:#fff;margin-bottom:4px;text-shadow:0 2px 8px rgba(0,0,0,.3);letter-spacing:-.3px;line-height:1.2}
.detail-hero .hero-sub{font-size:12px;color:rgba(255,255,255,.7);font-style:italic;margin-bottom:10px}
.hero-stats{display:flex;gap:8px;flex-wrap:wrap}
.hero-stat{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.2px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.hero-stat svg{width:14px;height:14px;flex-shrink:0}
.detail-body{padding:14px;display:flex;flex-direction:column;gap:12px}
.ds{background:var(--card);border-radius:16px;box-shadow:0 1px 8px rgba(0,0,0,.2);border:1px solid var(--border);overflow:hidden;animation:fadeInUp .4s ease both}
.ds:nth-child(2){animation-delay:.05s}.ds:nth-child(3){animation-delay:.1s}.ds:nth-child(4){animation-delay:.15s}.ds:nth-child(5){animation-delay:.2s}.ds:nth-child(6){animation-delay:.25s}

.task-row{display:flex;gap:12px;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.empty-state{text-align:center;padding:60px 24px;color:var(--text-light);font-size:15px;font-style:italic}

.nav-item{flex:1;padding:10px 4px 8px;text-align:center;cursor:pointer;color:#4a5a50;transition:color .2s}

.nav-item svg{width:24px;height:24px;margin:0 auto 3px;display:block}
.nav-item span{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.count-badge{background:var(--green);color:#fff;font-size:11px;padding:2px 8px;border-radius:10px;margin-left:4px}
</style>

const MAX_PHOTOS = 5;

function compressAndStorePhoto(plantId, file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const MAX = 400;
      let w = img.width, h = img.height;
      if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
      else { w = Math.round(w * MAX / h); h = MAX; }
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
      const key = String(plantId);
      if (!state.photos[key]) state.photos[key] = [];
      if (typeof state.photos[key] === 'string') state.photos[key] = [state.photos[key]];
      if (state.photos[key].length >= MAX_PHOTOS) state.photos[key].pop();
      state.photos[key].unshift(dataUrl); // newest first
      savePhotos();
      render();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function deletePhoto(plantId, index) {
  const key = String(plantId);
  const arr = getPhotos(plantId);
  if (index >= 0 && index < arr.length) {
    arr.splice(index, 1);
    state.photos[key] = arr.length > 0 ? arr : undefined;
    if (!arr.length) delete state.photos[key];
    savePhotos();
    render();
  }
}

// Initialize garden entries from pre-existing planted data (called after Firebase initial load)
function initGardenDefaults() {
  let changed = false;
  PLANTS.forEach(p => {
    if (p.planted && p.planted.length > 0 && !state.garden[p.id]) {
      state.garden[p.id] = { planted: true, name: p.planted.join(", "), where: "" };
      changed = true;

}

// Firebase real-time listener — merges on first load, then syncs ongoing changes
if (_fbReady && _fbRef) {
  _fbRef.on('value', snap => {
    const remoteData = snap.val();
    if (!_fbInitialLoadDone) {
      // First load: merge remote + local, remote wins for conflicts
      _fbSyncing = true;
      if (remoteData) {
        const localGarden = state.garden;
        // Start with remote as base
        state.garden = Object.assign({}, remoteData);
        // Add any local-only entries that don't exist in remote
        Object.keys(localGarden).forEach(id => {
          if (!state.garden[id]) {
            state.garden[id] = localGarden[id];
          }
        });
      }
      _fbInitialLoadDone = true;
      // Now run defaults and save merged result
      initGardenDefaults();
      localStorage.setItem("pt_garden", JSON.stringify(state.garden));
      render();
      _fbSyncing = false;
    } else if (remoteData && JSON.stringify(remoteData) !== JSON.stringify(state.garden)) {
      // Ongoing sync from other devices
      _fbSyncing = true;
      state.garden = remoteData;
      localStorage.setItem("pt_garden", JSON.stringify(remoteData));
      render();
      _fbSyncing = false;
    }
  });
} else {
  // No Firebase — just run defaults locally
  _fbInitialLoadDone = true;
  initGardenDefaults();
}

function getFiltered() {

  else if (state.filter === "shade") list = list.filter(p => p.sun === "Part Shade to Part Sun");
  else if (state.filter === "deepshade") list = list.filter(p => p.sun === "Shade to Part Shade");
  else if (state.filter === "deer") list = list.filter(p => p.deerResistant);
  else if (state.filter === "rabbit") list = list.filter(p => p.rabbitResistant);
  else if (state.filter === "drought") list = list.filter(p => p.droughtTolerant);
  else if (state.filter === "native") list = list.filter(p => p.nativeOhio);
  else if (state.filter === "blooming") list = list.filter(p => (p.bloomMonths||[]).includes(state.currentMonth));
  else if (state.filter === "planted") list = list.filter(p => isPlanted(p.id));
  else if (state.filter === "wishlist") list = list.filter(p => isWishlisted(p.id));
  else if (state.filter === "pw") list = list.filter(p => p.provenWinners);
  else if (state.filter === "monrovia") list = list.filter(p => p.monrovia);
  else if (state.filter === "fe") list = list.filter(p => p.firstEditions);
  else if (state.filter === "rebloom") list = list.filter(p => p.reblooming);
  else if (state.filter === "pollinator") list = list.filter(p => POLLINATOR_IDS.has(p.id));
  else if (state.filter === "hotdry") list = list.filter(p => HOTDRY_IDS.has(p.id));
  else if (state.filter === "moistsun") list = list.filter(p => MOIST_SUN_IDS.has(p.id));
  else if (state.filter === "moistshade") list = list.filter(p => MOIST_SHADE_IDS.has(p.id));
  else if (state.filter === "moistpart") list = list.filter(p => MOIST_PART_IDS.has(p.id));
  else if (state.filter === "raingarden") list = list.filter(p => RAINGARDEN_IDS.has(p.id));
  else if (state.filter === "woodland") list = list.filter(p => WOODLAND_IDS.has(p.id));
  else if (state.filter.startsWith("color:")) { const c = state.filter.split(":")[1]; list = list.filter(p => p.bloomColor === c); }
  const sunOrder = {"Part Sun to Full Sun":0, "Part Shade to Part Sun":1, "Shade to Part Shade":2};
  return list.sort((a,b) => {
    const sa = sunOrder[a.sun] ?? 3, sb = sunOrder[b.sun] ?? 3;
    return sa !== sb ? sa - sb : a.name.localeCompare(b.name);
  });
}

// ── Image Cache System ──
// Firebase stores permanent base64 thumbnails under /imageCache/{plantId}
// localStorage stores them too for offline/instant access
// Pixabay API only called when an image doesn't exist in either cache

let _imgCache = {}; // in-memory cache: { plantId: base64DataUrl }
let _imgCacheReady = false;

// Load image cache from Firebase on startup
if (_fbReady) {
  _fbDb.ref('imageCache').once('value', snap => {
    const data = snap.val();
    if (data) {
      _imgCache = data;
      // Also populate localStorage for offline access
      Object.keys(data).forEach(id => {
        if (!localStorage.getItem('pimg_' + id)) {
          localStorage.setItem('pimg_' + id, data[id]);
        }
      });
    }
    // Also pull any localStorage entries not yet in Firebase
    Object.keys(localStorage).filter(k => k.startsWith('pimg_')).forEach(k => {
      const id = k.replace('pimg_', '');
      const val = localStorage.getItem(k);
      if (val && val.startsWith('data:') && !_imgCache[id]) {
        _imgCache[id] = val;
      }
    });
    _imgCacheReady = true;
    render();
    // Start fetching any missing images
    setTimeout(fetchAllImages, 1000);
  });
} else {
  _imgCacheReady = true;
  setTimeout(fetchAllImages, 1000);
}

function getCachedImage(plantId) {
  const key = String(plantId);
  return _imgCache[key] || localStorage.getItem('pimg_' + key) || null;
}

function saveCachedImage(plantId, base64) {
  const key = String(plantId);
  _imgCache[key] = base64;
  localStorage.setItem('pimg_' + key, base64);
  // Write to Firebase individually (not the whole cache at once)
  if (_fbReady) {
    _fbDb.ref('imageCache/' + key).set(base64).catch(e => console.warn('Firebase img cache write failed:', e));
  }
}

function plantImage(p) {
  const photos = getPhotos(p.id);
  if (photos.length) return `<img src="${photos[0]}" alt="${p.name}" loading="lazy">`;
  const cached = getCachedImage(p.id);
  if (cached && cached.startsWith('data:')) return `<img src="${cached}" alt="${p.name}" loading="lazy">`;
  // Stale Pixabay URL in localStorage — clear it
  if (cached) localStorage.removeItem('pimg_' + p.id);
  const colors = ["#0f2b1d","#1a1525","#101d2e","#1f1a0f","#161225","#0f1f1c","#1f160f","#151f0f"];
  const c = colors[p.id % colors.length];
  const init = p.name.split(/[\s(]+/).filter(w=>w.length>1).slice(0,2).map(w=>w[0]).join("");
  return `<div class="placeholder" id="img-${p.id}" style="background:${c}"><span>🌱</span><span style="font-size:12px;color:#64748b">${init}</span></div>`;
}

// Convert an image URL to a compressed base64 data URL
function urlToBase64(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const MAX = 300;
      let w = img.width, h = img.height;
      if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
      else { w = Math.round(w * MAX / h); h = MAX; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', 0.6));
    };
    img.onerror = reject;
    img.src = url;
  });
}

const _pixQ = new Set();
let _pixThrottled = false;

async function fetchPixabayImage(p) {
  if (_pixQ.has(p.id) || _pixThrottled) return;
  _pixQ.add(p.id);
  if (getPhotos(p.id).length > 0) return;
  const existing = getCachedImage(p.id);
  if (existing && existing.startsWith('data:')) return;
  try {
    const bot = (p.botanical || '').split(' spp.')[0].split("'")[0].split('/')[0].replace(/\(.*?\)/g,'').trim();
    const q = encodeURIComponent(bot ? bot + ' flower' : p.name + ' flower');
    const res = await fetch(`https://pixabay.com/api/?key=${PIXABAY_KEY}&q=${q}&image_type=photo&orientation=horizontal&per_page=3&safesearch=true`);
    if (res.status === 429 || !res.ok) {
      _pixThrottled = true; _pixQ.delete(p.id);
      console.warn('Pixabay throttled, retrying in 60s');
      setTimeout(() => { _pixThrottled = false; fetchAllImages(); }, 60000);
      return;
    }
    const data = await res.json();
    if (data.detail && data.detail.includes('throttled')) {
      _pixThrottled = true; _pixQ.delete(p.id);
      setTimeout(() => { _pixThrottled = false; fetchAllImages(); }, 60000);
      return;
    }
    let url = (data.hits && data.hits.length > 0) ? data.hits[0].webformatURL : null;
    if (!url) {
      const q2 = encodeURIComponent(p.name.replace(/\s*[-–(].*$/, '') + ' flower plant');
      const res2 = await fetch(`https://pixabay.com/api/?key=${PIXABAY_KEY}&q=${q2}&image_type=photo&orientation=horizontal&per_page=3&safesearch=true`);
      if (res2.ok) {
        const d2 = await res2.json();
        if (d2.hits && d2.hits.length > 0) url = d2.hits[0].webformatURL;
      }
    }
    if (url) {
      try {
        // Convert to permanent base64 and store in Firebase + localStorage
        const base64 = await urlToBase64(url);
        saveCachedImage(p.id, base64);
        const el = document.getElementById('img-' + p.id);
        if (el) el.outerHTML = `<img src="${base64}" alt="${p.name}" loading="lazy">`;
        const hero = document.querySelector('.detail-hero img');
        if (hero && state.detailId === p.id) hero.src = base64;
      } catch(imgErr) {
        // CORS blocked — fall back to storing the URL directly
        saveCachedImage(p.id, url);
        const el = document.getElementById('img-' + p.id);
        if (el) el.outerHTML = `<img src="${url}" alt="${p.name}" loading="lazy">`;
      }
    }
  } catch(e) { console.log('Pixabay fetch failed for', p.name, e); }
}

// Wave-based loading: visible first, batches of 20 with pauses
let _waveRunning = false;
async function fetchAllImages() {
  if (_pixThrottled || _waveRunning) return;
  _waveRunning = true;
  const uncached = PLANTS.filter(p => {
    if (getPhotos(p.id).length > 0) return false;
    const c = getCachedImage(p.id);
    if (c && c.startsWith('data:')) return false;
    return !_pixQ.has(p.id);
  });
  if (!uncached.length) { _waveRunning = false; return; }
  const visibleIds = new Set(getFiltered().slice(0, 20).map(p => p.id));
  uncached.sort((a, b) => (visibleIds.has(b.id) ? 1 : 0) - (visibleIds.has(a.id) ? 1 : 0));
  const WAVE_SIZE = 20, DELAY = 1200, WAVE_PAUSE = 10000;
  for (let w = 0; w < uncached.length; w += WAVE_SIZE) {
    if (_pixThrottled) break;
    const wave = uncached.slice(w, w + WAVE_SIZE);
    for (let i = 0; i < wave.length; i++) {
      if (_pixThrottled) break;
      await new Promise(r => setTimeout(r, DELAY));
      await fetchPixabayImage(wave[i]);
    }
    if (w + WAVE_SIZE < uncached.length && !_pixThrottled) {
      await new Promise(r => setTimeout(r, WAVE_PAUSE));
    }
  }
  _waveRunning = false;
}
setTimeout(fetchAllImages, 1000);

    ["moistsun","💧☀️ Sun + Moist"],["moistpart","💧⛅ Part Sun + Moist"],["moistshade","💧🌥️ Shade + Moist"],
    ["raingarden","🌧️ Rain Garden"],["woodland","🌲 Woodland Shade"],
    ["pw","Proven Winners"],["monrovia","Monrovia"],["fe","First Editions"]
  ];
  const colorFilters = [
    ["color:purple","Purple","#a855f7"],["color:pink","Pink","#ec4899"],["color:blue","Blue","#3b82f6"],
    ["color:white","White","#e2e8f0"],["color:yellow","Yellow","#eab308"],["color:red","Red","#ef4444"],
    ["color:orange","Orange","#f97316"],["color:green","Green","#22c55e"],["color:lavender","Lavender","#c4b5fd"],["color:mixed","Mixed","#a78bfa"]
  ];
  // Stats dashboard for "In My Garden"
  const plantedAll = PLANTS.filter(p => isPlanted(p.id));
  const wishAll = PLANTS.filter(p => isWishlisted(p.id));
  const bloomingNow = plantedAll.filter(p => (p.bloomMonths||[]).includes(state.currentMonth));
  const sunCounts = {sun:0,part:0,shade:0};
  plantedAll.forEach(p => { if(p.sun==="Part Sun to Full Sun") sunCounts.sun++; else if(p.sun==="Part Shade to Part Sun") sunCounts.part++; else sunCounts.shade++; });
  const statsHtml = state.filter==="planted" && plantedAll.length > 0 ? `<div style="display:flex;gap:8px;padding:8px 16px;overflow-x:auto;white-space:nowrap">
    <div onclick="state.filter='planted';render()" style="flex:0 0 auto;padding:10px 14px;border-radius:12px;background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.15);cursor:pointer">

    <div onclick="state.filter='blooming';render()" style="flex:0 0 auto;padding:10px 14px;border-radius:12px;background:rgba(244,114,182,.08);border:1px solid rgba(244,114,182,.15);cursor:pointer">
      <div style="font-size:20px;font-weight:700;color:#f472b6">${bloomingNow.length}</div><div style="font-size:10px;color:var(--text-mid);text-transform:uppercase;letter-spacing:.5px">Blooming</div></div>
    <div onclick="state.filter='wishlist';render()" style="flex:0 0 auto;padding:10px 14px;border-radius:12px;background:rgba(251,146,60,.08);border:1px solid rgba(251,146,60,.15);cursor:pointer">
      <div style="font-size:20px;font-weight:700;color:#fb923c">${wishAll.length}</div><div style="font-size:10px;color:var(--text-mid);text-transform:uppercase;letter-spacing:.5px">Wishlist</div></div>
    <div onclick="state.filter='sun';render()" style="flex:0 0 auto;padding:10px 14px;border-radius:12px;background:rgba(255,255,255,.05);border:1px solid var(--border);cursor:pointer">
      <div style="font-size:11px;font-weight:600;color:var(--text);line-height:1.5">☀️${sunCounts.sun} ⛅${sunCounts.part} 🌥️${sunCounts.shade}</div><div style="font-size:10px;color:var(--text-mid);text-transform:uppercase;letter-spacing:.5px">Sun Mix</div></div>
  </div>` : '';
  return `
    <div class="filters">${filters.map(([k,l])=>`<div class="chip ${state.filter===k?'active':''}" onclick="state.filter='${k}';render()">${l}</div>`).join("")}${colorFilters.map(([k,l,c])=>`<div class="chip ${state.filter===k?'active':''}" onclick="state.filter='${k}';render()" style="${state.filter===k?'background:'+c+';color:#fff;border-color:'+c:'border-color:'+c+'40;color:'+c}"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${c};margin-right:4px"></span>${l}</div>`).join("")}</div>
    ${statsHtml}
    <div id="plantCount" style="padding:10px 16px;font-size:12px;color:var(--text-light);letter-spacing:.3px;font-weight:500">${list.length} plant${list.length!==1?'s':''}${state.filter!=='all'?' &middot; filtered':''}</div>
    <div class="grid" id="plantGrid">${list.map(p=>`
      <div class="card" onclick="state.detailId=${p.id};render()">
        ${plantImage(p)}
        <div class="card-body">
          <h3>${displayName(p)}</h3>
          <div class="meta">${p.botanical||""}</div>
          <div class="badges">
            ${sunBadge(p)}
            ${p.bloomMonths&&p.bloomMonths.length?'<span class="badge badge-bloom">'+p.bloomMonths.map(m=>MONTHS[m-1]).join("-")+'</span>':''}
            ${p.deerResistant?'<span class="badge badge-deer">🦌</span>':''}
            ${p.droughtTolerant&&state.filter==='pollinator'?'<span class="badge" style="background:rgba(234,179,8,.1);color:#eab308;border:1px solid rgba(234,179,8,.25)">☀️ Prefers Dry</span>':''}
            ${!p.droughtTolerant&&state.filter==='pollinator'?'<span class="badge" style="background:rgba(56,189,248,.1);color:#38bdf8;border:1px solid rgba(56,189,248,.25)">💧 Prefers Moist</span>':''}
            ${isPlanted(p.id)?'<span class="badge" style="background:rgba(74,222,128,.12);color:#4ade80;border:1px solid rgba(74,222,128,.25)">✓ In My Garden</span>':''}
            ${isWishlisted(p.id)?'<span class="badge" style="background:rgba(251,146,60,.1);color:#fb923c;border:1px solid rgba(251,146,60,.25)">★ Want</span>':''}
            ${p.provenWinners?'<span class="badge" style="background:rgba(255,255,255,.08);color:#e2e8f0;border:1px solid rgba(255,255,255,.15)">★ PW</span>':''}
          </div>
        </div>
      </div>
    `).join("")}</div>
  `;
}

function toggleSection(el) {
  const content = el.parentElement.querySelector('.ds-content');
  const chev = el.querySelector('.ds-chevron');
  if (content.classList.contains('open')) {
    content.classList.remove('open');
    chev.classList.remove('open');
  } else {
    content.classList.add('open');
    chev.classList.add('open');
  }
}

function findPlantByName(name) {
  const n = name.toLowerCase().trim();
  return PLANTS.find(p => p.name.toLowerCase() === n) ||
    PLANTS.find(p => p.name.toLowerCase().includes(n) || n.includes(p.name.toLowerCase()));
}

function parseHeight(h) {
  if (!h) return { min: 0, max: 0 };
  const m = h.match(/(\d+)\s*-\s*(\d+)/);
  return m ? { min: parseInt(m[1]), max: parseInt(m[2]) } : { min: 0, max: 0 };
}

function companionLink(name) {
  const found = findPlantByName(name);
  if (found) return `<a href="#" onclick="event.preventDefault();state.detailId=${found.id};render();window.scrollTo(0,0)" style="color:#facc15;font-weight:600;text-decoration:none">${name}</a>`;
  return `<span style="color:var(--text-mid)">${name}</span>`;
}

const COMP_COLORS = [
  { light:'#facc15', dark:'#eab308', bg:'rgba(234,179,8,.15)' },
  { light:'#f472b6', dark:'#ec4899', bg:'rgba(244,114,182,.15)' },
  { light:'#93c5fd', dark:'#60a5fa', bg:'rgba(96,165,250,.15)' },
  { light:'#fb923c', dark:'#f97316', bg:'rgba(251,146,60,.15)' },
  { light:'#c4b5fd', dark:'#a78bfa', bg:'rgba(167,139,250,.15)' }
];

function getCompanionColorMap(mainPlant) {
  const map = {};
  (mainPlant.companions || []).slice(0, 5).forEach((name, i) => {
    map[name] = COMP_COLORS[i % COMP_COLORS.length];
  });
  return map;
}

function renderCompanionBloom(mainPlant) {
  const companions = (mainPlant.companions || []).slice(0, 5);
  if (!companions.length) return '';
  const colorMap = getCompanionColorMap(mainPlant);
  const mainBlooms = new Set(mainPlant.bloomMonths || []);

  // Foliage season months for non-blooming plants (Apr-Oct in zone 6)
  const FOLIAGE_MONTHS = new Set([4,5,6,7,8,9,10]);

  const compData = companions.map(name => {
    const found = findPlantByName(name);
    const blooms = new Set(found ? (found.bloomMonths || []) : []);
    const isFoliageOnly = blooms.size === 0;
    return { name, plant: found, blooms, isFoliageOnly };
  });

  const above = compData.slice(0, Math.ceil(compData.length / 2));
  const below = compData.slice(Math.ceil(compData.length / 2));

  function bloomRow(name, blooms, isMain, isFoliageOnly) {
    const cc = colorMap[name];
    const label = isMain
      ? `<strong style="color:#4ade80">${name}</strong>`
      : (function(){ const f=findPlantByName(name); return f ? `<a href="#" onclick="event.preventDefault();state.detailId=${f.id};render();window.scrollTo(0,0)" style="color:${cc.light};font-weight:600;text-decoration:none">${name}</a>` : `<span style="color:${cc.light}">${name}</span>`; })();
    const suffix = isFoliageOnly ? ` <span style="font-size:9px;color:var(--text-light);font-weight:400">(foliage)</span>` : '';
    const activeMonths = isFoliageOnly ? FOLIAGE_MONTHS : blooms;
    const cells = Array.from({length:8}, (_, i) => {
      const m = i + 3, on = activeMonths.has(m);
      let bg;
      if (isMain) {
        bg = on ? 'background:linear-gradient(135deg,#22c55e,#4ade80)' : 'background:rgba(255,255,255,.05)';
      } else if (isFoliageOnly) {
        bg = on ? `background:linear-gradient(135deg,${cc.dark},${cc.light});opacity:.6` : 'background:rgba(255,255,255,.05)';
      } else {
        bg = on ? `background:linear-gradient(135deg,${cc.dark},${cc.light})` : 'background:rgba(255,255,255,.05)';
      }
      return `<div style="width:80px;height:24px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;${bg};${on?'color:#fff':'color:var(--text-light)'}">${MONTHS[i+2]}</div>`;
    }).join('');
    return { label: `${label}${suffix}`, cells };
  }

  const rows = [];
  above.forEach(c => rows.push(bloomRow(c.name, c.blooms, false, c.isFoliageOnly)));
  rows.push(bloomRow(mainPlant.name + ' (this plant)', mainBlooms, true, false));
  below.forEach(c => rows.push(bloomRow(c.name, c.blooms, false, c.isFoliageOnly)));

  const tableRows = rows.map(r => `<tr>
    <td style="font-size:10px;line-height:1.2;white-space:nowrap;padding:2px 8px 2px 0;vertical-align:middle">${r.label}</td>
    <td style="vertical-align:middle"><div style="display:flex;gap:2px">${r.cells}</div></td>
  </tr>`).join('');

  return `<div style="margin-top:8px;overflow-x:auto"><table style="border-collapse:collapse">${tableRows}</table></div>`;
}

function renderCompanionHeight(mainPlant) {
  const companions = (mainPlant.companions || []).slice(0, 5);
  if (!companions.length) return '';
  const mainH = parseHeight(mainPlant.height);
  if (mainH.max === 0) return '';

  const colorMap = getCompanionColorMap(mainPlant);

  const compData = companions.map(name => {
    const found = findPlantByName(name);
    const h = found ? parseHeight(found.height) : { min: 0, max: 0 };
    return { name, plant: found, ...h };
  }).filter(c => c.max > 0);

  if (!compData.length) return '';

  const left = compData.slice(0, Math.ceil(compData.length / 2));
  const right = compData.slice(Math.ceil(compData.length / 2));
  const allItems = [...left, { name: mainPlant.name, max: mainH.max, min: mainH.min, isMain: true }, ...right];
  const globalMax = Math.max(...allItems.map(c => c.max));
  const chartH = 140;

  const plants = allItems.map(c => {
    const h = Math.max(Math.round((c.max / globalMax) * chartH), 20);
    const isMain = c.isMain;
    const cc = colorMap[c.name];
    const stemColor = isMain ? '#22804a' : (cc ? cc.dark : '#d4a017');
    const leafColor = isMain ? '#4ade80' : (cc ? cc.light : '#f5c842');
    const leafBg = isMain ? 'rgba(74,222,128,.1)' : (cc ? cc.bg : 'rgba(212,160,23,.15)');
    const found = c.plant || findPlantByName(c.name);
    const label = isMain
      ? `<strong style="color:#4ade80;font-size:10px">${c.name}</strong>`
      : (found ? `<a href="#" onclick="event.preventDefault();state.detailId=${found.id};render();window.scrollTo(0,0)" style="color:${leafColor};font-weight:600;text-decoration:none;font-size:10px">${c.name}</a>` : `<span style="color:${leafColor};font-size:10px">${c.name}</span>`);
    const svg = `<svg width="50" height="${h}" viewBox="0 0 50 ${h}" fill="none">
      <rect x="23" y="${h*0.3}" width="4" height="${h*0.7}" rx="2" fill="${stemColor}" opacity="0.7"/>
      <ellipse cx="25" cy="${h*0.25}" rx="${Math.min(22, 10+h*0.1)}" ry="${Math.min(h*0.3, 30)}" fill="${leafBg}" stroke="${leafColor}" stroke-width="1.5"/>
      <ellipse cx="25" cy="${h*0.2}" rx="${Math.min(14, 6+h*0.06)}" ry="${Math.min(h*0.18, 18)}" fill="${leafBg}" stroke="${stemColor}" stroke-width="1" opacity="0.5"/>
    </svg>`;
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:0">
      <div style="height:${chartH}px;display:flex;align-items:flex-end;justify-content:center">${svg}</div>
      <div style="font-size:9px;color:${leafColor};font-weight:700;white-space:nowrap">${c.min}-${c.max}"</div>
      <div style="text-align:center;line-height:1.2;overflow:hidden;width:100%">${label}</div>
    </div>`;
  }).join('');

  return `<div style="display:flex;gap:4px;align-items:flex-end;margin-top:10px;padding:12px 4px 0;border-top:1px solid var(--border);background:linear-gradient(180deg,transparent 0%,rgba(74,222,128,.03) 100%);border-radius:0 0 12px 12px">${plants}</div>`;
}

          <div id="plantNameEdit" style="display:none;align-items:center;gap:6px;margin:8px 0">
            <input id="plantNameInput" type="text" style="flex:1;padding:8px 12px;border:1px solid rgba(255,255,255,.3);border-radius:8px;font-size:18px;font-weight:700;background:rgba(0,0,0,.3);color:#fff;outline:none;font-family:'Playfair Display',Georgia,serif">
            <button onclick="saveEditName(${p.id})" style="padding:6px 14px;border-radius:8px;border:none;background:#4ade80;color:#0b3d2c;font-weight:700;font-size:12px;cursor:pointer">Save</button>
            <button onclick="cancelEditName()" style="padding:6px 14px;border-radius:8px;border:none;background:rgba(255,255,255,.15);color:#fff;font-weight:600;font-size:12px;cursor:pointer">Cancel</button>
            <button onclick="resetName(${p.id})" style="padding:6px 14px;border-radius:8px;border:none;background:rgba(248,113,113,.15);color:#f87171;font-weight:600;font-size:12px;cursor:pointer">Reset</button>
          </div>
          <div class="hero-sub">${p.botanical||p.type||''}</div>
          <div class="hero-stats">${heroStats}</div>
        </div>
      </div>
      <div class="detail-body">
        ${gardenCard}
        ${notesCard}
        ${sections.join('')}
      </div>
      <div style="height:80px"></div>
    </div>
  `;
}

function renderCalendar() {
  const m = state.currentMonth;
  const monthPicker = MONTH_FULL.map((name,i)=>
    `<div class="chip ${m===i+1?'active':''}" onclick="state.currentMonth=${i+1};render()">${MONTHS[i]}</div>`
  ).join("");
  
  // Only show plants in my garden
  const myPlants = PLANTS.filter(p => isPlanted(p.id));

  // Get tasks for this month
  const tasks = [];
  myPlants.forEach(p => {
    const care = p.care||{};
    const task = care[String(m)];
    if (task) tasks.push({plant:p.name, task:task, id:p.id, key:`care_${p.id}_${m}`});
    // Also show fertilizer months
    if ((p.fertMonth||[]).includes(m)) {
      tasks.push({plant:p.name, task:`Fertilize: ${p.fertilizer||'as needed'}`, id:p.id, key:`fert_${p.id}_${m}`});
    }
  });

  // Blooming this month (alphabetical)
  const blooming = myPlants.filter(p=>(p.bloomMonths||[]).includes(m)).sort((a,b)=>a.name.localeCompare(b.name));
  
  tasks.sort((a,b) => a.plant.localeCompare(b.plant));

  if (!myPlants.length) return `
    <div class="filters">${monthPicker}</div>
    <div class="calendar-view"><div class="empty-state" style="padding:40px 20px;text-align:center;color:var(--text-mid)">Mark plants as "Planted in my garden" to see your personalized calendar here.</div></div>`;

  return `
    <div class="filters">${monthPicker}</div>
    <div class="calendar-view">
      <div class="cal-month">
        <h3>🌸 Blooming in ${MONTH_FULL[m-1]} (${blooming.length})</h3>
        ${blooming.map(p=>`
          <div class="cal-task" onclick="state.detailId=${p.id};render()" style="cursor:pointer">
            <span class="cal-plant">${p.name}</span>
            <span class="cal-action">${p.sun} · ${p.height||""}</span>
          </div>
        `).join("")}
        ${blooming.length===0?'<div class="empty-state">No plants blooming this month</div>':''}
      </div>
      <div class="cal-month">
        <h3>📋 Care Tasks (${tasks.length})</h3>
        ${tasks.map(t=>{
          const done = state.tasks[t.key];
          return `<div class="cal-task" style="display:flex;align-items:center;gap:10px;${done?'opacity:.5':''}">
            <div class="task-check ${done?'done':''}" onclick="event.stopPropagation();toggleTask('${t.key}')" style="width:22px;height:22px;border-radius:6px;flex-shrink:0;cursor:pointer">${done?'✓':''}</div>
            <div style="flex:1;${done?'text-decoration:line-through':''}">
              <span class="cal-plant">${t.plant}</span>
              <span class="cal-action">${t.task}</span>
            </div>
          </div>`;
        }).join("")}
        ${tasks.length===0?'<div class="empty-state">No tasks this month</div>':''}
      </div>
    </div>
  `;
}

let _searchTimer = null;
function searchUpdate() {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(() => {
    const grid = document.getElementById("plantGrid");
    const count = document.getElementById("plantCount");
    if (grid && count) {
      const list = getFiltered();
      count.textContent = `${list.length} plant${list.length!==1?'s':''}${state.filter!=='all'?' · filtered':''}`;
      grid.innerHTML = list.map(p=>`
        <div class="card" onclick="state.detailId=${p.id};render()">
          ${plantImage(p)}
          <div class="card-body">
            <h3>${displayName(p)}</h3>
            <div class="meta">${p.botanical||""}</div>
            <div class="badges">
              ${sunBadge(p)}
              ${p.bloomMonths&&p.bloomMonths.length?'<span class="badge badge-bloom">'+p.bloomMonths.map(m=>MONTHS[m-1]).join("-")+'</span>':''}
              ${p.deerResistant?'<span class="badge badge-deer">🦌</span>':''}
              ${isPlanted(p.id)?'<span class="badge" style="background:rgba(74,222,128,.12);color:#4ade80;border:1px solid rgba(74,222,128,.25)">✓ In My Garden</span>':''}
            ${isWishlisted(p.id)?'<span class="badge" style="background:rgba(251,146,60,.1);color:#fb923c;border:1px solid rgba(251,146,60,.25)">★ Want</span>':''}
            ${p.provenWinners?'<span class="badge" style="background:rgba(255,255,255,.08);color:#e2e8f0;border:1px solid rgba(255,255,255,.15)">★ PW</span>':''}
            </div>
          </div>
        </div>
      `).join("");
    } else {
      render();
    }
  }, 120);
}

function render() {
  const app = document.getElementById("app");
  let content = '';

  // Header
  content += `
    <div class="header">
      <h1>Joshi Plant Buddy</h1>
      <p>Cleveland Zone 6a/6b &middot; Over 200 Perennials &middot; Year-Round Care</p>
      ${state.view==='plants'?`
        <div class="search-bar">
          <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="search" id="searchInput" placeholder="Search plants..." value="${state.search}" oninput="state.search=this.value;searchUpdate()">
        </div>
      `:''}
    </div>
  `;

  // Main content
  if (state.view === 'plants') content += renderPlants();
  else if (state.view === 'calendar') content += renderCalendar();

  // Bottom nav
  content += `
    <div class="nav-bottom">
      <div class="nav-item ${state.view==='plants'?'active':''}" onclick="state.view='plants';render()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><circle cx="9" cy="9" r="1" fill="currentColor"/><circle cx="15" cy="9" r="1" fill="currentColor"/></svg>
        <span>Plants</span>
      </div>
      <div class="nav-item ${state.view==='calendar'?'active':''}" onclick="state.view='calendar';render()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Calendar</span>
      </div>
    </div>
  `;

  // Detail overlay
  if (state.detailId) content += renderDetail();

  app.innerHTML = content;
}

// Initialize
render();
</script>
</body>
</html>
