if (FIREBASE_CONFIG.apiKey) {
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    _fbDb = firebase.database();
    firebase.auth().onAuthStateChanged(user => {
      _authUser = user;
      if (!_authInitDone) {
        _authInitDone = true;

          _fbUserId = user.uid;

            // Truly no user — sign in anonymously so app works for first-time visitors
            firebase.auth().signInAnonymously().catch(e => {
              console.warn('Anonymous auth failed, running offline:', e);
              _fbInitialLoadDone = true; _fbTasksInitDone = true;
              _fbPhotosInitDone = true; _fbNotesInitDone = true;
              _imgCacheReady = true;
              if (typeof initSharedPlants === 'function') initSharedPlants();

            });
          }).catch(e => {
            console.warn('Google redirect result error:', e && e.code, e && e.message);

function userRef(path) { return _fbDb.ref('users/' + _fbUserId + '/' + path); }

// ===== PUBLIC GARDEN VIEWER =====
// If URL has ?g=<id>, we're viewing someone else's shared garden read-only.

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Pinyon+Script&family=Tangerine:wght@400;700&family=Petit+Formal+Script&family=Caveat:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
*::-webkit-scrollbar{height:6px;width:6px}
*::-webkit-scrollbar-track{background:var(--bg,#0c1410)}
*::-webkit-scrollbar-thumb{background:var(--border,#1e3028);border-radius:3px}
*::-webkit-scrollbar-thumb:hover{background:var(--green-light,#22804a)}
*{scrollbar-width:thin;scrollbar-color:var(--border,#1e3028) var(--bg,#0c1410)}
:root{--green:#0b3d2c;--green-mid:#14532d;--green-light:#22804a;--green-accent:#4ade80;--green-bg:#071a12;--gold:#d4a017;--gold-light:#f5c842;--cream:#1a1f1c;--text:#e8ece9;--text-mid:#b0bab3;--text-light:#7a8a80;--bg:#0c1410;--card:#141f19;--border:#1e3028;--radius:14px;--shadow:0 2px 12px rgba(0,0,0,.3);--shadow-lg:0 8px 30px rgba(0,0,0,.4)}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-text-size-adjust:100%;min-height:100vh;padding-bottom:84px;-webkit-font-smoothing:antialiased}
.header{background:linear-gradient(160deg,#061208 0%,#0b3d2c 40%,#145236 100%);color:#fff;padding:20px 20px 16px;position:sticky;top:0;z-index:100;box-shadow:0 4px 24px rgba(0,0,0,.5);border-bottom:1px solid rgba(212,160,23,.2)}
.header h1{font-family:'Playfair Display',Georgia,serif;font-size:24px;font-weight:700;margin-bottom:4px;letter-spacing:-.3px;background:linear-gradient(135deg,#f5c842,#4ade80);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header p{font-size:12px;opacity:.65;letter-spacing:.8px;text-transform:uppercase;font-weight:500}
.search-bar{margin:12px 0 0;position:relative}
.search-bar input{width:100%;padding:12px 14px 12px 40px;border:1px solid rgba(255,255,255,.15);border-radius:10px;font-size:15px;background:rgba(255,255,255,.1);color:#fff;outline:none;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transition:border-color .2s,background .2s;font-family:'Inter',system-ui,sans-serif}
.search-bar input:focus{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.3)}
.search-bar input::placeholder{color:rgba(255,255,255,.5)}
.search-bar svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:18px;height:18px;stroke:rgba(255,255,255,.5);fill:none}
.filters{padding:10px 16px;overflow-x:auto;white-space:nowrap;display:flex;gap:8px;background:var(--cream);border-bottom:1px solid var(--border)}
.chip{display:inline-block;padding:7px 16px;border-radius:24px;font-size:12px;font-weight:600;background:rgba(255,255,255,.06);color:var(--text-light);cursor:pointer;border:1px solid var(--border);transition:all .25s ease;letter-spacing:.2px}
.chip:hover{border-color:rgba(74,222,128,.3);color:var(--green-accent)}
.chip.active{background:linear-gradient(135deg,#14532d,#166534);color:#4ade80;border-color:#22804a;box-shadow:0 2px 12px rgba(74,222,128,.2)}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding:16px}
@media(min-width:640px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:1024px){.grid{grid-template-columns:repeat(4,1fr);max-width:1100px;margin:0 auto}}
.card{background:linear-gradient(145deg,rgba(20,31,25,.85) 0%,rgba(11,61,44,.5) 100%);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:var(--radius);overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.05);cursor:pointer;transition:transform .22s cubic-bezier(.16,1,.3,1),box-shadow .25s ease,border-color .25s ease;border:1px solid rgba(74,222,128,.1)}
.card:hover{transform:translateY(-4px) scale(1.01);box-shadow:0 16px 48px rgba(0,0,0,.5),0 0 0 1px rgba(74,222,128,.25),inset 0 1px 0 rgba(255,255,255,.07);border-color:rgba(74,222,128,.3)}
.card:active{transform:scale(.96);box-shadow:0 2px 8px rgba(0,0,0,.35);transition:transform .08s,box-shadow .08s}
.card img{width:100%;height:160px;object-fit:cover;background:#0a1f14}

.detail-hero.plate-hero{height:auto;background:#f4ebd9;display:flex;align-items:center;justify-content:center;padding:18px 18px 22px;min-height:420px}
.detail-hero.plate-hero .plate-hero-img{max-width:320px;width:100%;height:auto;aspect-ratio:2/5;object-fit:contain;display:block;box-shadow:0 14px 40px rgba(0,0,0,.35),0 2px 6px rgba(0,0,0,.2);border-radius:4px}
.detail-hero.plate-hero .hero-gradient{display:none}

.card-body{padding:10px 12px 12px}
.card-body h3{font-family:'Playfair Display',Georgia,serif;font-size:14px;font-weight:600;line-height:1.35;margin-bottom:2px;color:var(--text)}
.card-body .meta{font-size:11px;color:var(--text-light);font-style:italic}
.badges{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.badge{font-size:10px;padding:3px 8px;border-radius:12px;font-weight:600;letter-spacing:.2px}
.badge-sun{background:rgba(212,160,23,.15);color:#f5c842;border:1px solid rgba(212,160,23,.3)}
.badge-shade{background:rgba(96,165,250,.12);color:#93c5fd;border:1px solid rgba(96,165,250,.25)}

.detail.open{display:block;animation:slideInRight .32s cubic-bezier(.16,1,.3,1)}

@keyframes slideInRight{from{transform:translateX(100%);opacity:.6}to{transform:translateX(0);opacity:1}}

.page-anim{animation:pageFade .2s ease both}
.detail-hero{position:relative;width:100%;height:300px;overflow:hidden;background:linear-gradient(135deg,#061208,#0b3d2c,#145236);touch-action:pan-y}
.detail-hero img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .25s ease}

.detail-hero .hero-gradient{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.35) 0%,transparent 38%,rgba(0,0,0,.78) 100%);pointer-events:none}
.detail-hero .hero-overlay{position:absolute;bottom:0;left:0;right:0;padding:14px 18px 18px;pointer-events:none}
.detail-hero .hero-overlay *{pointer-events:auto}
.detail-hero .hero-back{position:absolute;top:14px;left:14px;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.4);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:5;transition:background .2s;border:1px solid rgba(255,255,255,.2)}

.detail-hero .hero-back svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2.5}
.detail-hero h2{font-family:'Playfair Display',Georgia,serif;font-size:24px;font-weight:700;color:#fff;margin-bottom:2px;text-shadow:0 2px 12px rgba(0,0,0,.6);letter-spacing:-.3px;line-height:1.2}
.detail-hero .hero-sub{font-size:12px;color:rgba(255,255,255,.7);font-style:italic}
.hero-dot{width:6px;height:6px;border-radius:50%;background:#fff;transition:opacity .2s,transform .2s}
.hero-stats-row{display:flex;gap:8px;padding:10px 14px;overflow-x:auto;white-space:nowrap;border-bottom:1px solid var(--border);background:var(--cream);-webkit-overflow-scrolling:touch}
.hero-stat{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.2px;flex-shrink:0}

.detail-body{padding:14px;display:flex;flex-direction:column;gap:12px}
.ds{background:linear-gradient(145deg,rgba(20,31,25,.8) 0%,rgba(11,61,44,.4) 100%);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-radius:16px;box-shadow:0 2px 16px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);overflow:hidden;animation:fadeInUp .4s ease both}
.ds:nth-child(2){animation-delay:.05s}.ds:nth-child(3){animation-delay:.1s}.ds:nth-child(4){animation-delay:.15s}.ds:nth-child(5){animation-delay:.2s}.ds:nth-child(6){animation-delay:.25s}
.ds-head{display:flex;align-items:center;gap:12px;padding:16px 18px;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;transition:background .15s}

.ds-content{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.16,1,.3,1),padding .3s ease}

.ds-inner{padding:0 18px 18px}
.ds p,.ds li{font-size:14px;line-height:1.7;color:var(--text-mid)}
.ds ul{padding-left:20px;margin:0}
.ds li{margin-bottom:5px}

.info-item .label{font-size:10px;color:var(--gold-light);text-transform:uppercase;letter-spacing:.8px;font-weight:600}

.bloom-bar{display:flex;gap:3px;margin-top:4px}

.cal-action{color:var(--text-light);flex:1;line-height:1.4}
.task-view{padding:16px}

.nav-item span{font-size:9px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;line-height:1}
.count-badge{background:var(--green);color:#fff;font-size:11px;padding:2px 8px;border-radius:10px;margin-left:4px}

/* ===== FLOWER BED DESIGNER ===== */
.beds-container{padding:16px;padding-bottom:200px}
.beds-toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.beds-toolbar button{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif}
.beds-toolbar button.active{background:var(--green-light);color:#fff;border-color:var(--green-light)}
.beds-toolbar button:hover{border-color:var(--green-light)}
.beds-toolbar select{padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;font-family:'Inter',sans-serif;cursor:pointer}
.bed-canvas-wrap{position:relative;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}

/* ============================================================
   ENCYCLOPEDIA LAYOUT
   Multi-page plate viewer. Horizontal scroll-snap, each page is a
   9:16 plate with optional background image and overlay content.
   ============================================================ */
.encyclopedia{
  position:relative;
  width:100%;
  max-width:460px;
  margin:0 auto;
  /* Slim padding — plate hugs both side edges on phones and starts closer
     to the top (still leaves room for the floating back button). */
  padding:20px 0 16px;
  background:transparent;
}
.encyc-back-btn{
  position:absolute;top:24px;left:16px;z-index:20;
  width:38px;height:38px;border-radius:50%;
  background:rgba(255,250,235,.85);
  border:1px solid var(--gold-light);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  box-shadow:0 2px 8px rgba(58,42,24,.2);
}
.encyc-back-btn svg{width:18px;height:18px;stroke:var(--text);fill:none;stroke-width:2.5}
/* The plate stack is a 3D book — pages stack on top of each other and
   flip to the left around their spine (left edge) on navigation. Perspective
   gives the flip depth; children absolute-position so they overlap. */
.plate-pages{
  position:relative;
  width:100%;
  /* 1052 : 1820 (≈ 26:45, aspect 0.578) — matches gpt-image-2's 1024×1792
     output plus a 14px dark-walnut hairline frame added on all four sides
     by the encoder. Very close to 9:16 (0.5625). */
  aspect-ratio:1052/1820;
  perspective:1600px;
  border-radius:8px;
  overflow:visible;
  touch-action:pan-y;
}
.plate-page{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  transform-origin:left center;
  transform-style:preserve-3d;
  transition:transform 0.75s cubic-bezier(0.4, 0, 0.2, 1);
  will-change:transform;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  background-color:#f9f2e2;
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  border-radius:6px;
  overflow:hidden;
  box-shadow:0 12px 36px rgba(58,42,24,.32),0 2px 6px rgba(58,42,24,.2);
  border:1px solid var(--gold-light);
}
/* Page states: .plate-flipped is turned to the left (already past). */
.plate-page.plate-flipped{
  transform:rotateY(-180deg);
}
/* The reverse of a flipped page is blank parchment (the back of the paper). */
.plate-page::after{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(120deg,#f4ebd9 0%,#f9f2e2 40%,#f4ebd9 100%);
  border:1px solid var(--gold-light);
  border-radius:6px;
  transform:rotateY(180deg);
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  pointer-events:none;
}
.plate-page.no-bg{
  /* Shared blank parchment image — Plates III-V */
  background-image:url('plates/plate-blank.webp?v=1');
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  background-color:#f4ebd9;
  border:1px solid var(--gold-light);
}
.plate-overlay{
  position:absolute;inset:0;
  padding:8.5% 8.5% 6%;
  display:flex;flex-direction:column;
  overflow-y:auto;
  overscroll-behavior:contain;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:thin;
  scrollbar-color:var(--gold-light) transparent;
}
.plate-overlay::-webkit-scrollbar{ width:4px }
.plate-overlay::-webkit-scrollbar-thumb{ background:var(--gold-light);border-radius:2px }
.plate-overlay::-webkit-scrollbar-track{ background:transparent }
/* Section divider for multi-section plates */
.plate-section-divider{
  text-align:center;
  margin:18px 0 10px;
  color:var(--gold);
  font-size:14px;
}
.plate-section-divider::before{
  content:'❦';
}
.plate-link{
  font-family:'EB Garamond',serif;
  font-style:italic;
  color:var(--green-accent);
  text-decoration:none;
  border-bottom:1px solid rgba(60,80,50,.3);
}
.plate-link:hover{ color:var(--text);border-bottom-color:var(--gold) }
.plate-brand-row{

}

  font-family:'EB Garamond',serif;

}
.plate-brand-row a:hover{ background:rgba(255,250,235,1);border-color:var(--gold) }
.plate-care-list{

  line-height:1.55;

.plate-tag-list{

/* Horizontal scroller inside a plate (Monthly Care months, Cultivar cards, etc.).
   Uses overscroll-behavior-x: contain so the parent plate-pages horizontal swipe
   doesn't trigger when scrolling within. */
.plate-h-scroll{
  display:flex;
  gap:10px;
  overflow-x:auto;
  overflow-y:hidden;
  overscroll-behavior-x:contain;
  scroll-snap-type:x proximity;
  -webkit-overflow-scrolling:touch;
  padding:4px 0 8px;
  margin-top:6px;
  scrollbar-width:thin;
  scrollbar-color:var(--gold-light) transparent;
  touch-action:pan-x;
}
.plate-h-scroll::-webkit-scrollbar{ height:4px }
.plate-h-scroll::-webkit-scrollbar-thumb{ background:var(--gold-light);border-radius:2px }
.plate-h-scroll::-webkit-scrollbar-track{ background:transparent }
.plate-h-scroll > *{

  scroll-snap-align:start;
}
/* Month card for Monthly Care horizontal scroll */
.plate-mo-card{

/* Plate II: Particulars — text below the top-right inset.
   IMPORTANT: keep .plate-overlay as position:absolute; inset:0 (inherited from
   base) so it stays fixed at plate size and scrolls internally. The ledger
   is rendered as a SIBLING of the overlay (direct child of .plate-page), so
   its absolute percentages anchor to the plate, not to growing flow content.
   This way, adding more prose blocks below never stretches the ledger rows. */
.plate-particulars .plate-overlay{
  padding-top:44%;  /* reserve room so .plate-desc starts BELOW the ledger + inset, with a small breathing gap */
}
/* On Plate II the description (and prose blocks below) must flow naturally
   from the top of the available space — not be pinned to the bottom of the
   flex column by .plate-desc's default margin-top:auto. Add breathing room
   below the description so Bloom Calendar and the sub-sections beneath it
   sit clearly apart from the prose paragraph. */
.plate-particulars .plate-desc{
  margin-top:0;
  margin-bottom:16px;
}
/* No decorative glyph above .plate-desc on Plate II — the flow reads cleaner
   without it now that the description sits directly under the ledger. */
.plate-particulars .plate-desc::before{
  display:none;
}
/* Tighten Plate II sub-section rhythm: less air between Bloom Calendar squares
   and the Foliage Highlight heading below them; tighter prose blocks overall. */
.plate-particulars .plate-bloom-strip{
  margin:6px 0 4px;
}
.plate-particulars .plate-prose-block{
  margin:6px 0;
}
/* Plate II section labels ("Bloom Calendar", "Foliage Highlight",
   "Year Round Interest") in bold to anchor each sub-section. */
.plate-particulars .plate-prose-block .heading{
  font-weight:700;
}
/* Body text of Plate II sub-sections uses the same script (Cormorant Garamond
   italic) as the ledger values, so the whole plate speaks one voice. */
.plate-particulars .plate-prose-block .body{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-size:14px;
  line-height:1.35;
}
/* Monthly Care carousel on Plate II: one month at a time, snap-centered.
   Current month is programmatically scrolled into view (see initMonthlyCareCenter). */
.plate-particulars .plate-h-scroll{
  scroll-snap-type:x mandatory;
  gap:0;
  padding:4px 0 8px;
}
.plate-particulars .plate-h-scroll > .plate-mo-card{
  flex:0 0 100%;
  width:100%;
  scroll-snap-align:center;
  scroll-snap-stop:always;
  min-height:0;
  /* No card chrome on Plate II — sit directly on the parchment.
     Zero top padding + gap so the month line sits close to the "Care Tips" label. */
  background:transparent;
  border:none;
  border-radius:0;
  padding:0;
  gap:2px;
}
/* Care Tips: no dotted divider between month and task; keep the month label
   compact so it hugs the Care Tips heading above. */
.plate-particulars .plate-mo-card .mo{
  border-bottom:none;
  padding-bottom:0;
}
/* Also tighten the scroll container itself so the first card starts right
   under the "Care Tips" heading. */
.plate-particulars .plate-prose-block .plate-h-scroll{
  margin-top:2px;
  padding-top:0;
}
/* Task text uses the same script (Cormorant Garamond italic) as the other
   Plate II sub-section bodies (Foliage Highlight, Year Round Interest, etc.). */
.plate-particulars .plate-mo-card .task{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-size:14px;
  line-height:1.35;
}
/* (Relevant Videos link moved to Plate IV — inline styles there.) */
/* Plate II ledger sits absolute in the top-LEFT next to the inset
   (the inset is baked into the top-right of the background image).
   Equal margin from top and left edges; no rule lines between rows.
   Percentages are of .plate-page (9:16 aspect-ratio, fixed size). */
.plate-particulars > .plate-ledger{
  position:absolute;
  top:8.7%;       /* aligned with top edge of inset frame (~60px on 690px plate) */
  left:11%;
  width:48%;
  z-index:2;
  font-family:'EB Garamond',Georgia,serif;
  line-height:1.2;
  font-size:13px;
  color:var(--text);
  margin:0;
  display:flex;
  flex-direction:column;
  gap:3px;        /* tight, uniform spacing between rows (no space-between stretch) */
}
.plate-particulars .plate-ledger .row{
  display:flex;align-items:baseline;gap:10px;
  padding:0;
  border:none !important;
}
.plate-particulars .plate-ledger .lbl{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-weight:700;
  color:var(--text);
  min-width:78px;
  flex-shrink:0;
  font-size:13px;
}
.plate-particulars .plate-ledger .val{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-weight:700;
  color:#7d1f1a;
  flex:1;
  font-size:13px;
}

.plate-attracts{
  margin:6px 0 8px;
  display:flex;align-items:center;gap:10px;
}
.plate-attracts .lbl{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  color:var(--text-mid);
  min-width:78px;
}
.plate-attracts .icons{
  display:flex;gap:10px;align-items:center;
}
.plate-glyph{
  width:24px;height:24px;
  color:var(--text-mid);
  fill:currentColor;
  stroke:currentColor;
}
.plate-glyph.muted{ opacity:.25 }

.plate-flags{
  display:flex;flex-wrap:wrap;gap:6px 12px;
  margin:6px 0 10px;
  font-family:'EB Garamond',serif;
  font-style:italic;
  font-size:12px;
  color:var(--text-mid);
}
.plate-flags .yes{ color:var(--green-accent); }
.plate-flags .yes::before{ content:'✓ '; }
.plate-flags .no{ opacity:.35; }
.plate-flags .no::before{ content:'· '; }

.plate-desc{
  font-family:'EB Garamond',serif;
  font-size:13px;
  line-height:1.55;
  color:var(--text);
  font-style:italic;
  margin-top:auto;
  padding-top:8px;
  border-top:none;
}
.plate-desc::before{
  content:'❦';
  color:var(--gold);
  display:block;
  text-align:center;
  font-size:14px;
  margin-bottom:6px;
}

/* Plate III (Companions): section labels ("Garden Styles", "Suggested
   Companions", "Cultivars", "Notable", "My Pairings") in bold — matches the
   Plate II sub-section rhythm. */
.plate-companions .plate-prose-block .heading{
  font-weight:700;
}
/* Garden Styles values ("Cottage Garden", etc.) render as plain italic
   labels — same style as the "Deer-Safe" tolerance flags on Plate I. */
.plate-companions .plate-tag-list{
  gap:14px;
  margin-top:6px;
}
/* SVG overlay that annotates the plate-group illustration with plant
   labels + curved locator lines. Sits between the background image and
   the .plate-overlay text (which stays on top for the Garden Styles list). */
.plate-companions .plate-group-labels{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:1;
}
.plate-companions .pgl-line{
  fill:none;
  stroke:#8a6d4a;
  stroke-width:0.8;
  stroke-linecap:round;
  opacity:.75;
}
.plate-companions .pgl-dot{
  fill:#8a6d4a;
  opacity:.85;
}
.plate-companions .pgl-text{
  font-family:'Cormorant Garamond', serif;
  font-style:italic;
  font-size:14px;
  fill:var(--text);
  letter-spacing:.2px;
}
/* Labels that resolve to a plant in PLANTS are clickable — the green tint
   and pointer cursor signal that they navigate to that plant. */
.plate-companions .pgl-link{
  pointer-events:auto;
  cursor:pointer;
  fill:var(--green-accent);
}
.plate-companions .pgl-link:hover{
  fill:var(--text);
}

.plate-companions .plate-tag-list .pill{
  background:transparent;
  border:none;
  padding:0;
  border-radius:0;
  /* Match the Care Tips task text ("Deadhead spent blooms for rebloom") on
     Plate II: Cormorant Garamond italic 14px. */
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-size:14px;
  line-height:1.35;
  color:var(--text);
  letter-spacing:0;
}
/* Notable Cultivars on Plate III: 3-column grid of italic labels sitting
   directly on the parchment. When the entry count doesn't divide evenly
   by 3, data-remainder centers the trailing row:
     remainder=1 → the lone last item lands under the middle column
     remainder=2 → the two trailing items shift right one column so they
                   sit centered under columns 2 & 3 (leaving column 1 blank).
*/
.notable-cultivars-grid{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:6px 14px;
  margin-top:6px;
  align-items:baseline;
}
.notable-cultivars-grid > .cv{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-size:14px;
  line-height:1.35;
  color:var(--text);
  text-align:center;
}
.notable-cultivars-grid[data-remainder="1"] > .cv:last-child{
  grid-column:2;
}
.notable-cultivars-grid[data-remainder="2"] > .cv:nth-last-child(2){
  grid-column:2;
}
.notable-cultivars-grid[data-remainder="2"] > .cv:last-child{
  grid-column:3;
}

/* Plate III: Seasons */
.plate-bloom-strip{
  display:grid;
  grid-template-columns:repeat(12,1fr);
  gap:3px;
  margin:8px 0 18px;
}
.plate-bloom-strip .month{
  text-align:center;
  font-family:'EB Garamond',serif;
  font-size:10px;

}
.plate-bloom-strip .month.on{

  color:#f9f2e2;
  border-color:var(--green);
  font-weight:600;
}

.plate-prose-block{
  margin:10px 0;
}
.plate-prose-block .heading{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-size:14px;
  color:var(--text-mid);
  margin-bottom:4px;
}
.plate-prose-block .body{
  font-family:'EB Garamond',serif;
  font-size:13px;
  line-height:1.55;
  color:var(--text);
}

.plate-companions-list{
  display:flex;flex-direction:column;gap:6px;
  font-family:'EB Garamond',serif;
  font-size:13px;
  color:var(--text);
}
.plate-companions-list .comp-row{
  display:flex;align-items:center;gap:8px;
  padding:5px 0;
  border-bottom:1px dotted rgba(120,90,40,.18);
}
.plate-companions-list .comp-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;
}

/* Plate V: Journal — ruled paper, no image */
.plate-journal{
  background-image:url('plates/plate-blank.webp?v=1') !important;
  background-size:cover !important;
  background-position:center !important;
  background-repeat:no-repeat !important;
  background-color:#f4ebd9 !important;
  border:1px solid var(--gold-light);
}
.plate-journal .plate-overlay{
  padding:9% 9%;
}
.plate-journal label{
  display:flex;align-items:center;gap:10px;
  padding:4px 0;
  font-family:'EB Garamond',serif;
  font-style:italic;
  color:var(--text);
  cursor:pointer;
}
.plate-journal .check{
  width:22px;height:22px;border-radius:4px;
  background:rgba(255,250,235,.6);
  border:1.5px solid var(--gold-light);
  display:flex;align-items:center;justify-content:center;
  font-family:serif;
}
.plate-journal .check.done{
  background:rgba(90,111,74,.18);
  border-color:var(--green);
  color:var(--green-accent);
}
.plate-journal textarea{
  width:100%;min-height:90px;
  background:rgba(255,250,235,.4) !important;
  border:1px solid var(--gold-light) !important;
  border-radius:4px !important;
  padding:10px 12px !important;
  color:var(--text) !important;
  font-family:'EB Garamond',serif !important;
  font-style:italic !important;
  line-height:28px !important;
  font-size:14px !important;
}

/* Pagination caption + dots */
.plate-caption-row{
  text-align:center;
  margin:14px 0 4px;
}
.plate-caption{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-size:14px;
  color:var(--text-mid);
  letter-spacing:.5px;
}
.plate-caption .plate-num{
  font-family:'Pinyon Script',serif;
  font-style:normal;
  color:var(--text);
  font-size:18px;
  margin-right:6px;
}
.plate-dots{
  display:flex;gap:6px;justify-content:center;
  margin:8px 0 16px;
}
.plate-dot{
  width:7px;height:7px;border-radius:50%;
  background:rgba(120,90,40,.25);
  transition:all .25s ease;
  cursor:pointer;
}
.plate-dot.active{
  background:var(--gold);
  width:22px;border-radius:4px;
}
.plate-detail .ds .ds-chevron{ color:var(--text-mid); opacity:.5; }

.plate-detail .ds .ds-content,
.plate-detail .ds > div > div:not(:first-child){
  background:transparent !important;
  /* Faded ledger lines: 28px line height aligns with body text */
  background-image:
    repeating-linear-gradient(
      to bottom,
      transparent 0,
      transparent 27px,
      rgba(120,90,40,.13) 27px,
      rgba(120,90,40,.13) 28px
    ) !important;
  background-position:0 18px;
  background-attachment:local;
  padding:18px 8px 22px !important;
}
.plate-detail .ds .ds-inner{
  padding:18px 8px 22px !important;
}
.plate-detail .ds .ds-inner p{
  font-family:'EB Garamond',Georgia,serif !important;
  font-style:normal !important;
  font-size:17px !important;
  line-height:28px !important; /* matches ruled line spacing */
  color:var(--text) !important;
  letter-spacing:.1px;
  margin:0 0 14px;
}
.plate-detail .ds .ds-inner p em,
.plate-detail .ds .ds-inner p i{
  font-style:italic;color:var(--text-mid);
}

.plate-detail .ds .info-grid{
  display:block !important;
  margin:0 !important;
  padding:0 !important;
  gap:0 !important;
}
.plate-detail .ds .info-item{
  display:flex !important;
  align-items:baseline !important;
  gap:14px !important;

}

function getPhotos(id) {
  const p = state.photos[String(id)];
  if (!p) return [];
  if (typeof p === 'string') return [p]; // legacy fallback
  return p;
}

const MAX_PHOTOS = 5;

function compressAndStorePhoto(plantId, file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const MAX = 400;
      let w = img.width, h = img.height;
      if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
      else { w = Math.round(w * MAX / h); h = MAX; }
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
      const key = String(plantId);
      if (!state.photos[key]) state.photos[key] = [];
      if (typeof state.photos[key] === 'string') state.photos[key] = [state.photos[key]];
      if (state.photos[key].length >= MAX_PHOTOS) state.photos[key].pop();
      state.photos[key].unshift(dataUrl); // newest first
      savePhotos();
      render();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function deletePhoto(plantId, index) {
  const key = String(plantId);
  const arr = getPhotos(plantId);
  if (index >= 0 && index < arr.length) {
    arr.splice(index, 1);
    state.photos[key] = arr.length > 0 ? arr : undefined;
    if (!arr.length) delete state.photos[key];
    savePhotos();
    render();
  }
}

function triggerPhotoUpload(plantId) {
  let inp = document.getElementById('photoInput');
  if (!inp) {
    inp = document.createElement('input');
    inp.type = 'file';
    inp.id = 'photoInput';
    inp.accept = 'image/*';
    inp.style.display = 'none';
    document.body.appendChild(inp);
  }
  inp.onchange = function() {
    if (inp.files && inp.files[0]) {
      compressAndStorePhoto(plantId, inp.files[0]);
    }
    inp.value = '';
  };
  inp.click();
}

function migrateToCultivars() {
  let changed = false;
  Object.entries(state.garden).forEach(([id, g]) => {
    if (g.entries && g.entries.length) {
      if (!state.cultivars[id]) state.cultivars[id] = [];
      g.entries.forEach(e => {
        if (e.cultivar || e.tagImages) {
          const exists = state.cultivars[id].some(c => c.name === e.cultivar);
          if (!exists) {
            state.cultivars[id].push({
              name: e.cultivar || '',
              source: e.source || '',
              notes: e.notes || '',
              tagImages: e.tagImages || [],
              scannedData: e.scannedData || null,
              dateAdded: new Date().toISOString()
            });
            changed = true;
          }
        }
      });
      // Clear migrated entries from garden
      delete g.entries;
      delete g.name;
    }
  });
  if (changed) { saveCultivars(); saveGarden(); }
}

// Initialize garden entries from pre-existing planted data (called after Firebase initial load)
function initGardenDefaults() {
  let changed = false;
  PLANTS.forEach(p => {
    if (p.planted && p.planted.length > 0 && !state.garden[p.id]) {
      state.garden[p.id] = { planted: true, name: p.planted.join(", "), where: "" };
      changed = true;
    }
  });
  if (changed) saveGarden();
  migrateToCultivars();
}

function parseZoneFromString(loc) {
  if (!loc) return null;
  const m = String(loc).match(/zone\s*(\d{1,2})\s*([ab])?/i);
  if (m) return m[1] + (m[2] || '').toLowerCase();
  return null;
}

  'anchorage':'4b','honolulu':'12b'
};
function lookupCityZone(loc) {
  if (!loc) return null;
  const norm = String(loc).toLowerCase().replace(/[^a-z\s.]/g, ' ').replace(/\s+/g, ' ').trim();
  const keys = Object.keys(CITY_ZONES).sort((a,b) => b.length - a.length);
  for (const k of keys) if (norm.includes(k)) return CITY_ZONES[k];
  return null;
}
function deriveHardinessZone(loc) {
  const zone = parseZoneFromString(loc) || lookupCityZone(loc);
  if (!zone) return;
  state.hardinessZone = zone;
  localStorage.setItem('pt_hardinessZone', zone);
  if (_fbReady && _fbUserId && !isViewing()) userRef('profile/hardinessZone').set(zone).catch(()=>{});
  render();
}

// ===== THEME TOGGLE =====
// Enables/disables the <style id="vintage-styles"> block. When disabled,
// only the modern (dark green) styles apply.
function applyTheme() {
  const el = document.getElementById('vintage-styles');
  if (!el) return;
  el.disabled = (state.theme !== 'vintage');
}
function setTheme(theme) {
  if (theme !== 'modern' && theme !== 'vintage') return;
  state.theme = theme;
  localStorage.setItem('pt_theme', theme);
  applyTheme();
  // Save to Firebase profile too (non-blocking)
  if (_fbReady && _fbUserId && !isViewing()) {
    userRef('profile/theme').set(theme).catch(() => {});
  }
  render();
}

// ===== PUBLIC GARDEN SHARING =====
// Snapshot-based: user clicks Publish to write a copy of their garden to public_gardens/{id}.
// Visitors hit ?g={id} which loads that snapshot read-only.

function loadPublicGarden(id) {
  if (!_fbDb) return;
  _fbDb.ref('public_gardens/' + id).once('value').then(snap => {
    const pub = snap.val();
    if (!pub) {
      alert('This shared garden link is no longer available.');
      exitViewing();
      return;
    }
    // Swap in public data; user's own data is never touched in viewer mode
    // (all save functions early-return via isViewing()).
    state.garden = pub.garden || {};
    state.beds = Array.isArray(pub.beds) ? pub.beds : [];
    state.cultivars = pub.cultivars || {};
    state.gardenName = pub.name || 'Shared Garden';
    state.gardenLocation = pub.location || '';
    _publicViewMeta = { name: pub.name, location: pub.location, publishedAt: pub.publishedAt };
    _fbInitialLoadDone = true;
    _fbTasksInitDone = true; _fbPhotosInitDone = true;
    _fbNotesInitDone = true; _fbCultivarsInitDone = true;
    initSharedPlants();
    document.title = state.gardenName;
    // Load shared plant thumbnails so visitors see images too
    _fbDb.ref('imageCache').once('value').then(s => {
      const data = s.val();
      if (data) _imgCache = data;
      _imgCacheReady = true;
      render();
      setTimeout(fetchAllImages, 800);
    }).catch(() => { _imgCacheReady = true; render(); });
    render();
  }).catch(e => {
    console.warn('Failed to load public garden:', e);
    alert('Could not load shared garden. Check your connection.');
    exitViewing();
  });
}

function publishGarden(isUpdate) {
  if (isViewing()) return;
  if (!_fbReady || !_fbDb || !_fbUserId) {
    alert('Cannot publish — not connected to Firebase yet. Try again in a moment.');
    return;
  }
  if (!state.gardenName) {
    alert('Give your garden a name in Settings first.');
    return;
  }
  if (!isUpdate) {
    const ok = confirm('Share your garden at a public URL?\n\nAnyone with the link will be able to see your plants, beds, cultivars, and notes. You can unpublish anytime.');
    if (!ok) return;
  }
  userRef('publishedGardenId').once('value').then(snap => {
    let id = snap.val();
    const isNew = !id;
    if (isNew) id = _fbDb.ref('public_gardens').push().key;
    const payload = {
      v: 1,
      name: state.gardenName || 'Shared Garden',
      location: state.gardenLocation || '',
      publishedAt: Date.now(),
      ownerUid: _fbUserId,
      garden: state.garden || {},
      beds: state.beds || [],
      cultivars: state.cultivars || {}
    };
    _fbDb.ref('public_gardens/' + id).set(payload).then(() => {
      if (isNew) userRef('publishedGardenId').set(id);
      state._publishedGardenId = id;
      state._shareMsg = isUpdate ? 'Snapshot updated.' : 'Garden published!';
      render();
      setTimeout(() => { state._shareMsg = ''; render(); }, 3000);
    }).catch(e => {
      alert('Publish failed: ' + (e.message || 'check Firebase rules for public_gardens.'));
    });
  });
}

function unpublishGarden() {
  if (isViewing()) return;
  if (!_fbReady || !_fbDb || !_fbUserId) return;
  if (!confirm('Unpublish your garden? The shareable link will stop working.')) return;
  userRef('publishedGardenId').once('value').then(snap => {
    const id = snap.val();
    if (!id) { state._publishedGardenId = null; render(); return; }
    _fbDb.ref('public_gardens/' + id).remove().then(() => {
      userRef('publishedGardenId').remove();
      state._publishedGardenId = null;
      state._shareMsg = 'Unpublished.';
      render();
      setTimeout(() => { state._shareMsg = ''; render(); }, 2500);
    }).catch(e => alert('Unpublish failed: ' + (e.message || 'unknown error')));
  });
}

function buildShareUrl(id) {
  const u = new URL(window.location.href);
  u.search = '?g=' + id;
  u.hash = '';
  return u.toString();
}

function copyShareLink(id) {
  const url = buildShareUrl(id);
  const done = () => {
    state._shareMsg = 'Link copied!';
    render();
    setTimeout(() => { state._shareMsg = ''; render(); }, 2000);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url).then(done).catch(() => {
      window.prompt('Copy this link:', url);
    });
  } else {
    window.prompt('Copy this link:', url);
  }
}

// Load the published id once on settings open, so we know whether to show Publish or Update/Unpublish
function loadPublishedId() {
  if (isViewing() || !_fbReady || !_fbUserId) return;
  if (typeof state._publishedGardenId !== 'undefined') return; // already loaded
  state._publishedGardenId = null; // mark loading-in-progress
  userRef('publishedGardenId').once('value').then(snap => {
    state._publishedGardenId = snap.val() || null;
    render();
  }).catch(() => {});
}

// ===== AUTHENTICATION =====
// Email/password auth on top of Firebase Anonymous. First sign-up while anonymous
// uses linkWithCredential to preserve the UID and keep all garden data.

function openAuth(mode) {
  state.showAuth = true;
  state.authMode = mode || 'signin';
  state.authError = '';
  state.authMsg = '';
  state.authEmail = (state.authUser && state.authUser.email) || state.authEmail || '';
  state.authPassword = '';
  state.authPasswordConfirm = '';
  state.authLoading = false;
  render();
}
function closeAuth() {
  state.showAuth = false;
  state.authError = '';
  state.authMsg = '';
  state.authPassword = '';
  state.authPasswordConfirm = '';

}
function setAuthField(field, value) {
  state[field] = value;
  // Don't re-render on every keystroke — input keeps its own DOM value.
}

function _authErrMsg(e) {
  const code = e && e.code || '';
  const map = {
    'auth/email-already-in-use': 'An account with this email already exists. Try signing in instead.',
    'auth/invalid-email': 'That email address doesn’t look right.',
    'auth/weak-password': 'Password should be at least 6 characters.',
    'auth/wrong-password': 'Incorrect password.',
    'auth/user-not-found': 'No account found with that email.',
    'auth/too-many-requests': 'Too many attempts. Try again in a few minutes.',
    'auth/network-request-failed': 'Network error. Check your connection.',
    'auth/operation-not-allowed': 'Email/Password sign-in is not enabled in Firebase. Enable it in Firebase Console → Authentication → Sign-in method.',
    'auth/credential-already-in-use': 'That email is already linked to another account.',
    'auth/provider-already-linked': 'This account already has an email/password linked.',
  };
  return map[code] || (e && e.message) || 'Something went wrong. Please try again.';
}

function signInWithEmail() {
  if (!_fbDb) { state.authError = 'Firebase not available.'; render(); return; }
  const email = (state.authEmail || '').trim();
  const pw = state.authPassword || '';
  if (!email || !pw) { state.authError = 'Enter both email and password.'; render(); return; }
  state.authLoading = true; state.authError = ''; render();
  firebase.auth().signInWithEmailAndPassword(email, pw).then(() => {
    // Reload so the app reinitializes cleanly under the email-authed UID
    window.location.reload();
  }).catch(e => {
    state.authLoading = false;
    state.authError = _authErrMsg(e);
    render();
  });
}

function signInWithGoogle() {
  if (!_fbDb) { state.authError = 'Firebase not available.'; render(); return; }
  state.authLoading = true; state.authError = ''; render();
  const provider = new firebase.auth.GoogleAuthProvider();
  provider.setCustomParameters({ prompt: 'select_account' });
  const cur = firebase.auth().currentUser;
  const doLink = cur && cur.isAnonymous;
  // Try popup first; on PWA/iOS where popups are blocked, fall back to redirect
  const popupAction = doLink ? cur.linkWithPopup(provider) : firebase.auth().signInWithPopup(provider);
  popupAction.then(() => {
    window.location.reload();
  }).catch(e => {
    const code = e && e.code || '';
    // If linking failed because that Google account is already a PlantBuddy user,
    // fall back to plain sign-in (anonymous data on this device will be orphaned).
    if (doLink && (code === 'auth/credential-already-in-use' || code === 'auth/email-already-in-use')) {
      firebase.auth().signInWithPopup(provider).then(() => window.location.reload()).catch(e2 => {
        state.authLoading = false;
        state.authError = _authErrMsg(e2);
        render();
      });
      return;
    }
    // Popup blocked or unavailable → redirect flow
    if (code === 'auth/popup-blocked' || code === 'auth/popup-closed-by-user' || code === 'auth/cancelled-popup-request' || code === 'auth/operation-not-supported-in-this-environment') {
      try {
        sessionStorage.setItem('pt_pendingGoogleLink', doLink ? '1' : '0');
        if (doLink) cur.linkWithRedirect(provider);
        else firebase.auth().signInWithRedirect(provider);
      } catch (e3) {
        state.authLoading = false;
        state.authError = _authErrMsg(e3);
        render();
      }
      return;
    }
    state.authLoading = false;
    state.authError = _authErrMsg(e);
    render();
  });
}

// Handle redirect-flow result on page load (after Google sign-in completes via redirect)
function _handleRedirectResult() {
  if (!_fbDb) return;
  firebase.auth().getRedirectResult().then(result => {
    if (result && result.user) {
      // Auth state changed — reload to reinit cleanly
      window.location.reload();
    }
  }).catch(e => {
    if (e && e.code) {
      console.warn('Google redirect result error:', e.code, e.message);
      state.authError = _authErrMsg(e);
      state.showAuth = true;
      render();
    }
  });
}

function signUpWithEmail() {
  if (!_fbDb) { state.authError = 'Firebase not available.'; render(); return; }
  const email = (state.authEmail || '').trim();
  const pw = state.authPassword || '';
  const pwc = state.authPasswordConfirm || '';
  if (!email || !pw) { state.authError = 'Enter email and password.'; render(); return; }
  if (pw.length < 6) { state.authError = 'Password should be at least 6 characters.'; render(); return; }
  if (pw !== pwc) { state.authError = 'Passwords don’t match.'; render(); return; }
  state.authLoading = true; state.authError = ''; render();
  const cred = firebase.auth.EmailAuthProvider.credential(email, pw);
  const cur = firebase.auth().currentUser;
  const doLink = cur && cur.isAnonymous;
  const action = doLink
    ? cur.linkWithCredential(cred)        // preserves UID + all existing garden data
    : firebase.auth().createUserWithEmailAndPassword(email, pw); // fresh account
  action.then(() => {
    window.location.reload();
  }).catch(e => {
    // If linking failed because email already exists, suggest signing in
    if (e && e.code === 'auth/email-already-in-use' && doLink) {
      state.authLoading = false;
      state.authError = 'An account with this email already exists. Sign in instead — note this will switch you off your current anonymous session.';
      state.authMode = 'signin';
      render();
      return;
    }
    state.authLoading = false;
    state.authError = _authErrMsg(e);
    render();
  });
}

function sendPasswordReset() {
  if (!_fbDb) { state.authError = 'Firebase not available.'; render(); return; }
  const email = (state.authEmail || '').trim();
  if (!email) { state.authError = 'Enter your email address.'; render(); return; }
  state.authLoading = true; state.authError = ''; state.authMsg = ''; render();
  firebase.auth().sendPasswordResetEmail(email).then(() => {
    state.authLoading = false;
    state.authMsg = 'Password reset email sent. Check your inbox.';
    render();
  }).catch(e => {
    state.authLoading = false;
    state.authError = _authErrMsg(e);
    render();
  });
}

function signOutUser() {
  if (!confirm('Sign out? You can sign back in anytime to access your garden.')) return;
  firebase.auth().signOut().then(() => {
    // Drop back to a fresh anonymous session via reload
    window.location.reload();
  }).catch(e => alert('Sign out failed: ' + (e.message || 'unknown error')));
}

function initFirebaseSync() {
  // Load profile first so we know the garden name before rendering
  userRef('profile').once('value').then(snap => {
    const profile = snap.val();
    if (profile) {
      if (profile.gardenName) { state.gardenName = profile.gardenName; localStorage.setItem("pt_gardenName", profile.gardenName); }
      if (profile.gardenLocation) { state.gardenLocation = profile.gardenLocation; localStorage.setItem("pt_gardenLocation", profile.gardenLocation); }
      if (profile.phoneNumber) { state.phoneNumber = profile.phoneNumber; localStorage.setItem("pt_phoneNumber", profile.phoneNumber); }
      if (profile.hardinessZone) { state.hardinessZone = profile.hardinessZone; localStorage.setItem("pt_hardinessZone", profile.hardinessZone); }
      if (state.gardenLocation && !state.hardinessZone && typeof deriveHardinessZone === 'function') {
        setTimeout(() => deriveHardinessZone(state.gardenLocation), 200);
      }
      if (profile.theme === 'modern' || profile.theme === 'vintage') {
        state.theme = profile.theme; localStorage.setItem("pt_theme", profile.theme);
        applyTheme();
      }
    }
    // Populate authUser snapshot for UI
    if (_authUser) {
      state.authUser = { uid: _authUser.uid, email: _authUser.email || '', isAnonymous: !!_authUser.isAnonymous };
    }
    if (!state.gardenName) state.showSetup = true;
    document.title = state.gardenName || 'PlantBuddy';
    render();
  }).catch(() => { if (!state.gardenName) { state.showSetup = true; render(); } });

  // Tasks sync
  userRef('tasks').on('value', snap => {
    const data = snap.val();
    if (!_fbTasksInitDone) {
      if (data) { const local = state.tasks; state.tasks = Object.assign({}, data); Object.keys(local).forEach(k => { if (!state.tasks[k]) state.tasks[k] = local[k]; }); }
      _fbTasksInitDone = true;
      localStorage.setItem("pt_tasks", JSON.stringify(state.tasks));
      render();
    } else if (data && JSON.stringify(data) !== JSON.stringify(state.tasks)) {
      state.tasks = data; localStorage.setItem("pt_tasks", JSON.stringify(data)); render();
    }
  });

  // Photos sync
  userRef('photos').on('value', snap => {
    const data = snap.val();
    if (!_fbPhotosInitDone) {
      if (data) { const local = state.photos; state.photos = Object.assign({}, data); Object.keys(local).forEach(id => { if (!state.photos[id]) state.photos[id] = local[id]; }); }
      _fbPhotosInitDone = true;
      localStorage.setItem("pt_photos", JSON.stringify(state.photos));
      render();
    } else if (data && JSON.stringify(data) !== JSON.stringify(state.photos)) {
      state.photos = data; localStorage.setItem("pt_photos", JSON.stringify(data)); render();
    }
  });

  // Notes sync
  userRef('notes').on('value', snap => {
    const data = snap.val();
    if (!_fbNotesInitDone) {
      if (data) { const local = state.notes; state.notes = Object.assign({}, data); Object.keys(local).forEach(id => { if (!state.notes[id]) state.notes[id] = local[id]; }); }
      _fbNotesInitDone = true;
      localStorage.setItem("pt_notes", JSON.stringify(state.notes));
    } else if (data && JSON.stringify(data) !== JSON.stringify(state.notes)) {
      state.notes = data; localStorage.setItem("pt_notes", JSON.stringify(data));
    }
  });

  // Cultivars sync
  userRef('cultivars').once('value').then(snap => {
    const data = snap.val();
    if (data) {
      // Deep merge: for each plant ID, combine Firebase + local arrays by cultivar name
      const local = state.cultivars;
      state.cultivars = Object.assign({}, data);
      Object.keys(local).forEach(id => {
        if (!state.cultivars[id]) {
          state.cultivars[id] = local[id];
        } else {
          // Append local cultivars not already in Firebase (match by name)
          const fbNames = state.cultivars[id].map(c => c.name);
          local[id].forEach(c => { if (!fbNames.includes(c.name)) state.cultivars[id].push(c); });
        }
      });
    }
    _fbCultivarsInitDone = true;
    localStorage.setItem('pt_cultivars', JSON.stringify(state.cultivars));
    saveCultivars();
  }).catch(() => { _fbCultivarsInitDone = true; });

  // Garden + beds sync — with one-time migration from old global path
  _fbRef.once('value').then(userSnap => {
    if (!userSnap.val()) {
      // No user-specific garden yet — check old global path for migration
      _fbDb.ref('garden').once('value').then(oldSnap => {
        const oldData = oldSnap.val();
        // Only migrate if old data exists and hasn't been marked as migrated
        if (oldData && typeof oldData === 'object' && !oldData._migrated_to_users) {
          const gardenData = Object.assign({}, oldData);
          delete gardenData._migrated_to_users;
          _fbRef.set(gardenData).catch(() => {});
          // Migrate other paths too
          _fbDb.ref('tasks').once('value').then(s => { if (s.val()) userRef('tasks').set(s.val()).catch(() => {}); });
          _fbDb.ref('photos').once('value').then(s => { if (s.val()) userRef('photos').set(s.val()).catch(() => {}); });
          _fbDb.ref('notes').once('value').then(s => { if (s.val()) userRef('notes').set(s.val()).catch(() => {}); });
          _fbDb.ref('beds').once('value').then(s => { if (s.val()) userRef('beds').set(s.val()).catch(() => {}); });
          _fbDb.ref('garden/_migrated_to_users').set(true).catch(() => {});
        }
        startGardenListener();
      }).catch(() => startGardenListener());
    } else {
      startGardenListener();
    }
  }).catch(() => startGardenListener());

  function startGardenListener() {
    _fbRef.on('value', snap => {
      const remoteData = snap.val();
      if (!_fbInitialLoadDone) {
        _fbSyncing = true;
        if (remoteData) {
          const localGarden = state.garden;
          state.garden = Object.assign({}, remoteData);
          Object.keys(localGarden).forEach(id => { if (!state.garden[id]) state.garden[id] = localGarden[id]; });
        }
        _fbInitialLoadDone = true;
        initGardenDefaults();
        userRef('beds').once('value').then(snap => {
          const remoteBeds = snap.val();
          if (remoteBeds && Array.isArray(remoteBeds)) { state.beds = remoteBeds; localStorage.setItem("pt_beds", JSON.stringify(state.beds)); }
        });
        localStorage.setItem("pt_garden", JSON.stringify(state.garden));
        render(); _fbSyncing = false;
      } else if (remoteData && JSON.stringify(remoteData) !== JSON.stringify(state.garden)) {
        _fbSyncing = true;
        state.garden = remoteData;
        localStorage.setItem("pt_garden", JSON.stringify(remoteData));
        render(); _fbSyncing = false;
      }
    });
  }

  // Image cache — shared global path (not user-scoped, just plant thumbnails)
  _fbDb.ref('imageCache').once('value', snap => {
    const data = snap.val();
    if (data) {
      _imgCache = data;
      Object.keys(data).forEach(id => { if (!localStorage.getItem('pimg_' + id)) localStorage.setItem('pimg_' + id, data[id]); });
    }
    Object.keys(localStorage).filter(k => k.startsWith('pimg_')).forEach(k => {
      const id = k.replace('pimg_', '');
      const val = localStorage.getItem(k);
      if (val && val.startsWith('data:') && !_imgCache[id]) _imgCache[id] = val;
    });
    _imgCacheReady = true;
    render();
    setTimeout(fetchAllImages, 1000);
  });
  loadSharedClaudeKey();
  initSharedPlants();
}

const _builtinPlantCount = PLANTS.length;
let _sharedClaudeKey = '';

function loadSharedClaudeKey() {
  if (!_fbDb) return;
  _fbDb.ref('app_config/claudeApiKey').once('value').then(snap => {
    const key = snap.val();
    if (key) { _sharedClaudeKey = key; }
  }).catch(() => {});
}

function shareClaudeKey() {
  const key = state.claudeApiKey;
  if (!key || !_fbDb) return;
  _fbDb.ref('app_config/claudeApiKey').set(key).then(() => {
    _sharedClaudeKey = key;
    state._shareKeyMsg = 'Key shared — all users will use it automatically.';
    render();
    setTimeout(() => { state._shareKeyMsg = ''; render(); }, 3500);
  }).catch(e => {
    state._shareKeyMsg = 'Error: ' + e.message;
    render();
  });
}

function initSharedPlants() {
  if (!_fbDb) return;
  _fbDb.ref('shared_plants').on('value', snap => {
    PLANTS.splice(_builtinPlantCount);
    const shared = snap.val() || {};
    // Store the Firebase push key as _fbKey so we can delete later
    Object.entries(shared).forEach(([fbKey, p]) => {
      if (p && p.id) PLANTS.push({ ...p, _fbKey: fbKey });
    });
    render();
  });
}

async function deleteSharedPlant(id) {
  const plant = PLANTS.find(p => p.id === id);
  if (!plant) return;
  if (!confirm(`Delete "${plant.name}" from the shared database?\nThis cannot be undone — all users will lose it.`)) return;

  // _fbKey may be missing for plants added before the key-tracking fix —
  // query Firebase by child value to find the right push key
  let fbKey = plant._fbKey;
  if (!fbKey && _fbDb) {
    try {
      const snap = await _fbDb.ref('shared_plants').orderByChild('id').equalTo(id).once('value');
      const data = snap.val() || {};
      fbKey = Object.keys(data)[0];
    } catch(e) {}
  }

  if (!fbKey) { alert('Could not locate this plant in the database.'); return; }

  try {
    if (_fbDb) await _fbDb.ref('shared_plants/' + fbKey).remove();
    const idx = PLANTS.findIndex(p => p.id === id);
    if (idx !== -1) PLANTS.splice(idx, 1);
  } catch(e) {
    alert('Delete failed: ' + (e.message || 'Check Firebase rules allow deletes on shared_plants.'));
    return;
  }
  state.detailId = null;
  state.prevPlantId = null;
  render();
}

// ===== BED DESIGNER FUNCTIONS =====
function saveBeds() {
  if (isViewing()) return;
  localStorage.setItem("pt_beds", JSON.stringify(state.beds));
  if (_fbReady && _fbRef && _fbInitialLoadDone) {
    userRef('beds').set(state.beds).catch(e => console.warn('Firebase beds write failed:', e));
  }
}
function createNewBed() {
  if (isViewing()) return;
  state.beds.push({ name: 'Bed ' + (state.beds.length+1), paths: [], plants: [] });
  state.currentBedIdx = state.beds.length - 1;
  state.bedView = 'edit';
  saveBeds();
  render();
}
function deleteBed(idx) {
  if (isViewing()) return;
  if (!confirm('Delete this bed?')) return;
  state.beds.splice(idx, 1);
  if (state.currentBedIdx >= state.beds.length) state.currentBedIdx = Math.max(0, state.beds.length-1);
  if (state.beds.length === 0) state.bedView = 'list';
  saveBeds();
  render();
}
function getBedPlantColor(p) {
  const colors = {'pink':'#ec4899','red':'#ef4444','purple':'#a855f7','blue':'#3b82f6','white':'#e2e8f0','yellow':'#eab308','orange':'#f97316','green':'#22c55e','lavender':'#c084fc','coral':'#fb7185','cream':'#fef3c7','bronze':'#b45309','gold':'#d4a017','magenta':'#e879f9','silver':'#94a3b8','chartreuse':'#a3e635'};
  const c = (p.bloomColor||'green').toLowerCase().split(/[\/,]/)[0].trim();
  return colors[c] || '#4ade80';
}
function bedPlantInitials(name) {
  return name.split(/\s+/).map(w=>w[0]).join('').slice(0,3).toUpperCase();
}
function getCompanionRecs(bed) {
  if (!bed || !bed.plants || bed.plants.length === 0) return [];
  const placedIds = new Set(bed.plants.map(bp => bp.id));
  const compSet = new Set();
  bed.plants.forEach(bp => {
    const plant = PLANTS.find(p => p.id === bp.id);
    if (plant && plant.companions) {
      const compList = Array.isArray(plant.companions) ? plant.companions : String(plant.companions).split(',');
      compList.forEach(c => {
        const ct = c.trim().toLowerCase();
        PLANTS.forEach(pp => {
          if (!placedIds.has(pp.id) && isPlanted(pp.id) && pp.name.toLowerCase().includes(ct)) compSet.add(pp.id);
        });
      });
    }
  });
  // Also find plants that bloom in gap months
  const coveredMonths = new Set();
  bed.plants.forEach(bp => {
    const plant = PLANTS.find(p => p.id === bp.id);
    if (plant) plant.bloomMonths.forEach(m => coveredMonths.add(m));
  });
  const gapMonths = [];
  for (let m=3;m<=10;m++) if (!coveredMonths.has(m)) gapMonths.push(m);
  if (gapMonths.length > 0) {
    PLANTS.forEach(pp => {
      if (!placedIds.has(pp.id) && isPlanted(pp.id) && pp.bloomMonths.some(m => gapMonths.includes(m))) compSet.add(pp.id);
    });
  }
  return Array.from(compSet).slice(0, 8).map(id => PLANTS.find(p => p.id === id)).filter(Boolean);
}

function renderBeds() {
  if (state.bedView === 'list' || state.beds.length === 0) return renderBedList();
  return renderBedEditor();
}

  if (viewing) {
    h += '<div class="bed-name-input" style="background:transparent;border:none;padding:0;font-weight:600;color:var(--gold-light)">'+escHtml(bed.name||'')+'</div>';

      if (!viewing) h += ' onmousedown="startDragPlant(event,'+pi+')" ontouchstart="startDragPlant(event,'+pi+')"';

  const mNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  mNames.forEach((mn, mi) => {
    const m = mi + 1;

    h += '<div class="m-btn '+(isSel?'sel':'')+'" onclick="toggleBedMonth('+m+')">'+mn+'</div>';
  });
  h += '</div>';

  return h;
}

function toggleBedMonth(m) {
  const idx = state.bedSelectedMonths.indexOf(m);
  if (idx >= 0) state.bedSelectedMonths.splice(idx, 1);

}

function addPlantToBedCenter(plantId) {
  if (isViewing()) return;

  if (!bed) return;
  if (!bed.plants) bed.plants = [];

  const x = 30 + Math.random() * 40;
  const y = 30 + Math.random() * 40;
  bed.plants.push({ id: plantId, x: Math.round(x*10)/10, y: Math.round(y*10)/10 });

function removeBedPlant(idx) {
  if (isViewing()) return;
  const bed = state.beds[state.currentBedIdx];
  if (!bed) return;
  bed.plants.splice(idx, 1);
  saveBeds();
  render();
}

// Canvas drawing
function initBedCanvas() {
  const canvas = document.getElementById('bedCanvas');
  const wrap = document.getElementById('bedCanvasWrap');
  if (!canvas || !wrap) return;
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  const ctx = canvas.getContext('2d');
  const bed = state.beds[state.currentBedIdx];
  if (!bed) return;

  // Draw saved paths
  drawBedCanvas(ctx, canvas, bed);

  // Drawing mode — only attach when active
  if (state.bedDrawing) {
    let drawing = false;
    let currentPath = [];
    const getPos = (e) => {
      const rect = canvas.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return [(clientX - rect.left) / rect.width, (clientY - rect.top) / rect.height];
    };
    const minDist = 0.015;
    const closeDist = 0.05;
    const minPointsToClose = 8;
    const savePath = () => {
      drawing = false;
      if (currentPath.length > 3) {
        bed.paths = [cleanBedPath(currentPath)];
        saveBeds();
      }
      state.bedDrawing = false;
      render();
    };
    const startDraw = (e) => { e.preventDefault(); e.stopPropagation(); drawing = true; currentPath = [getPos(e)]; };
    const moveDraw = (e) => {
      if (!drawing) return;
      e.preventDefault(); e.stopPropagation();
      const pt = getPos(e);
      const last = currentPath[currentPath.length - 1];
      const dx = pt[0] - last[0], dy = pt[1] - last[1];
      if (dx*dx + dy*dy < minDist*minDist) return;
      currentPath.push(pt);
      const start = currentPath[0];
      const toDx = pt[0] - start[0], toDy = pt[1] - start[1];
      const nearStart = currentPath.length >= minPointsToClose && Math.sqrt(toDx*toDx + toDy*toDy) < closeDist;
      drawBedCanvas(ctx, canvas, bed);
      drawSmoothPath(ctx, canvas, currentPath, nearStart ? 'rgba(74,222,128,.9)' : 'rgba(245,200,66,.8)', 2, false);
      var w = canvas.width, h = canvas.height;
      ctx.beginPath();
      ctx.arc(start[0]*w, start[1]*h, nearStart ? 10 : 6, 0, Math.PI*2);
      ctx.fillStyle = nearStart ? 'rgba(74,222,128,.5)' : 'rgba(245,200,66,.3)';
      ctx.fill();
      ctx.strokeStyle = nearStart ? 'rgba(74,222,128,1)' : 'rgba(245,200,66,.6)';
      ctx.lineWidth = 2;
      ctx.stroke();
      if (nearStart) savePath();
    };
    const endDraw = () => {
      if (!drawing) return;
      savePath();
    };
    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', moveDraw);
    canvas.addEventListener('mouseup', endDraw);
    canvas.addEventListener('touchstart', startDraw, {passive:false});
    canvas.addEventListener('touchmove', moveDraw, {passive:false});
    canvas.addEventListener('touchend', endDraw);
    return; // Don't add placement listeners when drawing
  }

  // Placement is handled by inline bedWrapTap() on the wrap div
}

function segIntersect(a, b, c, d) {
  var dx1=b[0]-a[0], dy1=b[1]-a[1], dx2=d[0]-c[0], dy2=d[1]-c[1];
  var denom = dx1*dy2 - dy1*dx2;
  if (Math.abs(denom) < 1e-10) return null;
  var t = ((c[0]-a[0])*dy2 - (c[1]-a[1])*dx2) / denom;
  var u = ((c[0]-a[0])*dy1 - (c[1]-a[1])*dx1) / denom;
  if (t > 0.01 && t < 0.99 && u > 0.01 && u < 0.99)
    return [a[0]+t*dx1, a[1]+t*dy1];
  return null;
}

function removeIntersections(pts) {
  if (pts.length < 4) return pts;
  pts = pts.slice();
  for (var iter = 0; iter < 30; iter++) {
    var found = false;
    for (var i = 0; i < pts.length - 2 && !found; i++) {
      for (var j = i + 2; j < pts.length - 1; j++) {
        if (i === 0 && j === pts.length - 2) continue;
        var ix = segIntersect(pts[i], pts[i+1], pts[j], pts[j+1]);
        if (ix) {
          pts.splice(i+1, j - i, ix);
          found = true;
          break;
        }
      }
    }
    if (!found) break;
  }
  return pts;
}

function chaikinSmooth(pts, iterations) {
  for (var iter = 0; iter < iterations; iter++) {
    var np = [];
    for (var i = 0; i < pts.length; i++) {
      var nx = (i + 1) % pts.length;
      np.push([0.75*pts[i][0]+0.25*pts[nx][0], 0.75*pts[i][1]+0.25*pts[nx][1]]);
      np.push([0.25*pts[i][0]+0.75*pts[nx][0], 0.25*pts[i][1]+0.75*pts[nx][1]]);
    }
    pts = np;
  }
  return pts;
}

function cleanBedPath(raw) {
  var pts = removeIntersections(raw);
  pts = chaikinSmooth(pts, 3);
  return simplifyPath(pts, 0.006);
}

function simplifyPath(pts, tolerance) {
  if (pts.length <= 2) return pts;
  var maxDist = 0, maxIdx = 0;
  var ax = pts[0][0], ay = pts[0][1], bx = pts[pts.length-1][0], by = pts[pts.length-1][1];
  var dx = bx - ax, dy = by - ay, lenSq = dx*dx + dy*dy;
  for (var i = 1; i < pts.length - 1; i++) {
    var t = lenSq ? Math.max(0, Math.min(1, ((pts[i][0]-ax)*dx + (pts[i][1]-ay)*dy) / lenSq)) : 0;
    var px = ax + t*dx - pts[i][0], py = ay + t*dy - pts[i][1];
    var d = px*px + py*py;
    if (d > maxDist) { maxDist = d; maxIdx = i; }
  }
  if (maxDist > tolerance * tolerance) {
    var left = simplifyPath(pts.slice(0, maxIdx + 1), tolerance);
    var right = simplifyPath(pts.slice(maxIdx), tolerance);
    return left.slice(0, -1).concat(right);
  }
  return [pts[0], pts[pts.length - 1]];
}

function drawSmoothPath(ctx, canvas, path, strokeColor, lineWidth, closePath) {
  if (path.length < 2) return;
  ctx.beginPath();
  var w = canvas.width, h = canvas.height;
  ctx.moveTo(path[0][0]*w, path[0][1]*h);
  if (path.length === 2) {
    ctx.lineTo(path[1][0]*w, path[1][1]*h);
  } else {
    for (var i = 0; i < path.length - 1; i++) {
      var cx = (path[i][0] + path[i+1][0]) / 2 * w;
      var cy = (path[i][1] + path[i+1][1]) / 2 * h;
      if (i === 0) {
        ctx.lineTo(cx, cy);
      } else {
        ctx.quadraticCurveTo(path[i][0]*w, path[i][1]*h, cx, cy);
      }
    }
    var last = path[path.length - 1];
    if (closePath) {
      ctx.quadraticCurveTo(last[0]*w, last[1]*h, (last[0]+path[0][0])/2*w, (last[1]+path[0][1])/2*h);
      ctx.quadraticCurveTo(path[0][0]*w, path[0][1]*h, (path[0][0]+path[1][0])/2*w, (path[0][1]+path[1][1])/2*h);
      ctx.closePath();
    } else {
      ctx.lineTo(last[0]*w, last[1]*h);
    }
  }
  if (closePath) { ctx.fillStyle = 'rgba(34,128,74,.12)'; ctx.fill(); }
  ctx.strokeStyle = strokeColor;
  ctx.lineWidth = lineWidth;
  ctx.stroke();
}

function drawBedCanvas(ctx, canvas, bed) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = 'rgba(30,48,40,.5)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < canvas.width; x += 40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke(); }
  for (let y = 0; y < canvas.height; y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke(); }
  if (bed.paths) {
    bed.paths.forEach(path => {
      if (path.length < 2) return;
      drawSmoothPath(ctx, canvas, path, 'rgba(74,222,128,.6)', 2, true);
    });
  }
}

function bedWrapTouchStart(e) {

// Tap on bed canvas wrap to place selected plant
function bedWrapTap(e) {
  if (isViewing()) return;
  if (!state.bedDragging || state.bedDrawing) return;
  if (e.target.closest('.bed-plant-marker')) return;
  var clientX, clientY;
  if (e.type === 'touchend' && e.changedTouches && e.changedTouches[0]) {
    clientX = e.changedTouches[0].clientX;
    clientY = e.changedTouches[0].clientY;
    e.preventDefault();
  } else if (e.type === 'click') {
    clientX = e.clientX;
    clientY = e.clientY;
  } else { return; }
  var wrap = document.getElementById('bedCanvasWrap');
  if (!wrap) return;
  var rect = wrap.getBoundingClientRect();
  var x = ((clientX - rect.left) / rect.width) * 100;
  var y = ((clientY - rect.top) / rect.height) * 100;
  if (x < 0 || x > 100 || y < 0 || y > 100) return;
  var bed = state.beds[state.currentBedIdx];
  if (!bed) return;
  if (!bed.plants) bed.plants = [];
  bed.plants.push({ id: state.bedDragging, x: Math.round(x*10)/10, y: Math.round(y*10)/10 });
  state.bedDragging = null;
  saveBeds();
  render();
}

// Drag plant markers around the canvas (works on both mobile and desktop)
function startDragPlant(e, plantIdx) {
  if (isViewing()) return;
  e.preventDefault();
  e.stopPropagation();
  const bed = state.beds[state.currentBedIdx];
  if (!bed || !bed.plants[plantIdx]) return;
  const wrap = document.getElementById('bedCanvasWrap');
  if (!wrap) return;
  const rect = wrap.getBoundingClientRect();
  const move = (ev) => {
    ev.preventDefault();
    const cx = ev.touches ? ev.touches[0].clientX : ev.clientX;
    const cy = ev.touches ? ev.touches[0].clientY : ev.clientY;
    bed.plants[plantIdx].x = Math.round(((cx - rect.left) / rect.width) * 1000) / 10;
    bed.plants[plantIdx].y = Math.round(((cy - rect.top) / rect.height) * 1000) / 10;
    const marker = e.target.closest('.bed-plant-marker');
    if (marker) { marker.style.left = bed.plants[plantIdx].x+'%'; marker.style.top = bed.plants[plantIdx].y+'%'; }
  };
  const up = () => {
    document.removeEventListener('mousemove', move);
    document.removeEventListener('mouseup', up);
    document.removeEventListener('touchmove', move);
    document.removeEventListener('touchend', up);
    saveBeds();
  };
  document.addEventListener('mousemove', move);
  document.addEventListener('mouseup', up);
  document.addEventListener('touchmove', move, {passive:false});
  document.addEventListener('touchend', up);
}

function updatePairingInput(plantId, query) {
  const dd = document.getElementById('pairing-dropdown'); if (!dd) return;
  const q = query.trim().toLowerCase();
  if (!q) { dd.innerHTML = ''; dd.style.display = 'none'; return; }
  const existing = (state.garden[String(plantId)] || {}).myPairings || [];
  const matches = PLANTS
    .filter(p => p.name.toLowerCase().includes(q) && !existing.includes(p.name))
    .sort((a, b) => (isPlanted(a.id) ? 0 : 1) - (isPlanted(b.id) ? 0 : 1))
    .slice(0, 8);
  const exactExists = existing.includes(query.trim());
  let html = matches.map(m => {
    const planted = isPlanted(m.id);
    const safe = m.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return `<div onclick="selectPairing(${plantId},'${safe}')" style="padding:10px 14px;cursor:pointer;font-size:13px;color:var(--text);display:flex;align-items:center;gap:8px" onmouseover="this.style.background='rgba(74,222,128,.08)'" onmouseout="this.style.background='none'">
      ${planted ? '<span style="font-size:10px;background:rgba(74,222,128,.15);color:#4ade80;padding:2px 6px;border-radius:8px;font-weight:600;flex-shrink:0">In My Garden</span>' : '<span style="width:6px;height:6px;border-radius:50%;background:rgba(74,222,128,.3);flex-shrink:0;display:inline-block"></span>'}
      ${escHtml(m.name)}
    </div>`;
  }).join('');
  if (!exactExists) {
    const safe = query.trim().replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    html += `<div onclick="selectPairing(${plantId},'${safe}')" style="padding:10px 14px;cursor:pointer;font-size:13px;color:#7a8a80;border-top:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:8px" onmouseover="this.style.background='rgba(74,222,128,.08)'" onmouseout="this.style.background='none'">
      <span style="color:#4ade80;font-weight:700">+</span> Add "${escHtml(query.trim())}" as custom
    </div>`;
  }
  dd.innerHTML = html; dd.style.display = 'block';
}

async function cultivarScanAnalyze() {
  const images = state.cultivarScanImages || [];
  if (!images.length) return;
  const key = state.claudeApiKey || _sharedClaudeKey;
  if (!key) { state.cultivarScanError = 'No API key — add one in Settings.'; render(); return; }

  const plant = PLANTS.find(p => p.id === state.cultivarScanPlantId);
  const plantName = plant ? plant.name : 'this plant';

  state.cultivarScanLoading = true;
  state.cultivarScanError = '';
  state.cultivarScanResult = null;
  render();

  try {
    const imgBlocks = images.map(dataUrl => {
      const [meta, b64] = dataUrl.split(',');
      const mediaType = (meta.match(/:(.*?);/) || [])[1] || 'image/jpeg';
      return { type: 'image', source: { type: 'base64', media_type: mediaType, data: b64 } };
    });

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'content-type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 800,
        messages: [{
          role: 'user',
          content: [
            ...imgBlocks,
            { type: 'text', text:
`This is a plant nursery tag or information card for a cultivar of ${plantName}. Read ALL text AND interpret ALL icons/symbols visible on the tag — front and back.

Return ONLY a JSON object — no prose, no markdown, no code fences:
{
  "cultivar_name": "Walker's Low",
  "grower": "Proven Winners",
  "grower_website": "provenwinners.com",
  "height": "18-24 in",
  "spread": "24-36 in",
  "bloom_color": "lavender-blue",
  "bloom_months": "Jun, Jul, Aug, Sep",
  "hardiness_zones": "4-8",
  "sun": "Full Sun to Part Shade",
  "water": "Low to Medium",
  "soil": "Well-drained",
  "deer_resistant": true,
  "rabbit_resistant": false,
  "attracts": "Bees, Butterflies",
  "fragrant": false,
  "award": "AAS Winner 2022",
  "care_tip": "Deadhead spent blooms to encourage rebloom",
  "sku": "12345",
  "notes": "Any remaining text or features not captured above"
}

Rules:
- cultivar_name: cultivar portion only — e.g. "Walker's Low", not "Nepeta Walker's Low"
- grower: the brand/nursery name printed or shown (Proven Winners, First Editions, Monrovia, Spring Meadow, Walters Gardens, Terra Nova, etc.)
- grower_website: website if printed on tag, else ""
- bloom_months: list months shown by icons or text (e.g. "Jun, Jul, Aug")
- sun: interpret sun/shade icons — Full Sun, Part Sun to Full Sun, Part Sun / Part Shade, Part Shade to Full Shade, Full Shade
- water: interpret water-drop icons or text — Low, Medium, High, or range
- deer_resistant / rabbit_resistant: true if shown by icon or text, false if shown as not resistant, null if not mentioned
- attracts: comma-separated list if shown (Bees, Butterflies, Hummingbirds, Birds)
- fragrant: true/false/null
- award: any award text or badge shown (AAS Winner, Plant of the Year, etc.) — "" if none
- care_tip: most important care instruction from the tag
- sku: item/SKU number if visible, else ""
- Leave any field as "" or null if not visible on the tag`
            }
          ]
        }]
      })
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error((err.error || {}).message || `HTTP ${resp.status}`);
    }
    const data = await resp.json();
    const text = ((data.content || [])[0] || {}).text || '';
    const match = text.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('Unexpected response format');
    state.cultivarScanResult = JSON.parse(match[0]);
  } catch(e) {
    state.cultivarScanError = e.message || 'Scan failed';
  }
  state.cultivarScanLoading = false;
  render();
}

function cultivarScanUse() {
  const r = state.cultivarScanResult;
  if (!r) return;
  const id = state.cultivarScanPlantId;
  if (!state.cultivars[id]) state.cultivars[id] = [];

  const cultivarName = r.cultivar_name || '';
  const parts = [];
  if (r.height) parts.push(r.height);
  if (r.spread) parts.push('spread ' + r.spread);
  if (r.bloom_color) parts.push(r.bloom_color + ' blooms');
  if (r.bloom_months) parts.push(r.bloom_months);
  if (r.sun) parts.push(r.sun);
  if (r.water) parts.push('Water: ' + r.water);
  if (r.hardiness_zones) parts.push('Zones ' + r.hardiness_zones);
  if (r.deer_resistant === true) parts.push('Deer resistant');
  if (r.rabbit_resistant === true) parts.push('Rabbit resistant');
  if (r.fragrant === true) parts.push('Fragrant');
  if (r.attracts) parts.push('Attracts: ' + r.attracts);
  if (r.award) parts.push(r.award);
  if (r.care_tip) parts.push(r.care_tip);
  if (r.notes) parts.push(r.notes);

  state.cultivars[id].push({
    name: cultivarName,
    source: r.grower || '',
    notes: parts.join(' · '),
    tagImages: state.cultivarScanImages.slice(),
    scannedData: r,
    dateAdded: new Date().toISOString(),
    planted: false,
    wishlist: false,
    where: '',
    cultivarNotes: ''
  });
  saveCultivars();
  state.showCultivarScan = false;
  try {
    render();
  } catch(e) {
    // render() threw — force-close modal by rebuilding minimal UI
    const app = document.getElementById('app');
    if (app) {
      // Remove all fixed overlays
      app.querySelectorAll('[style*="position:fixed"]').forEach(el => el.remove());
    }
    console.error('render() threw after cultivarScanUse:', e);
  }
  showToast('✓ Cultivar saved — scroll down to Cultivars');
  setTimeout(() => {
    const el = Array.from(document.querySelectorAll('h3')).find(h => h.textContent.trim() === 'Cultivars');
    if (el) el.closest('div')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 150);
}

function displayName(p) {
  const g = state.garden[p.id];
  const raw = (g && g.customName) || p.name;
  // Wrap parenthetical or single-quoted segments so the vintage theme can render
  // them in italic serif (Pinyon Script copperplate parens look awkward).
  return raw.replace(/\s*(\([^)]+\)|'[^']+')/g, ' <span class="name-alt">$1</span>');
}

// The plant's common/vernacular name only — used for the Plate I title overlay.
// If p.name is "Acanthus (Bear's Breeches)" this returns "Bear's Breeches";
// if it's just "Bleeding Heart" it returns "Bleeding Heart". Follows the
// Coneflower plate convention (common on top, botanical italic below).
function commonName(p) {
  const raw = (p && p.name) || '';
  const m = raw.match(/\(([^)]+)\)/);
  return (m ? m[1] : raw).trim();
}

}

function getFiltered() {
