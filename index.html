  const titleMap = {1: isEditing?'Edit Plant':'Add New Plant', 2:'Similar Plants Found', 3:'Verify Plant', 4: isEditing?'Edit Details':'Plant Details', 5: isEditing?'Plant Updated!':'Plant Added!'};
  // Back button: in edit mode at step 4 there's no prior step to go back to in the modal
  const showBack = step > 1 && step < 5 && !(isEditing && step === 4);

  return `
    <div style="position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;display:flex;align-items:flex-end;justify-content:center;padding:0" onclick="if(event.target===this){state.showAddPlant=false;state.apIsEditing=false;render()}">

        </div>
        ${stepDots}
        ${body}
      </div>
    </div>
  `;
}

// ===== NATURAL-LANGUAGE ASK INTERFACE =====
function _askParseSize(str) {
  if (!str) return null;
  const s = String(str).toLowerCase();
  let m = s.match(/(\d+(?:\.\d+)?)\s*-\s*(\d+(?:\.\d+)?)\s*(in|ft)/);
  if (m) {
    const mult = m[3] === 'ft' ? 12 : 1;
    return { min: parseFloat(m[1]) * mult, max: parseFloat(m[2]) * mult };
  }
  m = s.match(/(\d+(?:\.\d+)?)\s*(in|ft)/);
  if (m) {
    const mult = m[2] === 'ft' ? 12 : 1;
    const n = parseFloat(m[1]) * mult;
    return { min: n, max: n };
  }
  return null;
}

function _askSunCategories(p) {
  const s = (p.sun || '').toLowerCase();
  if (s === 'full sun') return ['full-sun'];
  if (s === 'full sun to part shade') return ['full-sun', 'part-sun', 'part-shade'];
  if (s === 'part sun to full sun') return ['full-sun', 'part-sun'];
  if (s === 'part shade to part sun') return ['part-sun', 'part-shade'];
  if (s === 'shade to part shade') return ['shade', 'part-shade'];
  if (s === 'part shade to full shade') return ['shade', 'part-shade'];
  return [];
}

function applyAskFilter(spec) {
  spec = spec || {};
  const f = spec.filters || {};
  let list = PLANTS.slice();
  const scope = spec.scope || 'all';
  if (scope === 'garden') list = list.filter(p => isPlanted(p.id));
  else if (scope === 'wishlist') list = list.filter(p => isWishlisted(p.id));

  if (f.blooming != null && f.blooming !== false) {
    if (f.blooming === 'any' || f.blooming === true) list = list.filter(p => (p.bloomMonths || []).length > 0);
    else if (f.blooming === 'now') list = list.filter(p => (p.bloomMonths || []).includes(state.currentMonth));
    else if (typeof f.blooming === 'number') list = list.filter(p => (p.bloomMonths || []).includes(f.blooming));
  }
  if (Array.isArray(f.bloomColors) && f.bloomColors.length) {
    const cs = f.bloomColors.map(c => String(c).toLowerCase());
    list = list.filter(p => p.bloomColor && cs.includes(String(p.bloomColor).toLowerCase()));
  }
  if (typeof f.minHeightIn === 'number') list = list.filter(p => { const r = _askParseSize(p.height); return r && r.max >= f.minHeightIn; });
  if (typeof f.maxHeightIn === 'number') list = list.filter(p => { const r = _askParseSize(p.height); return r && r.min <= f.maxHeightIn; });
  if (typeof f.minWidthIn === 'number') list = list.filter(p => { const r = _askParseSize(p.width); return r && r.max >= f.minWidthIn; });
  if (typeof f.maxWidthIn === 'number') list = list.filter(p => { const r = _askParseSize(p.width); return r && r.min <= f.maxWidthIn; });
  if (Array.isArray(f.sunCategories) && f.sunCategories.length) {
    const want = new Set(f.sunCategories.map(c => String(c).toLowerCase()));
    list = list.filter(p => _askSunCategories(p).some(c => want.has(c)));
  }
  if (f.deerResistant === true) list = list.filter(p => p.deerResistant);
  if (f.rabbitResistant === true) list = list.filter(p => p.rabbitResistant);
  if (f.droughtTolerant === true) list = list.filter(p => p.droughtTolerant);
  if (f.nativeOhio === true) list = list.filter(p => p.nativeOhio);
  if (f.reblooming === true) list = list.filter(p => p.reblooming);
  if (f.evergreen === true) list = list.filter(p => /evergreen/i.test(p.type || ''));
  if (Array.isArray(f.attracts) && f.attracts.length) {
    const want = f.attracts.map(a => String(a).toLowerCase());
    list = list.filter(p => (p.attracts || []).some(a => want.some(w => String(a).toLowerCase().includes(w))));
  }
  if (Array.isArray(f.gardenStyles) && f.gardenStyles.length) {
    const want = f.gardenStyles.map(g => String(g).toLowerCase());
    list = list.filter(p => (p.gardenStyles || []).some(g => want.includes(String(g).toLowerCase())));
  }
  if (Array.isArray(f.types) && f.types.length) {
    const want = f.types.map(t => String(t).toLowerCase());
    list = list.filter(p => want.some(w => String(p.type || '').toLowerCase().includes(w)));
  }
  if (f.nameContains) {
    const q = String(f.nameContains).toLowerCase();
    list = list.filter(p => p.name.toLowerCase().includes(q) || String(p.botanical || '').toLowerCase().includes(q));
  }
  if (f.provenWinners === true) list = list.filter(p => p.provenWinners);
  if (f.monrovia === true) list = list.filter(p => p.monrovia);
  if (f.firstEditions === true) list = list.filter(p => p.firstEditions);

  if (spec.sort === 'height-desc') list.sort((a, b) => ((_askParseSize(b.height) || {}).max || 0) - ((_askParseSize(a.height) || {}).max || 0));
  else if (spec.sort === 'height-asc') list.sort((a, b) => ((_askParseSize(a.height) || {}).min || 9999) - ((_askParseSize(b.height) || {}).min || 9999));
  else if (spec.sort === 'bloom-month') list.sort((a, b) => ((a.bloomMonths || [])[0] || 13) - ((b.bloomMonths || [])[0] || 13));
  else if (spec.sort === 'name') list.sort((a, b) => a.name.localeCompare(b.name));

  if (typeof spec.limit === 'number' && spec.limit > 0) list = list.slice(0, spec.limit);
  return list;
}

async function askPlantBuddy() {
  const q = (state.askQuestion || '').trim();
  if (!q) return;
  const key = state.claudeApiKey || _sharedClaudeKey;
  if (!key) { state.askError = 'No API key — add one in Settings.'; render(); return; }
  state.askLoading = true;
  state.askError = '';
  state.askResults = null;
  render();

  const gardenCount = PLANTS.filter(p => isPlanted(p.id)).length;
  const wishCount = PLANTS.filter(p => isWishlisted(p.id)).length;
  const monthName = MONTHS[state.currentMonth - 1];

  const systemPrompt = `You are the PlantBuddy natural-language search interface. The user has a perennial plant database with ${PLANTS.length} plants. They have ${gardenCount} marked as planted in their garden, and ${wishCount} on their wishlist. Today is ${monthName} (month ${state.currentMonth}).

Convert the user's question into a JSON filter spec. Return ONLY the JSON object — no prose, no markdown, no code fences.

Schema (omit any field the user did not ask about):
{
  "scope": "all" | "garden" | "wishlist",
  "filters": {
    "blooming": "any" | "now" | <month 1-12>,
    "bloomColors": ["purple","pink","blue","white","yellow","red","orange","green","lavender","mixed"],
    "minHeightIn": <number>,
    "maxHeightIn": <number>,
    "minWidthIn": <number>,
    "maxWidthIn": <number>,
    "sunCategories": ["full-sun","part-sun","part-shade","shade"],
    "deerResistant": true,
    "rabbitResistant": true,
    "droughtTolerant": true,
    "nativeOhio": true,
    "reblooming": true,
    "evergreen": true,
    "attracts": ["butterflies","bees","birds","hummingbirds"],
    "gardenStyles": ["cottage","pollinator","prairie","border","woodland","modern","cutting","english","japanese","mediterranean","rock","tropical"],
    "types": ["shrub","grass","perennial","fern","groundcover","vine","bulb"],
    "nameContains": <string>,
    "provenWinners": true,
    "monrovia": true,
    "firstEditions": true
  },
  "sort": "default" | "height-asc" | "height-desc" | "bloom-month" | "name",
  "limit": <number, only if user gave one>,
  "intent": "<short human-readable phrase describing what was searched, e.g. 'tall plants for the back of the border'>"
}

Mapping rules:
- "shade-loving" / "for shade" → sunCategories ["shade","part-shade"]
- "sun-loving" / "for full sun" → sunCategories ["full-sun"]
- "part sun" → sunCategories ["part-sun"]
- "tall" / "back of the border" / "back of border" → minHeightIn 24, sort "height-desc"
- "short" / "low" / "front of the border" → maxHeightIn 12, sort "height-asc"
- "edging" / "for edging" → maxHeightIn 10
- "flowering" / "blooming" / "in flower" with no time qualifier → blooming "any"
- "blooming now" / "currently flowering" / "in bloom" → blooming "now"
- "blooming in <month>" → blooming as month number 1-12
- "my garden" / "I planted" / "show me my plants" → scope "garden"
- "wishlist" / "want to plant" / "saved" → scope "wishlist"
- "for pollinators" → attracts ["butterflies","bees","hummingbirds"]
- "for butterflies"/"for bees"/"for hummingbirds"/"for birds" → attracts with just that one
- "deer resistant" → deerResistant true
- "rabbit resistant" → rabbitResistant true
- "drought tolerant" / "for dry soil" / "xeric" → droughtTolerant true
- "native" / "ohio native" → nativeOhio true
- Convert feet to inches (1 ft = 12 in). Heights are in inches.
- If user asks for "N <something>", set limit to N.
- If user just says "what's in my garden" / "show me my plants" with no other filter, return scope "garden" with empty filters.
- Always include a short "intent" phrase for display.`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'content-type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 600,
        system: systemPrompt,
        messages: [{ role: 'user', content: q }]
      })
    });
    if (!resp.ok) {
      const t = await resp.text();
      throw new Error('API error ' + resp.status + ': ' + t.slice(0, 200));
    }
    const data = await resp.json();
    const text = (data.content && data.content[0] && data.content[0].text) || '';
    let spec;
    try {
      const m = text.match(/\{[\s\S]*\}/);
      spec = JSON.parse(m ? m[0] : text);
    } catch (e) {
      throw new Error('Could not parse response: ' + text.slice(0, 200));
    }
    const matched = applyAskFilter(spec);
    state.askResults = {
      plants: matched.map(p => p.id),
      spec,
      message: spec.intent || ''
    };
    const entry = { q, intent: spec.intent || '', count: matched.length, ts: Date.now() };
    state.askHistory.unshift(entry);
    state.askHistory = state.askHistory.slice(0, 10);
    try { localStorage.setItem('pt_askHistory', JSON.stringify(state.askHistory)); } catch (e) {}
  } catch (e) {
    state.askError = (e && e.message) || String(e);
  } finally {
    state.askLoading = false;
    render();
  }
}

            </button>
          ` : `
            <button onclick="openAsk()" title="Ask PlantBuddy" style="background:linear-gradient(135deg,rgba(74,222,128,.18),rgba(74,222,128,.08));border:1px solid rgba(74,222,128,.35);border-radius:8px;cursor:pointer;color:#4ade80;padding:7px 11px;display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700;transition:background .2s" onmouseover="this.style.filter='brightness(1.15)'" onmouseout="this.style.filter='none'">
              <span style="font-size:13px">✨</span><span>Ask</span>
            </button>
            <button onclick="state.showSettings=true;render()" title="Settings" style="background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:8px;cursor:pointer;color:rgba(255,255,255,.75);padding:7px 8px;display:flex;align-items:center;transition:background .2s" onmouseover="this.style.background='rgba(255,255,255,.2)'" onmouseout="this.style.background='rgba(255,255,255,.1)'">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="17" height="17"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </button>
          `}
        </div>
      </div>
      ${_viewing ? `
        <div style="margin-top:10px;padding:8px 12px;background:rgba(212,160,23,.12);border:1px solid rgba(212,160,23,.3);border-radius:8px;font-size:12px;color:#f5c842;display:flex;align-items:center;gap:8px">
          <span style="font-size:14px">👁️</span>
          <span style="flex:1">You're viewing a shared garden. Changes won't be saved.</span>
        </div>
      ` : ''}
      ${state.view==='browse'?`
        <div class="search-bar">
          <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="search" id="searchInput" placeholder="Search 200+ plants..." value="${state.search}" oninput="state.search=this.value;searchUpdate()">
        </div>
      `:''}
    </div>
  `;

  // Main content — only animate when the tab actually changes, not on every Firebase re-render
  const _mainHTML = state.view === 'browse' ? renderBrowse()
    : state.view === 'garden' ? renderGarden()
    : state.view === 'wishlist' ? renderWishlist()
    : renderBeds();
  const _viewChanged = state.view !== _lastView;
  _lastView = state.view;
  content += `<div class="${_viewChanged ? 'page-anim' : ''}">${_mainHTML}</div>`;

  // Bottom nav — 4 tabs
  const _v = state.view;
  content += `
    <div class="nav-bottom">
      <div class="nav-item ${_v==='browse'?'active':''}" onclick="state.view='browse';render()">
        <div class="ni-pill"></div>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span>Browse</span>
      </div>
      <div class="nav-item ${_v==='garden'?'active':''}" onclick="state.view='garden';render()">
        <div class="ni-pill"></div>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 20h10M10 20c5.5-2.5.8-6.4 3-10"/><path d="M9.5 9.4c1.1.8 1.8 2.2 2.3 3.7-2 .4-3.5.4-4.8-.3-1.2-.6-2.3-1.9-3-4.2 2.8-.5 4.4 0 5.5.8z"/><path d="M14.1 6a7 7 0 0 0-1.5 4.3c1.6 0 3-.6 4.2-1.6 1.1-1 1.9-2.4 2.2-4.2a7 7 0 0 0-4.9 1.5z"/></svg>
        <span>Garden</span>
      </div>
      <div class="nav-item ${_v==='beds'?'active':''}" onclick="state.view='beds';render()">
        <div class="ni-pill"></div>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 22h20"/><path d="M6 18V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v14"/><path d="M6 12h12"/><path d="M10 6h4"/></svg>
        <span>Beds</span>
      </div>
      <div class="nav-item ${_v==='wishlist'?'active':''}" onclick="state.view='wishlist';render()">
        <div class="ni-pill"></div>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        <span>Wishlist</span>
      </div>
    </div>
  `;

  // Detail overlay
  if (state.detailId) {
    try { content += renderDetail(); }
    catch(e) { console.error('renderDetail failed:', e); state.detailId = null; }
  }

  // Modals
  if (state.showSetup) content += renderSetupModal();
  if (state.showSettings) content += renderSettingsModal();
  if (state.showAuth) content += renderAuthModal();
  if (state.showAddPlant) content += renderAddPlantModal();
  if (state.showBedScan) content += renderBedScanModal();
  if (state.showCultivarScan) content += renderCultivarScanModal();
  if (state.showAsk) content += renderAskModal();

  app.innerHTML = content;
  if (state.view === 'beds' && state.bedView === 'edit') setTimeout(initBedCanvas, 50);
  if (state.detailId) setTimeout(() => { initHeroSwipe(); initMonthlyCareCenter(); initPlateFlip(); }, 0);
}

// If we just bounced back from a failed Google redirect, surface the error
try {
  const _redirErr = sessionStorage.getItem('pt_authRedirectErr');
  if (_redirErr) {
    sessionStorage.removeItem('pt_authRedirectErr');
    state.showAuth = true;
    state.authMode = 'signin';
    state.authError = 'Google sign-in failed (' + _redirErr + '). Make sure this domain is listed in Firebase Console → Authentication → Settings → Authorized domains.';
  }
} catch(_) {}

// Apply theme before first paint to avoid a flash of the wrong theme
applyTheme();

// Initialize — show app immediately with local data; Firebase syncs once auth resolves
render();

// ===== SERVICE WORKER — auto-update on new deploy =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(e => console.warn('SW registration failed:', e));
}
</script>
</body>
</html>
